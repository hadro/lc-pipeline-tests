<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; font-size: 14px; background: #f8f8f6; color: #222; }
a { color: #1a6ebd; }
#app { display: flex; height: 100dvh; overflow: hidden; }

/* ── Sidebar ── */
#sidebar { width: 240px; min-width: 200px; max-width: 300px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; overflow: hidden; }
#sidebar-header { padding: 14px 16px 10px; border-bottom: 1px solid #eee; }
#sidebar-header h1 { margin: 0 0 5px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #1a6ebd; }
#sidebar-header h2 { margin: 0 0 2px; font-size: 14px; font-weight: 700; line-height: 1.3; word-break: break-word; }
#sidebar-header .sub { font-size: 12px; color: #595959; }
#volume-wrap { margin-top: 10px; display: none; background: #eef3fb; border: 1px solid #5a86b8; border-radius: 5px; padding: 8px 10px; }
#volume-select { width: 100%; font-size: 12px; padding: 4px 6px; border: 1px solid #767676; border-radius: 4px; background: #fff; color: #333; cursor: pointer; }
#sidebar-scroll { overflow-y: auto; flex: 1; padding: 10px 14px 20px; }

.facet-group { margin-bottom: 14px; }
.facet-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #555; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
.facet-clear { font-size: 11px; font-weight: 400; text-transform: none; color: #1a6ebd; cursor: pointer; letter-spacing: 0; background: none; border: none; padding: 4px 6px; margin: -4px -6px -4px 0; }
.facet-item { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; cursor: pointer; user-select: none; }
.facet-item input[type=checkbox] { accent-color: #1a6ebd; cursor: pointer; flex-shrink: 0; }
.facet-item .val { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; }
.facet-item .cnt { font-size: 11px; color: #595959; flex-shrink: 0; }
.facet-more { font-size: 11px; color: #595959; margin-top: 3px; cursor: pointer; background: none; border: none; padding: 6px 4px; margin-left: -4px; text-align: left; }
.facet-more:hover { color: #1a6ebd; }

/* ── Main panel ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#toolbar { padding: 10px 16px; border-bottom: 1px solid #ddd; background: #fff; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
#search { flex: 1; min-width: 180px; padding: 6px 10px; border: 1px solid #767676; border-radius: 4px; font-size: 13px; }
#count-label { font-size: 12px; color: #666; white-space: nowrap; }
#clear-filters-btn { display: none; padding: 4px 10px; background: #fff; border: 1px solid #c66; border-radius: 4px; cursor: pointer; font-size: 12px; color: #b33; white-space: nowrap; }
#clear-filters-btn:hover { background: #fff0f0; border-color: #a44; }
#clear-filters-btn:focus-visible { outline: 2px solid #1a6ebd; outline-offset: 2px; }
#export-btn { padding: 5px 12px; background: #1a6ebd; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap; }
#export-btn:hover { background: #155a9e; }
#meta-strip { margin-left: auto; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
.meta-chip { font-size: 11px; background: #f0f0ee; border: 1px solid #ddd; border-radius: 10px; padding: 2px 8px; color: #555; white-space: nowrap; }
.meta-link { color: #1a6ebd; text-decoration: none; }
.meta-link:hover { background: #e0e8ff; border-color: #1a6ebd; }

#charts-row { padding: 10px 16px 0; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; border-bottom: 1px solid #eee; background: #fff; }
#charts-row.collapsed { display: none; }
#charts-toggle { padding: 4px 10px; background: none; border: 1px solid #767676; border-radius: 4px; cursor: pointer; font-size: 12px; color: #595959; white-space: nowrap; }
#charts-toggle:hover { border-color: #222; color: #222; }
.chart-block { display: flex; flex-direction: column; }
.chart-block h3 { margin: 0 0 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #555; }

thead tr.filter-row th { position: sticky; top: 33px; background: #eef2f6; padding: 3px 6px; border-top: 2px solid #c4d4e8; border-bottom: 1px solid #ddd; }
.col-filter-input { width: 100%; font-size: 11px; padding: 2px 5px; border: 1px solid #767676; border-radius: 3px; box-sizing: border-box; }
.col-filter-input:focus { outline: 2px solid #1a6ebd; outline-offset: 0; border-color: #1a6ebd; }

#content { flex: 1; display: flex; overflow: hidden; }

/* ── Table ── */
#table-wrap { flex: 1; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { position: sticky; top: 0; background: #f0f0ee; border-bottom: 2px solid #ddd; padding: 7px 10px; text-align: left; font-weight: 600; white-space: nowrap; cursor: pointer; user-select: none; }
thead th:hover { background: #e4e4e2; }
thead th[aria-sort="none"]::after { content: " ↕"; color: #bbb; font-size: 10px; }
thead th.sorted-asc::after { content: " ↑"; color: #1a6ebd; }
thead th.sorted-desc::after { content: " ↓"; color: #1a6ebd; }
tbody tr { border-bottom: 1px solid #eee; cursor: pointer; }
tbody tr:hover { background: #f5f8ff; }
tbody tr.selected { background: #ddeeff; }
td { padding: 6px 10px; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
td.source-cell { text-align: center; }
.src-btn { background: #f0f0f0; border: 1px solid #767676; border-radius: 3px; padding: 2px 7px; cursor: pointer; font-size: 11px; color: #333; white-space: nowrap; }
.src-btn:hover { background: #fff; color: #1a6ebd; border-color: #1a6ebd; }
#no-results { padding: 40px; text-align: center; color: #595959; font-size: 14px; display: none; }
#no-results p { margin: 6px 0 0; font-size: 12px; }
#no-results button { margin-top: 14px; padding: 5px 14px; background: #1a6ebd; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
#no-results button:hover { background: #155a9e; }
.table-end-sentinel td { text-align: center; color: #aaa; font-size: 12px; padding: 14px; border-top: 1px solid #ddd; }
mark { background: #ffe066; color: inherit; padding: 0 1px; border-radius: 2px; }

/* ── Detail panel ── */
#detail { width: 380px; min-width: 300px; max-width: 440px; background: #fff; border-left: 1px solid #ddd; overflow-y: auto; display: none; }
#detail.open { display: block; }
#detail-inner { padding: 14px; }
#detail-inner h2 { margin: 0 0 10px; font-size: 14px; font-weight: 700; line-height: 1.3; }
#detail-thumb { width: 100%; aspect-ratio: 4/3; object-fit: contain; background: #f5f5f5; border-radius: 4px; margin-bottom: 10px; display: block; border: 1px solid #ddd; }
.detail-fields { display: grid; grid-template-columns: auto 1fr; gap: 4px 10px; font-size: 12px; }
.df-key { color: #666; font-weight: 600; white-space: nowrap; }
.df-val { word-break: break-word; }
.detail-source { margin-top: 12px; }
.detail-source a { font-size: 12px; }
#detail-close { float: right; background: none; border: none; font-size: 18px; cursor: pointer; color: #595959; line-height: 1; padding: 6px 8px; margin: -6px -8px 0 0; }
#detail-close:hover { color: #333; }
#detail-close:focus-visible { outline: 2px solid #1a6ebd; outline-offset: 2px; border-radius: 2px; }
#mobile-header { display: none; }

/* ── Mobile (≤640 px) ───────────────────────────────────────────────────── */
@media (max-width: 640px) {
  #sidebar {
    position: fixed; top: 0; left: 0;
    width: 85vw; max-width: 300px; height: 100dvh;
    z-index: 200; min-width: 0;
    transform: translateX(-100%);
    transition: transform 0.22s ease;
    box-shadow: 2px 0 12px rgba(0,0,0,0.18);
  }
  #app.sidebar-open #sidebar { transform: translateX(0); }
  #sidebar-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 199;
  }
  #app.sidebar-open #sidebar-backdrop { display: block; }
  #filter-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 10px; background: none;
    border: 1px solid #767676; border-radius: 4px;
    cursor: pointer; font-size: 13px; color: #595959;
    white-space: nowrap; flex-shrink: 0;
  }
  #table-wrap { overflow-x: auto; }
  #detail {
    position: fixed; inset: 0;
    width: 100%; max-width: 100%; min-width: 0;
    height: 100dvh; z-index: 300;
    overflow-y: auto; border-left: none;
  }
  #detail-close { font-size: 24px; padding: 4px 8px; }
  #meta-strip { margin-left: 0; order: 3; width: 100%; }
  #mobile-header {
    display: block; padding: 8px 12px 6px;
    background: #fff; border-bottom: 1px solid #eee;
  }
  #mobile-title {
    font-size: 13px; font-weight: 700; line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #mobile-sub { font-size: 11px; color: #595959; margin-bottom: 4px; }
  #mobile-volume-select {
    display: none; width: 100%; font-size: 12px;
    padding: 4px 6px; border: 1px solid #767676; border-radius: 4px;
    background: #fff; color: #333; margin-top: 4px;
  }
  #mobile-volume-select.visible { display: block; }
  .col-filter-input { padding: 8px 6px; min-height: 44px; font-size: 13px; }
  .facet-item { padding: 4px 0; }
  .src-btn { padding: 8px 10px; font-size: 13px; }
  #clear-filters-btn, #export-btn, #charts-toggle { padding: 8px 14px; font-size: 13px; }
}
</style>
</head>

<div id="app">

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1><a href="https://github.com/hadro/directory-pipeline" target="_blank" style="color:inherit;text-decoration:none;">Pipeline Data Explorer</a></h1>
    <h2 id="doc-title"></h2>
    <div class="sub" id="doc-sub"></div>
    <div id="volume-wrap">
      <label for="volume-select" style="display:block;font-size:11px;color:#595959;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;">Select volume</label>
      <select id="volume-select"></select>
    </div>
  </div>
  <div id="sidebar-scroll">
    <div id="fill-rate-section">
      <div class="facet-label" style="margin-bottom:4px;">Field coverage</div>
      <p style="font-size:11px;color:#777;margin:0 0 6px;line-height:1.4;">Less than 100% means not every entry from the source scans had that field or value.</p>
      <div id="fill-rate-chart"></div>
    </div>
    <hr style="margin:12px 0; border:none; border-top:1px solid #eee;">
    <div id="facet-controls"></div>
  </div>
</div>
<div id="sidebar-backdrop" aria-hidden="true"></div>

<!-- Main -->
<div id="main">
  <div id="mobile-header">
    <div id="mobile-title"></div>
    <div id="mobile-sub"></div>
    <select id="mobile-volume-select" aria-label="Select volume"></select>
  </div>
  <div id="toolbar">
    <button id="filter-btn" style="display:none" aria-label="Open filters" aria-expanded="false" aria-controls="sidebar">&#9776; Filters</button>

    <span id="count-label" aria-live="polite" aria-atomic="true"></span>
    <button id="clear-filters-btn" aria-label="Clear all filters">× Clear filters</button>
    <div id="meta-strip"></div>
    <button id="charts-toggle" aria-expanded="true" aria-controls="charts-row">Hide summary ▴</button>
    <button id="export-btn">Export CSV</button>
  </div>
  <div id="charts-row"></div>
  <div id="content">
    <div id="table-wrap">
      <table id="results-table">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
      <div id="no-results">
        No entries match the current filters.
        <p>Try removing filters or adjusting your search.</p>
        <button id="clear-all-btn">Clear all filters</button>
      </div>
    </div>
    <div id="detail">
      <div id="detail-inner">
        <button id="detail-close" aria-label="Close detail panel">×</button>
        <h2 id="detail-title"></h2>
        <a id="detail-thumb-link" target="_blank"><img id="detail-thumb" alt="" style="display:none;cursor:pointer"></a>
        <div class="detail-fields" id="detail-fields"></div>
        <div class="detail-source" id="detail-source"></div>
      </div>
    </div>
  </div>
</div>
</div>

rlieren, sondern das spätere Weichkochen wird auch bedeutend befördert. Das zum Abbrühen der Gemüse benutzte Wasser muß weggeschüttet werden. Zum Kochen der Gemüse nimmt man stets Wasser, das bereits vorher kochend gemacht ist, und schüttet die Gemüse nur nach und nach hinein, damit es gehörig fortkocht, d. h. immer sogleich wieder ins Kochen kommt. Die zum Abtropfen aufs Sieb gelegten abgewaschenen Gemüse nimmt man deshalb nur schaumlöffelweise vom Siebe und läßt nach jeder solchen Portion das Ganze wieder ins Kochen kommen, ehe man eine neue Portion folgen läßt. Schmackhaft werden feinere Gemüse allemal besser durch Butter, als durch Fett. Es genügt aber auch für diesen Zweck, wenn man zu den mit Fett gekochten Gemüsen, kurz vor dem Anrichten, etwas Butter hinzufügt. Die Kraut- und Kohlarten kocht man mit Nierenfett, Sauerkraut mit Schweine- oder Gänsefett, Rothkohl mit Speck oder Nierenfett, Spinat und dergleichen Blattgemüse wohl auch mit", "text_en": "To obtain nutritious vegetables, one must not soak them after they have been cleaned and all rotten or unripe parts have been cut out, but merely wash them quickly. Soaking deprives the vegetables of their nutritive salts and their characteristic flavor. Root vegetables and tubers are washed again after being cut. Turnips and carrots easily become dry and blackish when left in the air; these must be covered with a damp cloth after cutting and washing until they are to be cooked. All types of cabbage and kale, spinach, and onions should be scalded with hot water, i.e., brought to a proper boil a few times in an open vessel with plenty of water. If one adds a small pinch of baking soda (bi-carbonate of soda) to the water, the vegetables not only become more digestible by losing their flatulent effect, but the subsequent softening is also significantly promoted. The water used for scalding the vegetables must be poured away. For cooking vegetables, always use water that has already been brought to a boil, and add the so schneidet man denselben in Würfel, bratet ihn mit etwas Mehl und etwas fein= geschnittenen Zwiebeln gelb und kocht das Gemüse hiermit durch. Auch benutzt man anstatt Buttermehl eine Sauce, bestehend aus auf dem Feuer abgerührter Butter mit 1 Eßlöffel feingeschnittener Zwiebel, 1 Eßlöffel Mehl, etwas feingehackter Petersilie und Fleischbrühe, was ales 4 Stunde dämpfen muß. An junges Gemüse nimmt man statt Mehl in Butter geröstete Semmelkrumen. Mit dem Zusatz von Mehl muß man überhaupt sehr sparsam sein, denn es verdeckt den Geschmack des Gemüses und verdirbt auch das appetitliche Aussehen desselben. Brannte ein Gemüse beim Kochen an, so versuche man nicht, durch Ausgießen von Flüssigkeiten den Schaden zu verbessern. Ohne Zeitverlust schütte man das Gemüse in ein anderes Gefäß, lasse den angebrannten Sak unberührt und gebe, wenn es nöthig ist, frische Sauce, Brühe u. s. w. dazu. Gekochte Gemüse lassen sich nicht lange aufbewahren, da dieselben sich leicht zersetzen, sauer wer= den. Im Sommer geht die Zersetzung noch schneller vor sich, als im Winter, und der Genuß solchen Gemüses verursacht gewöhnlich Diarrhöe. Selbst im Eisschrank sollten Gemüse nicht länger als 24 Stunden aufbewahrt werden.", "text_en": "Roasting fat. Salt should be sprinkled evenly over the vegetables once they are already half-cooked, then cover them and let them continue to cook. Only green leafy vegetables, such as spinach, cabbage, and the like, which must not be cooked too long if they are to retain their green color, should be salted immediately, left uncovered while cooking, and not exposed to air after cooking. When stirring, some vegetables must be handled carefully so they do not become mushy. In this case, stop stirring and instead just shake the vessel. Add all ingredients, such as butter, fat, sugar, etc., to the vegetables when they begin to cook. Where parsley is to be added, this should only be done just before serving, as it otherwise loses color and flavor. If using bacon, cut it into cubes, fry it with a little flour and some finely chopped onions until yellow, and cook the vegetables through with this. Instead of butter-flour, one can also use a sauce consisting of butter stirred over the fire with 1 tablespoon of finely chopped onion, 1 tablespoon of flour, some finely chopped parsley, and meat broth, which must all steam for 1/4 hour. For young vegetables, use breadcrumbs toasted in butter instead of flour. One must be very sparing with the addition of flour, as it masks the taste of the vegetables and also spoils their appetizing appearance. If a vegetable burns while cooking, do not try to fix the damage by pouring in liquids. Without losing time, pour the vegetables into another vessel, leave the burnt part untouched, and add fresh sauce, broth, etc., if necessary. Cooked vegetables cannot be kept for long, as they decompose easily and turn sour. In summer, decomposition happens even faster than in winter, and consuming such vegetables usually causes diarrhea. Even in an icebox, vegetables should not be kept for longer than 24 hours.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0012", "image": "0069_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0077.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "general_instruction", "title_de": "Der Spargel und seine Zubereitung", "title_en": "Asparagus and its Preparation", "yield": "", "text": "Dieses schon von den alten Aegyptern cultivirte Gemüse ist noch heute wie schon vor 1800 Jahren der römische Gelehrte Plinius ihn bezeichnete „die zuträg= lichste Speise für den Magen\". Keine Frau sollte es verschmä=", "text_en": "This vegetable, already cultivated by the ancient Egyptians, is still today, just as the Roman scholar Pliny described it 1800 years ago, 'the most wholesome food for the stomach.' No woman should disdain it...", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0012", "image": "0069_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0077.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "general_instruction", "title_de": "Das Kochen der frischen Gemüse", "title_en": "", "yield": "", "text": "hen, den Spargel mit eigener Hand zu schälen. Denn im Schälen liegt das Kunststück. Man hält den Spargel in der linken Hand und schält ihn mit nicht zu scharfem Messer der Länge nach vom Kopf bis zum Ende so, daß die abgeschälte Haut nach unten hin allmählich dicker wird. Die Köpfchen müſſen geschont, die glänzende, zähe, bitter schmeckende Haut jedoch entfernt werden. Es ist ein falsches Vorurtheil, daß solches Verfahren Verschwendung ist, denn was man sich scheute, in der Küche abzuschälen, bleibt im Speisezimmer auf den Tellern liegen. Die beste Zeit für Spargel ist im Mai und Juni.", "text_en": "to peel the asparagus with one's own hand. For the art lies in the peeling. One holds the asparagus in the left hand and peels it lengthwise with a not-too-sharp knife from the head to the end, so that the peeled skin gradually becomes thicker towards the bottom. The heads must be spared, but the shiny, tough, bitter-tasting skin must be removed. It is a false prejudice that such a procedure is wasteful, for what one was afraid to peel off in the kitchen remains on the plates in the dining room. The best time for asparagus is in May and June.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0013", "image": "0070_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0078.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Gekochter Spargel", "title_en": "Boiled Asparagus", "yield": "2 portions", "text": "1 Pfund Spargel wird geschält, die harten Stücke, wenn solche vorhanden, werden entfernt. Hierauf wird der Spargel abgespült in Bündelchen von 10–12 Stück zusammengebunden, und in kochendem, gesalzenem Wasser ½ bis ¾ Stunde gekocht. Dann nimmt man die Bündelchen heraus, zerschneidet den Faden und ordnet den Spargel auf einer gewärmten Schüssel mit den Köpfchen einwärts gelegt. Man kann den Spargel mit etwas fein gestoßenem Zwieback bestreuen und mit heißer Butter begießen oder man nimmt 2 Eßlöffel Butter, 1½ Eßlöffel Mehl, läßt beides zusammen in der Pfanne schwitzen, aber ja nicht gelb werden, rührt es mit etwas Spargelwasser zu einer sämigen Sauce, fügt 1 Eigelb, ein wenig Muskatnuß oder Citrone je nach Geschmack bei und schüttet die Sauce über den angerichteten Spargel.", "text_en": "1 pound of asparagus is peeled, the hard pieces, if any, are removed. Then the asparagus is rinsed, tied into bundles of 10–12 pieces, and boiled in boiling, salted water for ½ to ¾ of an hour. Then one takes out the bundles, cuts the thread, and arranges the asparagus on a warmed dish with the heads pointing inward. One can sprinkle the asparagus with some finely crushed rusk and pour hot butter over it, or one takes 2 tablespoons of butter, 1½ tablespoons of flour, lets both sweat together in the pan, but by no means let them turn yellow, stirs it with some asparagus water into a creamy sauce, adds 1 egg yolk, a little nutmeg or lemon according to taste, and pours the sauce over the arranged asparagus.", "serving_suggestions": "Man gibt Schinken, Cervelatwurst, geräucherten Lachs, Cotelets, Kalbsbraten, Fricadellen oder Salzkartoffeln dazu.", "serving_suggestions_en": "Serve with ham, cervelat sausage, smoked salmon, cutlets, roast veal, meatballs, or boiled potatoes.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0013", "image": "0070_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0078.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Spargel mit jungen Erbsen", "title_en": "Asparagus with Green Peas", "yield": "2 portions", "text": "Man nimmt 1 Pfund dünnen Spargel, reinigt und schneidet denselben in kleine Stücke ; diese werden in kochendem Salzwasser weich gekocht und auf ein Sieb zum Abtropfen gebracht. 1 Tasse junge, grüne Erbsen werden mit etwas Butter, Fleischbrühe, 1 Theelöffel Zucker und etwas Salz weich gedünstet; dann wird der Spargel zugemengt und etwas von dem Spargelwasser daran gegossen. Hierauf macht man die Sauce mit etwas geriebenen Semmelkrummen sämig und schwenkt zuletzt etwas feingehackte Petersilie durch.", "text_en": "Take 1 pound of thin asparagus, clean and cut it into small pieces; these are boiled until soft in boiling salted water and placed on a sieve to drain. 1 cup of young green peas are stewed until soft with some butter, meat broth, 1 teaspoon of sugar, and some salt; then the asparagus is mixed in and some of the asparagus water is poured over it. Then thicken the sauce with some grated breadcrumbs and finally toss in some finely chopped parsley.", "serving_suggestions": "Hierzu gibt man Omelets oder ein junges gebratenes Huhn.", "serving_suggestions_en": "Serve with omelets or a young roasted chicken.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0013", "image": "0070_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0078.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Spinat", "title_en": "Spinach", "yield": "2 portions", "text": "Spinat enthält viel Kalk, Natron und 0.07% Eisen. Dieses leichtverdauliche Gemüse, dessen Heimath Persien ist, kam 1525 durch die Spanier nach Amerika. --- Von 1 Quart Spinat werden die Blätter von den Stielen abgestreift, 2 oder 3 mal schnell abgewaschen und in reichlich Wasser mit einem kleinen Stückchen Soda 5 Minuten in einem offenen Topfe gekocht, worauf man ihn auf einen Durchschlag schüttet, mit kaltem Wasser übergießt, gut ausdrückt und dann recht fein hackt. Dann wird eine fein gewiegte Zwiebel in Butter gedünstet, ½ Tasse Milch, Salz, ein wenig Muskat und der Spinat hinzugethan und ½ Stunde langsam gekocht.", "text_en": "Spinach contains much lime, soda, and 0.07% iron. This easily digestible vegetable, whose home is Persia, came to America in 1525 via the Spanish. --- From 1 quart of spinach, the leaves are stripped from the stems, washed quickly 2 or 3 times, and boiled in plenty of water with a small piece of soda for 5 minutes in an open pot, whereupon it is poured into a colander, rinsed with cold water, squeezed out well, and then chopped quite finely. Then a finely minced onion is sautéed in butter, ½ cup of milk, salt, a little nutmeg, and the spinach are added and cooked slowly for ½ hour.", "serving_suggestions": "Beim Anrichten garnirt man die Schüssel mit halb durchgeschnittenen, pflaumenweich gekochten Eiern. Man gibt Cotelets, Rindszungen oder auch aufgebratenes Rindfleisch mit gebratenen Kartoffeln dazu.", "serving_suggestions_en": "When serving, garnish the dish with halved, soft-boiled eggs. Serve with cutlets, beef tongue, or fried beef with roasted potatoes.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0014", "image": "0071_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0079.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Spinatstrudel", "title_en": "Ravioli", "yield": "2 portions", "text": "Von 4 Eiern, 4 Eßlöffeln Mehl, 1 Pint Milch und Salz wird ein Pfannkuchenteig gemacht und davon ganz dünne Eierkuchen gebacken. Diese werden fingerdick mit dem nach oben angegebener Weise gekochten Spinat überstrichen, zusammengerollt, mit Butter überstrichen und in eine mit Butter gestrichene Pfanne gelegt. ½ Stunde vor dem Serviren werden die Kuchen in die Röhre gestellt, sobald sie Farbe haben, mit Rahm übergossen, zugedeckt, schnell eingekocht und angerichtet.", "text_en": "From 4 eggs, 4 tablespoons of flour, 1 pint of milk, and salt, a pancake batter is made and very thin pancakes are baked from it. These are spread finger-thick with the spinach cooked in the manner indicated above, rolled up, brushed with butter, and placed in a buttered pan. ½ hour before serving, the cakes are placed in the oven; as soon as they have color, they are poured over with cream, covered, quickly reduced, and served.", "serving_suggestions": "Man kann geräucherten Lachs, Hammelcotelets, Bratwürste oder aufgeschnittenes kaltes Fleisch dazu geben.", "serving_suggestions_en": "You can serve smoked salmon, mutton cutlets, sausages, or sliced cold meat with this.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0014", "image": "0071_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0079.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Spinat mit Sauerampfer", "title_en": "Spinach with Sorrel", "yield": "", "text": "Um dem Spinat einen etwas kräftigeren Geschmack zu geben, nimmt man 2 Handvoll Sauerampfer dazu, hackt diesen mit dem Spinat und macht es fertig, wie oben bei „Spinat\" angegeben.", "text_en": "To give the spinach a somewhat stronger flavor, take 2 handfuls of sorrel, chop it with the spinach, and finish it as indicated above under \"Spinach\".", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0014", "image": "0071_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0079.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Sauerampfer", "title_en": "Sorrel", "yield": "2 portions", "text": "1 Quart Sauerampfer wird rein gewaschen, in Salzwasser abgebrüht und wie Spinat fein gehackt. Butter wird mit etwas gehackter Zwiebel gedämpft, 1 Eßlöffel Mehl darüber gestreut, mit Fleischbrühe und 2 Eigelb angerührt, noch ¼ Stunde gekocht, durch ein Sieb getrieben, wieder heiß gemacht und dann servirt.", "text_en": "1 quart of sorrel is washed clean, blanched in salted water, and finely chopped like spinach. Butter is steamed with some chopped onion, 1 tablespoon of flour is sprinkled over it, stirred with meat broth and 2 egg yolks, cooked for another ¼ hour, passed through a sieve, reheated, and then served.", "serving_suggestions": "Hierzu gibt man Schinken, Wurst, Hammel- oder Schweinscotelets.", "serving_suggestions_en": "Serve this with ham, sausage, mutton, or pork cutlets.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0014", "image": "0071_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0079.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Grüne Erbsen", "title_en": "Green Peas", "yield": "2 portions", "text": "Schoten, welche aber nicht alt sein dürfen, werden ausgeleert. Dann wäscht man die Erbsen in einem Sieb ab. Ein halber Eßlöffel Butter, 1 Tasse Wasser, ein wenig Zucker werden in einem Topfe zum Kochen gebracht und die Erbsen 20–25 Minuten darin geschmort, dann noch 1/2 Eßlöffel Butter, sowie auch Salz hinzugefügt, einigemal aufgekocht und mit etwas feingehackter Petersilie durchgeschwenkt. Durch langes Kochen verlieren die Erbsen an Ansehen und Wohlgeschmack, dürfen auch nicht lange vorher entschotet werden, niemals aber, wie es häufig geschieht, am Abend vor dem Gebrauch. Je frischer man die jungen Erbsen erhalten kann, desto wohlschmeckender wird das davon bereitete Gemüse.", "text_en": "Pods, which must not be old, are shelled. Then wash the peas in a sieve. Half a tablespoon of butter, 1 cup of water, and a little sugar are brought to a boil in a pot, and the peas are braised in it for 20–25 minutes; then add another 1/2 tablespoon of butter as well as salt, bring to a boil a few times, and toss with some finely chopped parsley. Through long cooking, peas lose their appearance and flavor; they should also not be shelled long before use, and never, as often happens, the evening before use. The fresher one can obtain the young peas, the more delicious the vegetable prepared from them will be.", "serving_suggestions": "Man gibt dazu Kalbsbraten, Ochsenzunge, Wiener Schnitzel, gebackene Fische, gebratene Hühnchen oder Rindfleisch.", "serving_suggestions_en": "Serve with roast veal, ox tongue, Wiener schnitzel, fried fish, roast chicken, or beef.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0015", "image": "0072_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0080.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Grüne Erbsen mit Möhren", "title_en": "Green Peas with Carrots", "yield": "2 portions", "text": "Um die Zeit der frischen grünen Erbsen sind auch Mohrrüben (gelbe Rüben) noch sehr zart und werden deshalb mit Erbsen zusammen weich. Die Rüben werden geputzt, in Würfel von der Größe der Erbsen geschnitten, gewaschen und dann mit den ebenfalls gewaschenen Erbsen mit Butter, Zucker und etwas Wasser weich geschmort. Dann schwitzt man 1 Löffel Mehl in Butter, macht das Gemüse damit sämig und gibt zuletzt etwas gehackte Petersilie dazu. Sind die Mohrrüben nicht mehr ganz jung, so kocht man sie zuerst für sich allein 1 Stunde vorher mit Wasser und etwas Salz weich, mischt sie nachher zu den in Butter und wenig Wasser mit etwas Zucker gedämpften Erbsen, und gießt entweder etwas Fleischbrühe zu dem Gemüse oder verdickt die Brühe desselben mit einer glatt verrührten Mehlschwitze, läßt das Ganze noch ein paar Mal aufkochen und würzt es mit Salz und Petersilie.", "text_en": "During the season of fresh green peas, carrots (yellow roots) are also still very tender and therefore become soft together with the peas. The carrots are cleaned, cut into cubes the size of the peas, washed, and then braised until soft with the likewise washed peas, butter, sugar, and a little water. Then sweat 1 spoonful of flour in butter, use it to thicken the vegetable, and finally add some chopped parsley. If the carrots are no longer quite young, boil them first by themselves for 1 hour beforehand with water and a little salt, then mix them into the peas that have been steamed in butter and a little water with some sugar, and either pour some meat broth over the vegetable or thicken the broth with a smoothly stirred flour roux, let the whole thing boil up a few more times, and season with salt and parsley.", "serving_suggestions": "Die Erbsen werden hübsch in die Mitte der Schüssel angerichtet und die Mohrrüben um den Rand gelegt. Als Beilage eignen sich Omelets, geräucherter Schinken, Kalbscotelets oder Braten nebst Salzkartoffeln.", "serving_suggestions_en": "The peas are arranged nicely in the center of the dish and the carrots are placed around the edge. Suitable side dishes include omelets, smoked ham, veal cutlets, or roasts along with boiled potatoes.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0015", "image": "0072_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0080.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Möhren oder Mohrrüben", "title_en": "Stewed Carrots", "yield": "2 portions", "text": "Das ganze Jahr hindurch liefern Möhren ein billiges und gesundes Gemüse. Es ist überhaupt eines der ältesten, über die ganze Welt verbreiteten Gemüse, und aus dem ältesten römischen", "text_en": "Throughout the whole year, carrots provide an inexpensive and healthy vegetable. It is, in general, one of the oldest vegetables spread throughout the whole world, and from the oldest Roman", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0015", "image": "0072_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0080.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "general_instruction", "title_de": "Das Kochen der Möhren", "title_en": "Cooking Carrots", "yield": "", "text": "Kochbuche, welches vor 1500 Jahren geschrieben wurde, wiſſen wir, daß die alten Römer die Möhren in mancherlei Form zuzubereiten verstanden. Vor Einführung der Kartoffeln waren die Möhren in Europa, besonders Deutschland, das gewöhnliche Gericht des gemeinen Mannes. — 8 bis 10 Möhren werden sauber geschabt; dieſes geschieht, indem man die Möhre am Krautende in die linke und das Meſſer in die rechte Hand nimmt und dieſelbe von oben nach unten schabt, wobei zugleich die schadhaften Stellen abgeschnitten werden; sodann wäscht man die Möhren ab, schneidet sie in kleine Würfel oder zierliche Streifen und schmort sie mit Butter, Zucker, ein wenig Salz und etwas Waſſer höchstens 1 Stunde lang. Vor dem Anrichten wird eine Meſſerspitze Mehl angestäubt und mit feingehackter Peterſilie durchgeschwenkt. Mohrrüben, wie auch junge Erbsen, schwenkt man während des Kochens häufig, um das Anbrennen zu verhüten. Iſt die Flüssigkeit verkocht, so gießt man immer nur wenig auf einmal, aber öfter, Fleischbrühe oder schwach gesalzenes Waſſer hinzu.", "text_en": "From a cookbook written 1500 years ago, we know that the ancient Romans understood how to prepare carrots in many forms. Before the introduction of potatoes, carrots were the common dish of the common man in Europe, especially in Germany. — 8 to 10 carrots are scraped clean; this is done by taking the carrot by the leafy end in the left hand and the knife in the right, scraping it from top to bottom, while simultaneously cutting off any damaged spots; then the carrots are washed, cut into small cubes or dainty strips, and braised with butter, sugar, a little salt, and some water for at most 1 hour. Before serving, a pinch of flour is dusted over them and they are tossed with finely chopped parsley. Carrots, as well as young peas, should be tossed frequently during cooking to prevent burning. If the liquid has boiled away, always pour in only a little at a time, but more often, meat broth or lightly salted water.", "serving_suggestions": "Als Beilage gibt man Cotelets, Fricadellen, Bratwurst, geräucherte Zunge, Schinken oder Schnitzel.", "serving_suggestions_en": "Serve as a side dish with cutlets, meatballs, bratwurst, smoked tongue, ham, or schnitzel.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0016", "image": "0073_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0081.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Mohrrüben mit Kartoffeln und Rind- oder Hammelfleisch", "title_en": "Lamb or Beef Stew with Carrots and Potatoes", "yield": "2 portions", "text": "5 oder 6 große Möhren werden geschabt und in Würfel geschnitten; 1½ Pfund durchwachsenes Hammel- oder Rindfleisch kocht man mit Salz in kurzer Brühe 1 Stunde lang, gibt die gewaschenen Möhren und später 3 oder 4 geschälte und in Stücke geschnittene Kartoffeln dazu, läßt Möhren, Kartoffeln und Fleisch 2 Stunden kochen, gibt Salz nach Geschmack dazu, und vor dem Anrichten noch etwas gehackte Petersilie. Das Fleisch wird vor dem Anrichten in Stücke geschnitten und das Gemüse darüber gegeben. Sollte das Fleisch nicht fett genug sein, so gibt man gleich zu Anfang etwas Kinder- oder Hammelfett zu den Möhren und macht das Gemüse mit etwas in Fett geschwitztem Mehl sämig.", "text_en": "5 or 6 large carrots are scraped and cut into cubes; 1½ pounds of streaky lamb or beef are boiled with salt in a small amount of broth for 1 hour, the washed carrots are added, and later 3 or 4 peeled and chopped potatoes are added; let the carrots, potatoes, and meat cook for 2 hours, add salt to taste, and before serving, some chopped parsley. The meat is cut into pieces before serving and the vegetables are placed over it. Should the meat not be fatty enough, add some lard or mutton fat to the carrots right at the beginning and thicken the vegetables with a little flour sautéed in fat.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0016", "image": "0073_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0081.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Schwarzwurzel", "title_en": "Salsify or Oyster Plant", "yield": "2 portions", "text": "Die Schwarzwurzel schmeckt, gut zubereitet, dem Spargel sehr ähnlich. Man vermischt warmes Waſſer mit Essig und etwas Mehl und läßt es stehen. Dann schabt man 1 Dutzend Wurzeln der Länge nach ab und legt sie in das eben erwähnte Waſſer, damit sie weiß", "text_en": "Salsify, when well prepared, tastes very similar to asparagus. Mix warm water with vinegar and a little flour and let it stand. Then scrape 1 dozen roots lengthwise and place them in the aforementioned water so that they remain white", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0016", "image": "0073_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0081.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Grüne Bohnen", "title_en": "String Beans", "yield": "", "text": "Die grünen Bohnen müſſen jung und fleischig sein, sie werden oben und unten abgeschnitten und damit sogleich der Faden abgezogen und nach Belieben, fein oder stark, schräg geschnitten oder auch nur gebrochen. Dann werden sie in Salzwasser (mit etwas Natron) gewaschen, 1/4 Stunde gekocht; hierauf läßt man sie abtropfen und kocht sie mit Kinder- oder Bratenfett und etwas Fleischbrühe, sowie ein wenig Zucker, 1 1/2 Stunden lang. Hierauf macht man sie mit in Butter geschwitztem Mehl sämig, salzt sie und thut einige Stengel Bohnen- oder Pfefferkraut, oder gehackte Petersilie hinzu.", "text_en": "The green beans must be young and fleshy; they are trimmed at the top and bottom, and the string is immediately pulled off. They may be cut finely or thickly, diagonally, or simply broken, as desired. Then they are washed in salted water (with a little baking soda) and boiled for 1/4 hour; afterwards, they are drained and cooked with lard or meat drippings and a little meat broth, as well as a little sugar, for 1 1/2 hours. Then, thicken them with flour sautéed in butter, add salt, and add a few sprigs of savory or pepperwort, or chopped parsley.", "serving_suggestions": "Man gibt dazu Hering, Rind-, Hammel- oder Schweinefleisch, Cotelets, gekochten Schinken oder Bratwurst.", "serving_suggestions_en": "Serve with herring, beef, mutton, or pork, cutlets, boiled ham, or bratwurst.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0017", "image": "0074_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0082.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Eingemachte Bohnen zu kochen", "title_en": "To Cook Preserved Beans", "yield": "", "text": "Von den in Salz eingemachten Bohnen nimmt man Abends zuvor die nöthige Menge aus dem Topfe, legt sie über Nacht in frisches Wasser, siedet sie dann und verfährt damit wie bei den frischen Bohnen. In Büchsen eingemachte Schnitt- oder Brechbohnen läßt man noch 1/4 Stunde kochen; sie werden beim Ausfüllen aus den Büchsen zum Abtropfen auf ein Sieb gelegt und dann wie andere Schnittbohnen zubereitet, aber nur 1/4 Stunde gekocht.", "text_en": "Take the necessary amount of salt-preserved beans from the pot the evening before, soak them overnight in fresh water, then boil them and proceed as with fresh beans. Canned sliced or snap beans should be boiled for another 1/4 hour; when emptied from the cans, they are placed on a sieve to drain and then prepared like other sliced beans, but boiled for only 1/4 hour.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0017", "image": "0074_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0082.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Grüne Bohnen mit Hammelfleisch", "title_en": "String Beans with Mutton", "yield": "2 portions", "text": "Hierzu nimmt man mittelgroße Bohnen, bricht jede, nachdem die Fäden abgezogen sind, in 3 Theile und wäscht sie ab. 1 1/4 Pfund fettes Hammelfleisch bringt man mit Wasser und etwas Salz ins Kochen, gibt die zur Mahlzeit bestimmten Bohnen hinein und kocht sie mit dem Fleische in 2 Stunden weich. Sodann macht man die Brühe mit etwas in Butter geschwitztem Mehl sämig, gibt etwas gehackte Petersilie dazu und reicht das gekochte Fleisch als Beilage.", "text_en": "For this, take medium-sized beans, break each into 3 parts after the strings have been removed, and wash them. Bring 1 1/4 pounds of fatty mutton to a boil with water and a little salt, add the beans intended for the meal, and cook them with the meat until soft, about 2 hours. Then, thicken the broth with a little flour sautéed in butter, add some chopped parsley, and serve the cooked meat as a side dish.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0017", "image": "0074_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0082.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Saure Schnittbohnen", "title_en": "Sour String Beans", "yield": "", "text": "Man kocht die feingeschnittenen Bohnen in vorher zum Kochen gebrachtem Wasser weich und legt sie zum Abtropfen auf einen Durchschlag. Alsdann schneidet man frischen guten Speck in feine Würfel, bratet diesen langsam hellgelb, nimmt die Grieven heraus und läßt in dem zurückbleibenden Fett 2 Löffel Mehl hellbraun werden, rührt es mit halb Wasser und halb Essig ab, gibt etwas Zucker dazu, würzt mit Salz und einer Prise Pfeffer, und läßt die Bohnen damit durchkochen.", "text_en": "Boil the finely cut beans in water that has been brought to a boil until soft and place them in a colander to drain. Then cut fresh, good bacon into fine cubes, fry this slowly until light yellow, remove the cracklings, and let 2 spoonfuls of flour turn light brown in the remaining fat. Stir it with half water and half vinegar, add some sugar, season with salt and a pinch of pepper, and let the beans boil through with this.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0018", "image": "0075_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0083.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Schnittbohnen mit Aepfeln", "title_en": "String Beans with Apples", "yield": "", "text": "Die feingeschnittenen Bohnen kocht man weich. Während der Zeit kocht man geschälte, in Viertel geschnittene und vom Kernhaus befreite Aepfel (auf 3 Theile Bohnen 1 Theil Aepfel) mit Wasser, Zucker und etwas Citronenschale weich, aber nicht zum Zerfallen, weil sonst das Gemüse unansehnlich wird. 1 Löffel Mehl schwitzt man mit Bratenfett, rührt es mit Wasser und etwas Essig, würzt mit Salz und schüttet es über die Bohnen, die man damit durchkochen läßt. Alsdann mischt man die Aepfel sammt ihrer Säure (was jedoch nicht zu viel sein darf) darunter, läßt einige Stunden durchziehen und richtet hierauf an.", "text_en": "Boil the finely cut beans until soft. During this time, boil peeled, quartered, and cored apples (1 part apples to 3 parts beans) with water, sugar, and a little lemon peel until soft, but not until they fall apart, because otherwise the vegetable will look unappealing. Sweat 1 spoonful of flour with roasting fat, stir it with water and a little vinegar, season with salt, and pour it over the beans, which you then let boil through. Then mix in the apples along with their liquid (which, however, must not be too much), let it sit for a few hours, and then serve.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0018", "image": "0075_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0083.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Schnittbohnen mit Milch", "title_en": "Cream String Beans", "yield": "", "text": "Die Bohnen werden abgezogen, geschnitten, 2 Stunden gekocht und dann auf ein Sieb zum Abtropfen gelegt. Dann bringt man 1 Pint Milch, worin 1 Eßlöffel Butter, etwas Muskatblüthe und Salz zugesetzt ist, zum Kochen, rührt 1—2 Eßlöffel Mehl mit kaltem Wasser glatt, thut dies zu der kochenden Milch und läßt sie unter stetem Rühren etwas kochen, so daß die Sauce recht sämig wird; dann fügt man die Bohnen hinzu, läßt noch einmal aufkochen und gibt vor dem Anrichten noch etwas feingehackte Petersilie dazu.", "text_en": "The beans are stringed, cut, boiled for 2 hours, and then placed on a sieve to drain. Then bring 1 pint of milk, to which 1 tablespoon of butter, some mace, and salt have been added, to a boil; stir 1-2 tablespoons of flour with cold water until smooth, add this to the boiling milk, and let it cook a little while stirring constantly so that the sauce becomes quite creamy; then add the beans, let it boil up once more, and add some finely chopped parsley before serving.", "serving_suggestions": "Man kann geräucherten Schinken, Salzheringe oder Cotelets dazu geben.", "serving_suggestions_en": "You can serve smoked ham, salt herring, or cutlets with this.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0018", "image": "0075_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0083.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Lima-Bohnen", "title_en": "Lima Beans", "yield": "2 portions", "text": "1 Quart Lima-Bohnen liest man aus und läßt sie dann in kaltem Wasser Stunde liegen, wäscht und kocht sie mit etwas Salz, bis sie weich sind. Große Bohnen brauchen manchmal beinahe 1 Stunde, im Durchschnitt 40 Minuten. Dann seiht man sie ab und gibt vor", "text_en": "Pick over 1 quart of Lima beans and let them soak in cold water for an hour, wash them, and boil them with a little salt until they are soft. Large beans sometimes need almost 1 hour, on average 40 minutes. Then drain them and, before [serving]...", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0018", "image": "0075_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0083.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Kohlrabi", "title_en": "Top Turnips", "yield": "2 portions", "text": "Man muß darauf achten, daß man jungen Kohlrabi bekommt, da der alte gewöhnlich beim Kochen holzig bleibt. — 2 oder 3 Kohlrabi schält man ab, schneidet die Krone mit den kleinen Blättern sauber ab, thut sie zu dem in fingerlange dünne Streifen geschnittenen Kohlrabi und läßt Alles in kochendem Wasser einigemal aufwallen, gießt dieses Wasser ab und legt sie dann in kochendes gesalzenes Wasser, worin sie 2 Stunden langsam weichkochen. Dann schwitzt man 1 Löffel Mehl mit 1 Löffel Butter hellgelb, gibt genug Kohlrabiwasser dazu, um eine sämige Sauce zu machen, würzt mit etwas Muskatblüthe, läßt Alles gut durchkochen und schüttet den Kohlrabi in die Sauce. Die Krone mit den Herzblättern hackt man fein und vermischt sie mit dem fertigen Gemüse, ehe dasselbe in der sämigen Sauce aufkocht. Doch kann man auch die abgekochten Blättchen fein schneiden, in Butter dünsten und als Kranz um das angerichtete Gemüse legen.", "text_en": "One must take care to get young kohlrabi, as the old usually remains woody when cooked. Peel 2 or 3 kohlrabi, cut off the crown with the small leaves neatly, add them to the kohlrabi which has been cut into finger-long thin strips, and let everything boil up a few times in boiling water, pour this water off, and then place them in boiling salted water, in which they cook slowly until soft for 2 hours. Then sweat 1 spoonful of flour with 1 spoonful of butter until light yellow, add enough kohlrabi water to make a creamy sauce, season with a little mace, let everything boil through well, and pour the kohlrabi into the sauce. Finely chop the crown with the heart leaves and mix them with the finished vegetable before it boils in the creamy sauce. However, one can also finely cut the boiled leaves, sauté them in butter, and place them as a wreath around the served vegetable.", "serving_suggestions": "Man gibt Salzkartoffeln, Braten, Cotelets oder Fricadellen dazu.", "serving_suggestions_en": "Serve with boiled potatoes, roast, cutlets, or meatballs.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0019", "image": "0076_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0084.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Kohlrabi mit Schinken", "title_en": "Top Turnips with Ham", "yield": "", "text": "Man schneidet jungen Kohlrabi in dünne Scheiben, dünstet ihn mit Butter, Salz und ein wenig Wasser weich, gibt etwas Mehl, mit Butter durchgerührt, dazu und kocht den Kohlrabi so lange, bis keine Brühe zurückbleibt. Alsdann legt man eine fingerdicke Schicht Kohlrabi und eine dünne Schicht mageren Schinken in eine weiße Schüssel bis dieselbe gefüllt ist, rührt dann 3 oder 4 Eier durcheinander, gießt dieselben auf den Kohlrabi und läßt das Gericht verdeckt im Backofen so lange, bis das Eigelb fest geworden ist (ungefähr ¾ Stunden), backen.", "text_en": "Cut young kohlrabi into thin slices, steam until soft with butter, salt, and a little water, add some flour mixed with butter, and cook the kohlrabi until no broth remains. Then place a finger-thick layer of kohlrabi and a thin layer of lean ham into a white dish until it is filled, then stir 3 or 4 eggs together, pour them over the kohlrabi, and let the dish bake covered in the oven until the egg yolk has set (approximately ¾ of an hour).", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0019", "image": "0076_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0084.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Junger Kohlrabi mit Fleisch und Kartoffeln", "title_en": "Beef Stew with Top Turnips", "yield": "2 portions", "text": "2 oder 3 Kohlrabi werden geschält, in Streifen geschnitten, mit Salz bestreut und", "text_en": "2 or 3 kohlrabi are peeled, cut into strips, sprinkled with salt and", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0019", "image": "0076_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0084.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Kohlrüben [Steckrüßen]", "title_en": "Boiled Russian Turnips", "yield": "2 portions", "text": "Man wählt hiervon die gelben, welche wohlschmeckender sind, als die mit weißem Fleische. Eine mittelgroße oder die Hälfte einer großen Kohlrübe wird geschält; man schneidet sie in kleine Würfel oder Scheiben, wäscht sie, läßt sie in kochendem Wasser aufwallen und dann abtropfen. Hierauf bringt man sie in einen Topf mit heißer Fleischbrühe oder kochendem Wasser mit etwas Rinderfett, läßt 2 Stunden kochen und gibt dann 1 Löffel Zucker oder Syrup und ½ Theelöffel Salz dazu und läßt Alles noch einmal durchkochen.", "text_en": "Choose the yellow ones, which are tastier than those with white flesh. A medium-sized or half of a large Russian turnip is peeled; cut it into small cubes or slices, wash it, let it boil up in boiling water, and then drain. Then place them in a pot with hot meat broth or boiling water with a little beef fat, let cook for 2 hours, then add 1 spoonful of sugar or syrup and ½ teaspoon of salt, and let everything boil through once more.", "serving_suggestions": "Als Beilage gibt man gewärmten Braten, Fricadellen, Kalbscotelets, Hammelfleisch oder Ochsenzunge.", "serving_suggestions_en": "As a side dish, serve warmed roast, meatballs, veal cutlets, mutton, or ox tongue.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0020", "image": "0077_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0085.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Kohlrüben mit Kartoffeln und Pökelfleisch", "title_en": "Corned Beef with Russian Turnips and Potatoes", "yield": "2 portions", "text": "1 mittelgroße Kohlrübe wird geschält, in Würfel geschnitten, gewaschen, 5 Minuten gekocht und dann das Wasser weggegossen. Nun bringt man 1½ Pfund Corned Beef oder Rind- oder Hammelfleisch mit Wasser und Salz zum Kochen, fügt die geschnittenen Rüben, ebensoviel Kartoffeln, 1 Lorbeerblatt, ½ Löffel Zucker und etwas Pfeffer dazu und läßt Alles 2 Stunden gut kochen.", "text_en": "1 medium-sized Russian turnip is peeled, cut into cubes, washed, boiled for 5 minutes, and then the water is poured off. Now bring 1½ pounds of corned beef or beef or mutton to a boil with water and salt, add the cut turnips, an equal amount of potatoes, 1 bay leaf, ½ spoonful of sugar, and some pepper, and let everything cook well for 2 hours.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0020", "image": "0077_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0085.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Weiße Rüben", "title_en": "White Turnips", "yield": "2 portions", "text": "4 oder 5 Rüben werden geschält, in Streifen geschnitten, in siedendes Salzwasser gethan, nach einigen Minuten herausgenommen und auf dem Siebe abtropfen gelassen; dann mit Fett, ½ Löffel Zucker und 1 Eßlöffel Essig 1 Stunde lang gekocht. Vor dem Anrichten schwitzt man 1 Löffel Mehl mit 1 Löffel Butter und fügt es bei.", "text_en": "4 or 5 turnips are peeled, cut into strips, placed in boiling salted water, removed after a few minutes, and left to drain on a sieve; then cooked for 1 hour with fat, ½ spoonful of sugar, and 1 tablespoon of vinegar. Before serving, sweat 1 spoonful of flour with 1 spoonful of butter and add it.", "serving_suggestions": "Als Beilage gibt man Cotelets oder gedämpftes Rind-, Hammel- oder Schweinefleisch.", "serving_suggestions_en": "As a side dish, serve cutlets or steamed beef, mutton, or pork.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0020", "image": "0077_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0085.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Pastinaken", "title_en": "Stewed Parsnips", "yield": "2 portions", "text": "6 Pastinaken werden gewaschen, geschabt, der Länge nach durchgeschnitten, nochmals gewaschen und dann in halbfingerlange Stücke geschnitten. Hierauf wird Wasser zum Kochen gebracht, die Pastinaken und 1 Theelöffel Salz beigefügt und 1 Stunde gekocht. Sodann nimmt man 1 Löffel Butter mit 1 Löffel Mehl in eine Pfanne und rührt es untereinander, mischt 1/2 Pint von dem Wasser, in welchem die Pastinalen gekocht haben, hinzu, fügt etwas Pfeffer und Salz bei, kocht, rührt es 5 Minuten lang und schüttet es über die Pastinaken.", "text_en": "6 parsnips are washed, scraped, cut lengthwise, washed again, and then cut into pieces half a finger long. Then water is brought to a boil, the parsnips and 1 teaspoon of salt are added, and they are boiled for 1 hour. Then take 1 spoonful of butter with 1 spoonful of flour into a pan and stir it together, mix in 1/2 pint of the water in which the parsnips were boiled, add some pepper and salt, boil and stir for 5 minutes, and pour it over the parsnips.", "serving_suggestions": "Als Beilage nimmt man Cotelets oder Bratwurst.", "serving_suggestions_en": "Serve with cutlets or bratwurst.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0021", "image": "0078_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0086.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Sellerie mit Butterſauce", "title_en": "Stewed Celery", "yield": "", "text": "Man schneidet den Sellerie in Scheiben oder längliche Stücke und kocht ihn in Salzwasser weich, welches man dann wieder abgießt. Mit etwas von diesem Wasser wird die abgekochte Butterſauce abgerührt und der Sellerie dann hineingethan, welcher, ohne weiter zu kochen, an einen heißen Ort gestellt wird. Beim Anrichten würzt man mit etwas Muskatnuß.", "text_en": "Cut the celery into slices or oblong pieces and boil it until soft in salted water, which is then drained off. The prepared butter sauce is stirred with a little of this water, and the celery is then added, which is placed in a hot spot without further boiling. When serving, season with a little nutmeg.", "serving_suggestions": "Man gibt Kalbscotelets oder Rindfleisch dazu.", "serving_suggestions_en": "Serve with veal cutlets or beef.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0021", "image": "0078_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0086.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Kürbismus", "title_en": "Stewed Pumpkin", "yield": "", "text": "Der in Scheiben geschnittene Kürbis wird geschält und gebrüht und, nachdem dieses Wasser durch das Sieb weggegossen ist, kommt der Kürbis mit frischem Wasser und etwas Salz ans Feuer und wird, wenn er weich gekocht ist, durch ein nicht zu enges Sieb gerührt. Zu diesem Mus kommt dann gute Milch und einige geriebene bittere Mandeln. Sobald es noch ein wenig verrührt ist, wird es mit Zucker und Zimmt oder mit gestoßenem Pfeffer gewürzt.", "text_en": "The sliced pumpkin is peeled and scalded, and after this water is poured off through a sieve, the pumpkin is put on the fire with fresh water and some salt, and when it is boiled soft, it is stirred through a not-too-fine sieve. Good milk and some grated bitter almonds are then added to this puree. As soon as it is stirred a little more, it is seasoned with sugar and cinnamon or with ground pepper.", "serving_suggestions": "Man gibt gebratenes Fleisch dazu.", "serving_suggestions_en": "Serve with roasted meat.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0021", "image": "0078_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0086.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Gebratene Eierpflanze", "title_en": "Fried Egg Plant", "yield": "", "text": "Man schneidet die Eierpflanze in 1/2 Zoll dicke Scheiben, schält jedes Stück achtsam, streut etwas Salz und Pfeffer über jede Scheibe, legt sie ins Wasser, beschwert sie mit einem Teller, damit sie unter Wasser bleibe und läßt sie 1 Stunde darin; hierauf trocknet man sie stückweise ab, taucht sie in Ei und dann in Crackerkrumen und bäckt sie in heißem Fett schön braun.", "text_en": "Cut the eggplant into 1/2 inch thick slices, peel each piece carefully, sprinkle some salt and pepper over each slice, place them in water, weigh them down with a plate so they remain submerged, and let them sit for 1 hour; then dry them piece by piece, dip them in egg and then in cracker crumbs, and fry them in hot fat until nicely browned.", "serving_suggestions": "Man gibt Tomato-Catsup dazu.", "serving_suggestions_en": "Serve with tomato catsup.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0021", "image": "0078_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0086.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Blumenkohl", "title_en": "Cauliflower", "yield": "2 portions", "text": "Man entfernt mit einem Messer alle die großen und kleinen Blättchen, welche den Blumenkohl umgeben, zertheilt dann, wenn es eine große, schöne", "text_en": "Remove with a knife all the large and small leaves that surround the cauliflower, then divide, if it is a large, beautiful [piece]...", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0021", "image": "0078_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0086.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Blumenkohl", "title_en": "Cauliflower", "yield": "", "text": "Blume ist, dieselbe in kleine Röschen, zieht die Stengel gut ab und legt sie Stunde in schwach gesalzenes Wasser. Hierauf werden sie in kochendes Salzwasser gelegt und darin bis Stunde gekocht; dann legt man sie 1 Minute zum Abtropfen auf ein Sieb und richtet sie, die Stiele nach unten, kuppelförmig auf einer runden erwärmten Schüssel an und deckt schnell zu. Hierauf läßt man 1 Eßlöffel Butter in einer Pfanne heiß werden, nimmt 1 Löffel Mehl, läßt es darin schwitzen, gießt 1 Pint Fleischbrühe oder Blumenkohlwasser, mit etwas Muskatnuß, dazu und läßt es aufkochen; dann wird noch 1 in Wasser verrührtes Eigelb dazu gerührt. Hierauf gießt man diese Sauce über den Blumenkohl und den Rest in eine Sauciere.", "text_en": "Take the cauliflower, break it into small florets, peel the stems well, and place them in lightly salted water for an hour. Then, place them in boiling salted water and cook for up to an hour; then place them on a sieve for 1 minute to drain, arrange them dome-shaped on a round warmed dish with the stems facing down, and cover quickly. Then, let 1 tablespoon of butter get hot in a pan, add 1 spoonful of flour, let it sweat, pour in 1 pint of meat broth or cauliflower water with a little nutmeg, and let it boil up; then stir in 1 egg yolk mixed with water. Pour this sauce over the cauliflower and the rest into a sauceboat.", "serving_suggestions": "Man gibt Würstchen, Cotelets, geräucherten Lachs, gekochte Ochsenzunge oder gebratene Hühnchen dazu.", "serving_suggestions_en": "Serve with sausages, cutlets, smoked salmon, boiled ox tongue, or fried chicken.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0022", "image": "0079_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0087.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Gebackener Blumenkohl", "title_en": "Baked Cauliflower", "yield": "", "text": "Blumenkohlreste vom vorigen Tage taucht man in Ei und wälzt sie in geriebener Semmel oder Zwieback und bäckt sie dann in Butter oder Schmalz.", "text_en": "Dip leftover cauliflower from the previous day into egg, roll in breadcrumbs or zwieback, and then fry in butter or lard.", "serving_suggestions": "Beim Anrichten kann man sie mit gebackener Petersilie umgeben.", "serving_suggestions_en": "When serving, you can garnish them with fried parsley.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0022", "image": "0079_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0087.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Gedünstete Tomaten", "title_en": "Stewed Tomatoes", "yield": "2 portions", "text": "(Diese Frucht stammt aus Peru in Südamerika, gelangte durch die Spanier nach Europa und hat in Deutschland im Volksmunde den Namen Paradies= oder Liebesapfel erhalten.) 6–8 schöne Tomaten werden mit kochendem Wasser gebrüht; man schält und schneidet sie auf und entfernt alle harten und unreifen Theile. Dann legt man sie in eine Pfanne, läßt sie 20 Minuten unter öfterem Umrühren dünsten, gibt 1 Eßlöffel Butter, 1 Theelöffel Zucker, 1 Theelöffel gehackte Zwiebel, Salz und Pfeffer dazu und läßt noch Stunde langsam dünsten.", "text_en": "(This fruit originates from Peru in South America, reached Europe through the Spanish, and has received the name 'paradise apple' or 'love apple' in common parlance in Germany.) Scald 6–8 nice tomatoes with boiling water; peel and cut them open, and remove all hard and unripe parts. Then place them in a pan, let them stew for 20 minutes while stirring frequently, add 1 tablespoon of butter, 1 teaspoon of sugar, 1 teaspoon of chopped onion, salt, and pepper, and let them stew slowly for another hour.", "serving_suggestions": "Man gibt gekochtes und gebratenes Fleisch verschiedener Art dazu.", "serving_suggestions_en": "Serve with various kinds of boiled and roasted meat.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0022", "image": "0079_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0087.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Gebackene Tomaten", "title_en": "Baked Tomatoes", "yield": "2 portions", "text": "Von 6 gleichgroßen schönen Tomaten schneidet man ein Stück um den Stiel ab und entfernt vorsichtig mit dem Finger den inneren Theil. Dann mischt man Tasse feingehackten, gekochten Schinken, 2 Löffel Weißbrodkrumen, 1 Löffel gehackte Petersilie, Theelöffel Salz, 1 Prise Pfeffer und 1 Löffel geschmolzene Butter zusammen. Damit füllt man die Tomaten, häufelt die Fülle in der", "text_en": "From 6 nice tomatoes of equal size, cut off a piece around the stem and carefully remove the inner part with your finger. Then mix together a cup of finely chopped cooked ham, 2 spoonfuls of white breadcrumbs, 1 spoonful of chopped parsley, a teaspoon of salt, 1 pinch of pepper, and 1 spoonful of melted butter. Fill the tomatoes with this, mounding the filling in the", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0022", "image": "0079_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0087.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Gefüllte Tomaten", "title_en": "Stuffed Tomatoes", "yield": "2 portions", "text": "6 Tomaten werden, wie vorher angegeben, von den Samenkörnern gereinigt. In einer Schüssel mischt man 1 Tasse trockene Weißbrodkrumen mit 1/2 Theelöffel Salz, 1 Prise Pfeffer, 1 Theelöffel gehackte Zwiebel und 1 Löffel geschmolzene Butter, füllt die Tomate damit und dämpft sie im heißen Ofen 1/2 Stunde. Man kann auch etwas Hühner- oder Kalbfleisch zur Fülle verwenden.", "text_en": "6 tomatoes are cleaned of their seeds as previously indicated. In a bowl, mix 1 cup of dry white breadcrumbs with 1/2 teaspoon of salt, 1 pinch of pepper, 1 teaspoon of chopped onion, and 1 spoonful of melted butter; fill the tomatoes with this and steam them in a hot oven for 1/2 hour. One can also use some chicken or veal for the filling.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0023", "image": "0080_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0088.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Gebratene Tomaten", "title_en": "Fried Tomatoes", "yield": "2 portions", "text": "6 Tomaten werden gewaschen und quer in 2 Hälften geschnitten. Dann legt man die Hälften mit der Hautseite nach unten in eine Pfanne, schneidet 1/4 Pfund Butter in kleine Stückchen und vertheilt sie über die Tomaten, würzt mit Pfeffer und Salz und läßt sie über einem mäßigen Feuer 20 Minuten braten. Wenn sie weich sind, legt man sie mit dem Kuchenwender auf eine gewärmte Schüssel. Hierauf läßt man die in der Pfanne übrige Butter schnell braun werden, mischt 2 Löffel Mehl damit, gießt 1 Pint Milch dazu, rührt fortwährend bis es kocht, würzt mit Pfeffer und Salz, gießt es über die Tomaten und trägt dieselben dann auf.", "text_en": "6 tomatoes are washed and cut crosswise into 2 halves. Then place the halves skin-side down in a pan, cut 1/4 pound of butter into small pieces and distribute them over the tomatoes, season with pepper and salt, and let them fry over a moderate fire for 20 minutes. When they are soft, place them onto a warmed dish using a spatula. Then, let the remaining butter in the pan brown quickly, mix 2 spoonfuls of flour with it, pour in 1 pint of milk, stir continuously until it boils, season with pepper and salt, pour it over the tomatoes, and then serve them.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0023", "image": "0080_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0088.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Curry-Tomaten", "title_en": "Curried Tomatoes", "yield": "", "text": "1 Tasse Reis wird mehreremal mit kaltem Wasser gewaschen. Dann mischt man 1 Theelöffel Currypulver und Salz zu 1 Quart gedünstete Tomaten gut zusammen. Auf dem Boden einer Backschüssel macht man 1 Lage Tomaten, dann 1 Lage ungekochten Reis, dann wieder Tomaten bis Alles verbraucht ist; doch muß die oberste Lage aus Tomaten bestehen. Dann streut man geriebenes Weißbrot darüber, vertheilt einige Klümpchen Butter darauf und bäckt bei mäßiger Hitze 1/2 Stunde.", "text_en": "1 cup of rice is washed several times with cold water. Then mix 1 teaspoon of curry powder and salt well into 1 quart of stewed tomatoes. On the bottom of a baking dish, make 1 layer of tomatoes, then 1 layer of uncooked rice, then tomatoes again until everything is used up; however, the top layer must consist of tomatoes. Then sprinkle grated white bread over it, distribute a few small lumps of butter on top, and bake at a moderate heat for 1/2 hour.", "serving_suggestions": "Man servirt in der Schüssel, in welcher es gebacken ist.", "serving_suggestions_en": "Serve in the dish in which it was baked.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0023", "image": "0080_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0088.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "general_instruction", "title_de": "Gekochte Maiskolben", "title_en": "Boiled Sweet Corn", "yield": "", "text": "Die Maiskolben sollten so bald als möglich nach dem Abbrechen gekocht werden, da sie durch längeres Liegen ihre Süße verlieren. Kurz vor dem Kochen entfernt man die Blätterhülsen und seidenähnlichen Fä-", "text_en": "The corn cobs should be cooked as soon as possible after picking, as they lose their sweetness if left lying for too long. Shortly before cooking, remove the husks and silk-like fi-", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0023", "image": "0080_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0088.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Gedünstefer Mais", "title_en": "Stewed Corn", "yield": "2 portions", "text": "4 Maiskolben werden entkörnt und die Körner in einer Pfanne mit 3 Löffel Rahm, 1 Löffel Butter, ½ Theelöffel Salz gemischt und ¾ Stunde unter öfterem Umrühren gekocht.", "text_en": "4 ears of corn are shelled and the kernels mixed in a pan with 3 spoonfuls of cream, 1 spoonful of butter, ½ teaspoon of salt and cooked for ¾ of an hour, stirring frequently.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0026", "image": "0081_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0089.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Schmorgurken", "title_en": "Fried Cucumbers", "yield": "", "text": "Die Gurken werden geschält, der Länge nach in ½ Zoll dicke Stücke geschnitten, in Ei und dann in Weizenmehl getaucht, gesalzen, gepfeffert, in Butter schön braun gebraten und hierauf warm servirt.", "text_en": "The cucumbers are peeled, cut lengthwise into ½ inch thick pieces, dipped in egg and then in wheat flour, salted, peppered, fried nicely brown in butter and then served warm.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0026", "image": "0081_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0089.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Succotash", "title_en": "Succotash", "yield": "2 portions", "text": "1 Pint Lima= oder Butterbohnen werden enthülst, in einen Topf mit kochendem Wasser gethan, so daß sie davon bedeckt sind — nicht mehr. Man fügt 1 Theelöffel Salz nebst 1 Prise Backpulver bei, kocht sie 25 Minuten und gießt dann den größeren Theil des Wassers weg. Eine gleiche Menge oder etwas mehr von Mais, der von dem Kolben geschnitten worden (Green Corn), wird dann hinzugethan, ½ Pint Milch, 1 Löffel Butter, 1 Löffel Mehl, Pfeffer, Salz und etwas Muskatnuß dazu gemischt, unter fortwährendem Rühren 5 Minuten lang gekocht und hernach angerichtet.", "text_en": "1 pint of lima or butter beans are shelled, put into a pot with boiling
