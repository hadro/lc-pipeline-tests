 water so that they are covered by it — no more. Add 1 teaspoon of salt along with 1 pinch of baking powder, cook them for 25 minutes and then pour away the greater part of the water. An equal amount or slightly more of corn that has been cut from the cob (Green Corn) is then added, ½ pint of milk, 1 spoonful of butter, 1 spoonful of flour, pepper, salt and a little nutmeg are mixed in, cooked for 5 minutes while stirring continuously, and then served.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0026", "image": "0081_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0089.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Rothkraut", "title_en": "Red Cabbage", "yield": "2 portions", "text": "Ein recht fester Kopf Rothkraut wird, nachdem die schlechten Blätter entfernt sind, in zwei Hälften und dann so fein wie möglich in recht lange Streifen geschnitten. In einem irdenen oder Granittopfe wird 1 Löffel Butter und 1 Löffel Schmalz heiß gemacht, oder auch ¼ Pfund Speck fein geschnitten und darin 1 feingeschnittene Zwiebel gelb geröstet. Das geschnittene Kraut wird dazugegeben und mit 3 Löffeln Essig, 1 Löffel Zucker, etwas Salz, Pfeffer und 1 Tasse Wasser in 2 Stunden, gut zugedeckt, weich gedünstet. Man schwenkt es während dieser Zeit öfters um, damit es nicht anbrennt; wenn es keine Brühe mehr hat, füllt man etwas heißes Wasser nach. Ungefähr ½ Stunde vor dem Anrichten stäubt man 1 Löffel Mehl darüber, gibt 1 Glas Rothwein oder einen in Stücke geschnittenen säuerlichen Apfel", "text_en": "A quite firm head of red cabbage is, after the bad leaves are removed, cut into two halves and then as finely as possible into quite long strips. In an earthenware or granite pot, 1 spoonful of butter and 1 spoonful of lard are heated, or alternatively ¼ pound of bacon is finely cut and 1 finely chopped onion is roasted yellow in it. The cut cabbage is added and stewed soft, well covered, for 2 hours with 3 spoonfuls of vinegar, 1 spoonful of sugar, a little salt, pepper and 1 cup of water. One tosses it frequently during this time so that it does not burn; if it no longer has any broth, one adds a little hot water. Approximately ½ hour before serving, one dusts 1 spoonful of flour over it, adds 1 glass of red wine or a tart apple cut into pieces", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0026", "image": "0081_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0089.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Bayrisch Kraut", "title_en": "Stewed Cabbage, Bavarian Style", "yield": "2 portions", "text": "1 kleiner Kopf oder die Hälfte eines großen Kopfes Weißkraut wird sehr fein, nudelartig, geschnitten. In einem irdenen oder Granittopfe läßt man ¼ Pfund in Würfel geschnittenen Speck heiß werden, fügt 1 Löffel fein geschnittene Zwiebel, 1 Glas Weißwein oder 1 Löffel Essig, ½ Tasse Wasser oder Fleischbrühe, sowie das Kraut hinzu und läßt es 1½ Stunde, gut zugedeckt, kochen. ¼ Stunde vor dem Anrichten stäubt man 1 Löffel Mehl, ½ Theelöffel Salz, 1 Theelöffel Zucker, etwas geriebene Muskatnuß und Pfeffer darüber und läßt es aufkochen.", "text_en": "1 small head or half of a large head of white cabbage is cut very finely, like noodles. In an earthenware or granite pot, let ¼ pound of diced bacon get hot, add 1 spoonful of finely chopped onion, 1 glass of white wine or 1 spoonful of vinegar, ½ cup of water or meat broth, as well as the cabbage, and let it cook covered for 1½ hours. 15 minutes before serving, sprinkle 1 spoonful of flour, ½ teaspoon of salt, 1 teaspoon of sugar, some grated nutmeg, and pepper over it and let it come to a boil.", "serving_suggestions": "Bratwürste, Cotelets, Pökelzunge oder Gänsebraten eignen sich als Beilagen.", "serving_suggestions_en": "Bratwurst, cutlets, pickled tongue, or roast goose are suitable as side dishes.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0027", "image": "0082_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0090.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Grün- oder Braunkohl", "title_en": "Sprouts", "yield": "2 portions", "text": "Der Braunkohl ist am besten, wenn er etwas Frost bekommen hat. Von 1 Quart Kohl streift man die Blätter von den Stielen ab und entfernt die welken oder von Raupen zerstörten Blätter und sucht die zarten, krausen, heraus. Nachdem diese Blätter in vielem Wasser reingewaschen sind, werden sie in einem Topf mit kaltem, gesalzenen Wasser aufgestellt und ¼ Stunde lang gekocht. Dann schüttet man den Kohl in ein Sieb, gießt kaltes Wasser darüber, drückt das Wasser aus und wiegt den Kohl recht fein. 1 Löffel fein geschnittene Zwiebel wird in 1 Löffel zerlassener Butter oder Schmalz gelb geröstet, etwas feingeschnittener Speck, sowie 1 Löffel Nieren= oder Gänsefett hinzugefügt; man gibt dann das Kohlkraut, sowie etwas Salz und Pfeffer dazu und läßt es 2 Stunden kochen. ¼ Stunde vor dem Anrichten wird 1 Löffel Mehl darüber gestreut und ½ Tasse Milch oder süßer Rahm darunter gerührt; dann läßt man es langsam durchkochen.", "text_en": "Kale is best when it has had a little frost. From 1 quart of kale, strip the leaves from the stems, remove the wilted leaves or those destroyed by caterpillars, and select the tender, curly ones. After these leaves have been washed clean in plenty of water, they are placed in a pot with cold, salted water and boiled for 15 minutes. Then pour the kale into a sieve, pour cold water over it, squeeze out the water, and chop the kale very finely. 1 spoonful of finely chopped onion is sautéed until yellow in 1 spoonful of melted butter or lard; add some finely chopped bacon as well as 1 spoonful of kidney fat or goose fat; then add the kale, as well as some salt and pepper, and let it cook for 2 hours. 15 minutes before serving, 1 spoonful of flour is sprinkled over it and ½ cup of milk or sweet cream is stirred in; then let it cook through slowly.", "serving_suggestions": "Beim Anrichten garnirt man den Kohl mit kleinen Schmorkartoffeln oder gekochten Kastanien. Als Beilage gibt man Gänsebraten, Bratwürste oder geräuchertes Schweinefleisch.", "serving_suggestions_en": "When serving, garnish the kale with small braised potatoes or boiled chestnuts. As a side dish, serve roast goose, bratwurst, or smoked pork.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0027", "image": "0082_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0090.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Braunkohl mit Hafergrütze", "title_en": "Sprouts with Oats", "yield": "", "text": "Der Kohl wird nach vorstehendem Recept vorbereitet, gewaschen, ab=", "text_en": "The kale is prepared according to the preceding recipe, washed, [and]...", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0027", "image": "0082_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0090.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Wirſing oder Welschkohl", "title_en": "Savoy Cabbage", "yield": "2 portions", "text": "Ein schöner Kopf Wirsing wird nach Beseitigung der äußeren Blätter in Viertel getheilt, von den Strünken befreit, 1/4 Stunde in siedendem Salzwasser gekocht, herausgenommen, mit kaltem Wasser übergossen, ausgedrückt und dann grob gehackt. Dann röstet man 1 Löffel feingehackte Zwiebel in 1 Löffel Butter oder Nierenfett in einem irdenen oder Granittopfe, gibt den Kohl hinzu, würzt mit etwas Salz und geriebener Muskatnuß, gießt mit ½ Löffel Mehl verdickte Fleischbrühe darüber und dämpft das Gemüse, gut zugedeckt, ½ Stunde. Vorzüglich schmeckt der Kohl, wenn man ihn mit der Brühe von gedämpfter oder gebratener Ente oder Gans dünstet.", "text_en": "A nice head of Savoy cabbage is divided into quarters after removing the outer leaves, freed from the stalks, boiled for 1/4 hour in boiling salted water, taken out, doused with cold water, squeezed out, and then coarsely chopped. Then roast 1 spoonful of finely chopped onion in 1 spoonful of butter or kidney fat in an earthenware or granite pot, add the cabbage, season with a little salt and grated nutmeg, pour over meat broth thickened with 1/2 spoonful of flour, and steam the vegetable, well covered, for 1/2 hour. The cabbage tastes excellent if one stews it with the broth of steamed or roasted duck or goose.", "serving_suggestions": "Man gibt gekochtes Rind- oder Hammelfleisch, Cotelets, gekochten Schinken, Zunge oder Bratwurst nebst Kartoffeln dazu.", "serving_suggestions_en": "Serve with boiled beef or mutton, cutlets, boiled ham, tongue, or bratwurst along with potatoes.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0028", "image": "0083_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0091.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Weiszkraut, Weiszkohl", "title_en": "Cabbage", "yield": "2 portions", "text": "Ein fester, weißer Krautkopf wird auf dieselbe Art zubereitet wie der Wirsingkohl, doch fügt man als Würze noch etwas Kümmel bei. Anstatt der Fleischbrühe kann man 3 Tassen Wasser und 2 Löffel Nierenfett benützen.", "text_en": "A firm, white head of cabbage is prepared in the same way as the Savoy cabbage, but one adds a little caraway seed as seasoning. Instead of meat broth, one can use 3 cups of water and 2 spoonfuls of kidney fat.", "serving_suggestions": "Hammelfleisch, gekocht oder gebraten, Schweins- oder Kalbs-Cotelets, Bratwurst und Kartoffeln sind passende Beilagen.", "serving_suggestions_en": "Mutton, boiled or roasted, pork or veal cutlets, bratwurst, and potatoes are suitable side dishes.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0028", "image": "0083_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0091.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Weiszkraut mit Hammelfleisch", "title_en": "Cabbage with Mutton", "yield": "2 portions", "text": "Ein mittelgroßer Krautkopf wird von den äußeren Blättern befreit, in Viertel getheilt, in fingerbreite Stücke geschnitten und abgebrüht. Sodann bringt man 1 bis 1½ Pfund Hammelfleisch in 1 Quart Wasser zum Kochen, legt den gut ausgedrückten Kohl in den Fleischtopf, streut etwas Salz darüber und läßt Alles 2½ Stunden langsam kochen. Man kann auch die Kartoffeln mit dem Kraut zusammen kochen; in solchem Falle lege man dieselben 1 Stunde vor dem Anrichten, sauber abgewaschen, oben auf das Kraut, wo sie langsam gar werden.", "text_en": "A medium-sized head of cabbage is freed from the outer leaves, divided into quarters, cut into finger-wide pieces, and scalded. Then bring 1 to 1½ pounds of mutton to a boil in 1 quart of water, place the well-squeezed cabbage into the meat pot, sprinkle a little salt over it, and let everything cook slowly for 2½ hours. One can also cook the potatoes together with the cabbage; in such a case, place them, cleanly washed, on top of the cabbage 1 hour before serving, where they will slowly cook through.", "serving_suggestions": "Hierzu reicht man Salzkartoffeln.", "serving_suggestions_en": "Serve with boiled potatoes.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0028", "image": "0083_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0091.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Sauerkraut", "title_en": "Sauerkraut", "yield": "2 portions", "text": "Von allen Kraut- und Kohlarten ist Sauerkraut die am leichtesten verdauliche. Durch die Gährung bildet sich Milchsäure, welche dem Kraut den eigenthümlichen Geruch und Geschmack verleiht. 1 Pint Sauerkraut wird ausgedrückt; nur wenn es zu sauer oder zu salzig wäre, wird es leicht gewaschen. In einem irdenen oder Granittopfe wird das Kraut mit 1 Löffel Schmalz und soviel heißem Wasser, daß es das Kraut bedeckt, 2 Stunden gekocht. Kocht man ein Stück Schinken oder Schweinefleisch mit dem Kraut, so wird es um so kräftiger. 1 Stunde vor dem Anrichten kann man auch 4 Pfund gebratenen Speck, ohne die Grieven, zu dem Kraut geben. Ist das Kraut zu sehr eingekocht, so gießt man 1 Glas Weißwein oder warmes Wasser dazu. Fügt man 4 Stunde vor dem Anrichten einige in Viertel geschnittene Aepfel hinzu, so kann der Wein auch wegbleiben. Nach Belieben kann man das Kraut 4 Stunde vor dem Anrichten mit & Löffel Mehl stäuben und damit aufkochen lassen.", "text_en": "Of all types of cabbage and kale, sauerkraut is the most easily digestible. Through fermentation, lactic acid is formed, which gives the cabbage its characteristic smell and taste. 1 pint of sauerkraut is squeezed out; only if it is too sour or too salty should it be lightly washed. In an earthenware or granite pot, the cabbage is cooked for 2 hours with 1 spoonful of lard and enough hot water to cover the cabbage. If one cooks a piece of ham or pork with the cabbage, it becomes all the more hearty. 1 hour before serving, one can also add 4 pounds of fried bacon, without the cracklings, to the cabbage. If the cabbage has boiled down too much, pour in 1 glass of white wine or warm water. If one adds a few apples cut into quarters 4 hours before serving, the wine can be omitted. As desired, one can dust the cabbage with a spoonful of flour 4 hours before serving and let it boil up with it.", "serving_suggestions": "Hasenbraten, Bratwürste, Schinken, Kalbsbraten, Wildpret, Schweinebraten und Salzkartoffeln sind passende Beilagen.", "serving_suggestions_en": "Roast hare, bratwurst, ham, roast veal, game, roast pork, and boiled potatoes are suitable side dishes.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0029", "image": "0084_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0092.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Sauerkraut mit Erbsen", "title_en": "Sauerkraut with Split Peas", "yield": "2 portions", "text": "Das Sauerkraut wird in Wasser weichgekocht, abgegossen, mit 1 Löffel Schmalz verrührt und noch eine Weile gedünstet. Nebenbei kocht man 1 Pint trockene Erbsen in Wasser weich, schüttet das Wasser ab, gießt Rind- oder Schweinefleischbrühe daran, auch Schinkenbrühe, wenn man deren hat, kocht die Erbsen noch 4 Stunde damit, drückt sie durch ein Sieb, läßt sie nochmals heiß werden, bestreut sie beim Anrichten mit geriebenem, in Butter geröstetem Weißbrot, gibt das Sauerkraut in einer andern Schüssel auf, garnirt es mit Bratwürsten, gibt Schinken oder Pökelfleisch dazu und ißt Kraut und Erbsen zusammen.", "text_en": "The sauerkraut is boiled until soft in water, drained, stirred with 1 spoonful of lard, and stewed for a while longer. Meanwhile, boil 1 pint of dried peas in water until soft, pour off the water, pour beef or pork broth over them, also ham broth if you have any, cook the peas for another 4 hours with it, press them through a sieve, let them get hot again, sprinkle them when serving with grated white bread toasted in butter, serve the sauerkraut in a different bowl, garnish it with bratwurst, add ham or salt pork, and eat the cabbage and peas together.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0029", "image": "0084_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0092.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Sauerkraut mit Austern", "title_en": "Sauerkraut with Fried Oysters", "yield": "2 portions", "text": "Man befreit 2 Dutzend Austern von den Bärten, trocknet sie ab, bestreut jede Auster mit Pfeffer und Salz, wälzt sie in Mehl und dann in Ei und geriebenem Weißbrot, bäckt sie in heißem Schmalz hellbraun und richtet sie in der Mitte des Sauerkrautes, das man nach dem vorhergehenden Recept gekocht und mit etwas Weißwein und Mehlschwitze gebunden hat, an.", "text_en": "Remove the beards from 2 dozen oysters, dry them off, sprinkle each oyster with pepper and salt, roll them in flour and then in egg and grated white bread, fry them in hot lard until light brown, and arrange them in the middle of the sauerkraut, which has been cooked according to the previous recipe and thickened with a little white wine and a roux.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0029", "image": "0084_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0092.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Sauerkraut mit saurer Sahne", "title_en": "Sauerkraut with Cream", "yield": "2 portions", "text": "Hat man 1 Pint Sauerkraut, wie oben angegeben, gar gekocht, so schneidet man 1 Zwiebel in Scheiben, schwitzt sie in Butter weiß und weich, fügt 1 Löffel Mehl und 1 Tasse sauren Rahm dazu, läßt es aufkochen, streicht diese Sauce durch einen feinen Durchschlag und mischt das Kraut darunter. Dies ist besonders im Frühjahr zu empfehlen, wenn das Kraut den Weingeschmack verloren hat.", "text_en": "If you have cooked 1 pint of sauerkraut until done, as indicated above, slice 1 onion, sweat it in butter until white and soft, add 1 spoonful of flour and 1 cup of sour cream, let it come to a boil, strain this sauce through a fine colander, and mix the cabbage into it. This is especially recommended in the spring when the cabbage has lost its wine flavor.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0030", "image": "0085_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0093.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Sauerkraut mit Hecht", "title_en": "Sauerkraut with Pike", "yield": "", "text": "Sauerkraut wird wie angegeben, weich gekocht; auch wird ein 2-pfündiger Hecht gekocht, in kleine Stücke zerpflückt und von den Gräten befreit. Dann mischt man das Kraut mit 1 Tasse saurer Sahne, richtet es mit dem Fisch schichtenweise in eine Porzellanschüssel, träufelt etwas Citronensaft darüber, bestreut es mit geriebenem Weißbrot und gibt etwas zerlassene Butter darüber; hierauf bäckt man es im Ofen ½ Stunde. Anstatt des Fisches kann man auch gebratenes Schweinefleisch oder gekochten Schinken verwenden.", "text_en": "Sauerkraut is cooked until soft as indicated; also, a 2-pound pike is cooked, flaked into small pieces, and freed from the bones. Then mix the cabbage with 1 cup of sour cream, arrange it in layers with the fish in a porcelain dish, drizzle some lemon juice over it, sprinkle with grated white bread, and add some melted butter; then bake it in the oven for ½ hour. Instead of fish, one can also use roasted pork or boiled ham.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0030", "image": "0085_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0093.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Löwenzahn", "title_en": "Boiled Dandelions", "yield": "", "text": "Man benützt die ersten Sprossen dieses vorzüglichen und billigen Frühjahrgemüses vor dem Blühen; nach der Blüthe ist es etwas bitter. Gegen Verstopfung und Hämorrhoiden ist Löwenzahn ein empfehlenswerthes Volksmittel. Man benutzt die kleinen Blätter und kocht dieselben wie Spinat.", "text_en": "Use the first sprouts of this excellent and inexpensive spring vegetable before it blooms; after blooming, it is somewhat bitter. Dandelion is a recommended folk remedy for constipation and hemorrhoids. Use the small leaves and cook them like spinach.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0030", "image": "0085_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0093.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Artischocken", "title_en": "Artichokes", "yield": "", "text": "Diese werden sauber geputzt, die Spitzen mittelst einer Scheere abgeschnitten und die äußeren Blätter beseitigt; dann kocht man sie 1½ Stunden in Salzwasser weich, läßt sie abtropfen, nimmt in der Mitte den sogenannten Bart weg (alles Rauhe und Faserige), bereitet eine Buttersauce mit einer Einlage von fein gewiegter Petersilie und Sardellen, legt die Artischocken zierlich auf die Platte und gießt die Sauce darüber. Artischocken gelten als Heilmittel gegen die Sicht.", "text_en": "These are cleaned thoroughly, the tips cut off with scissors, and the outer leaves removed; then boil them in salted water for 1½ hours until soft, let them drain, remove the so-called beard in the center (all the rough and fibrous parts), prepare a butter sauce with an addition of finely minced parsley and anchovies, arrange the artichokes daintily on a platter, and pour the sauce over them. Artichokes are considered a remedy for gout.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0030", "image": "0085_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0093.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Rhabarber", "title_en": "Rhubarb", "yield": "", "text": "Die Blattstiele werden wie beim Spargel abgezogen und in längliche Stücke geschnitten; in kochendem Wasser läßt man sie 20 Minuten lang ziehen und dünstet sie mit Butter und Zucker gar.", "text_en": "The leaf stalks are peeled like asparagus and cut into oblong pieces; let them steep in boiling water for 20 minutes and stew them until done with butter and sugar.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0030", "image": "0085_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0093.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Rosenkohl", "title_en": "Brussels Sprouts", "yield": "", "text": "Rosenkohl gehört zu den feinsten und wohlschmeckendsten Gemüsen. Nachdem die Rosen von dem Stengel abgeschnitten worden, werden sie sauber geputzt, gewaschen und in siedendem Salzwasser rasch weich gekocht (die Köpfchen müssen jedoch ganz bleiben) und mit kaltem Wasser abgeschwenkt. Dann bereitet man eine sämige Butterſauce, legt sie hinein, würzt mit Muskatnuß und, nachdem die Röschen kurz darin aufgekocht, servirt man sie sofort.", "text_en": "Brussels sprouts are among the finest and most delicious vegetables. After the sprouts have been cut from the stem, they are cleaned well, washed, and boiled quickly in boiling salted water until tender (the little heads must remain whole), then rinsed with cold water. Then, prepare a creamy butter sauce, place them in it, season with nutmeg, and after the sprouts have boiled briefly in it, serve immediately.", "serving_suggestions": "Beilagen sind: Cotelets, geräucherte Zunge und Bratwürste.", "serving_suggestions_en": "Side dishes are: cutlets, smoked tongue, and sausages.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0031", "image": "0086_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0094.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Endiviengemüse", "title_en": "Endive", "yield": "", "text": "Von nicht allzu gelben Endivienköpfen werden die etwas bitteren Stengel ausgeschnitten, die Blätter sauber gewaschen, in Salzwasser aufwallen gelassen, abgeschwenkt, ausgedrückt, nicht zu fein geschnitten und in Butter gedünstet; dann stäubt man etwas Mehl darüber und gibt Fleischbrühe und etwas Zucker daran.", "text_en": "From not-too-yellow heads of endive, the somewhat bitter stems are cut out, the leaves are washed clean, allowed to boil up in salted water, rinsed, squeezed out, not cut too finely, and stewed in butter; then dust a little flour over it and add meat broth and a little sugar.", "serving_suggestions": "Hammel- oder Kalbscotelets eignen sich am besten dazu.", "serving_suggestions_en": "Mutton or veal cutlets are best suited for this.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0031", "image": "0086_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0094.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Salatgemüse", "title_en": "Dutched Lettuce", "yield": "2 portions", "text": "Von 2 festen Salatköpfen werden die schlechten Blätter abgenommen, die Köpfe in 4 Theile geschnitten, rasch gewaschen und in kochendes Wasser geschüttet. Sobald der Salat weich ist, wird er herausgenommen und grob geschnitten. Inzwischen rührt man Löffel Mehl mit 3 Löffeln kalter Milch, gibt Salz und gewiegte Zwiebel sowie das Wasser, in welchem der Salat gekocht hat, dazu und läßt dies kochen, bis die Zwiebel ganz weich ist. Dann schlägt man es durch ein Sieb, gibt den geschnittenen Salat, 1 Löffel Butter und (so man hat) Löffel Fleischextrakt hinzu und stellt das Gemüse noch 4 Stunde ans Feuer, ohne es kochen zu lassen.", "text_en": "From 2 firm heads of lettuce, remove the bad leaves, cut the heads into 4 parts, wash quickly, and throw into boiling water. As soon as the lettuce is tender, it is taken out and coarsely chopped. Meanwhile, stir a spoonful of flour with 3 spoonfuls of cold milk, add salt and minced onion as well as the water in which the lettuce was cooked, and let this boil until the onion is quite soft. Then press it through a sieve, add the chopped lettuce, 1 spoonful of butter, and (if available) a spoonful of meat extract, and place the vegetable on the fire for another 1/4 hour without letting it boil.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0031", "image": "0086_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0094.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Zwiebelgemüse", "title_en": "Stewed Onions", "yield": "", "text": "Die Zwiebeln (am besten nimmt man die großen weißen Zwiebeln) werden geschält und in Streifen geschnitten; man läßt sie in Salzwasser aufwallen und kocht sie, nachdem das Wasser abgegossen ist, mit Fleischbrühe weich; dann werden 2 Löffel geriebenes Weißbrot in Fett gedünstet und damit das Gemüse verdickt. Man kann mit etwas Muskatblüthe oder Citronensaft würzen. Für Gesunde sind Zwiebeln eine gute Speise, der nervöse oder schwache Magen sollte jedoch damit verschont bleiben.", "text_en": "The onions (it is best to use large white onions) are peeled and cut into strips; let them boil up in salted water and, after the water has been poured off, cook them until tender with meat broth; then 2 spoonfuls of grated white bread are stewed in fat and used to thicken the vegetable. One can season with a little mace or lemon juice. For healthy people, onions are a good food; however, a nervous or weak stomach should be spared from them.", "serving_suggestions": "Als Beilage gibt man Lamm- oder Hammelfleisch.", "serving_suggestions_en": "Serve with lamb or mutton as a side dish.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0031", "image": "0086_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0094.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Petersiliengemüse", "title_en": "Stewed Parsley", "yield": "2 portions", "text": "Man wiegt die gewaschene Petersilie recht fein, sodaß man in gewiegtem Zustande ungefähr 1 Teller voll davon hat, gibt sie mit 1 Löffel Butter in einen Topf und dünstet sie weich. Dann streut man 2 Löffel geriebenes Weißbrot darüber, gibt nach Bedarf etwas Wasser zu und läßt das Gemüse noch 1/4 Stunde dünsten. Beim Anrichten gibt man in Butter gebräuntes geriebenes Weißbrot darüber.", "text_en": "Mince the washed parsley very finely so that you have about one plateful in the minced state, put it into a pot with 1 spoonful of butter, and stew it until soft. Then sprinkle 2 spoonfuls of grated white bread over it, add a little water as needed, and let the vegetables stew for another 1/4 hour. When serving, sprinkle grated white bread browned in butter over it.", "serving_suggestions": "Gekochte Tauben oder gekochtes Rindfleisch eignen sich als Beilage.", "serving_suggestions_en": "Boiled pigeons or boiled beef are suitable as a side dish.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0032", "image": "0087_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0095.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Leipziger Allerlei", "title_en": "Mixed Vegetables", "yield": "", "text": "Hierzu gehören Spargel, junge Erbsen, 1 Blumenkohlkopf, 2 Kohlrabi, junge Möhren. Die Möhren werden in Scheibchen, Spargel und Kohlrabi in längliche Stückchen geschnitten, sodaß man von jedem Gemüse einen kleinen Teller voll hat. Dann kocht man die Gemüse in gesalzenem Wasser, jedes allein, weich, und läßt sie in einem Durchschlag ablaufen. 3 Löffel Mehl schwitzt man in Butter weich, gießt von dem Kochwasser der Gemüse etwas bei, salzt und läßt es kochen. Hat es eine Weile gekocht, so gibt man sämmtliche Gemüse hinein, läßt nochmals aufkochen und richtet recht zierlich, Blumenkohl in der Mitte, dann die Möhrenscheibchen u. s. w., an.", "text_en": "This requires asparagus, young peas, 1 head of cauliflower, 2 kohlrabi, and young carrots. The carrots are cut into small slices, and the asparagus and kohlrabi into oblong pieces, so that you have a small plateful of each vegetable. Then boil the vegetables in salted water, each separately, until soft, and let them drain in a colander. Sweat 3 spoonfuls of flour in butter until soft, pour in some of the vegetable cooking water, add salt, and let it boil. Once it has boiled for a while, add all the vegetables, let it come to a boil again, and arrange very daintily, with the cauliflower in the center, then the carrot slices, etc.", "serving_suggestions": "Man gibt junge Hühner oder gebratene Tauben dazu.", "serving_suggestions_en": "Serve with young chickens or roasted pigeons.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0032", "image": "0087_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0095.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Gekochter Turbankürbis", "title_en": "Boiled Squash", "yield": "2 portions", "text": "Man schält, entfernt und zerschneidet einen Kürbis, kocht ihn in Salzwasser 20 Minuten, reibt ihn durch einen Durchschlag und drückt das Durchgeschlagene aus. In eine Pfanne gibt man 1 Löffel Butter, den Kürbis, 2 Löffel süße Milch, Pfeffer und Salz nach Geschmack, rührt es miteinander, bis es kocht, und füllt den Brei in eine Gemüseschüssel.", "text_en": "Peel, remove seeds, and cut up a squash, boil it in salted water for 20 minutes, rub it through a colander, and squeeze out the strained pulp. Put 1 spoonful of butter, the squash, 2 spoonfuls of sweet milk, and pepper and salt to taste into a pan, stir together until it boils, and fill the puree into a vegetable dish.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0032", "image": "0087_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0095.jpg"}, {"category": "Gemüse", "category_en": "Vegetables", "entry_type": "recipe", "title_de": "Gebackener Turbankürbis", "title_en": "Baked Squash", "yield": "", "text": "Man kocht und verrührt dieſes Gemüse wie oben angegeben, würzt den Brei mit Pfeffer, Salz und Butter, gibt 2 verrührte Eier sowie 2 Löffel Milch hinein, schüttet die Masse in eine gut gebutterte Pud- dingsform oder Schüssel, streut geriebenes Weißbrot oder Cracker- krumen oben darauf und bäckt diese Masse in einem heißen Ofen, bis die Oberfläche sich bräunt.", "text_en": "Cook and stir this vegetable as indicated above, season the puree with pepper, salt, and butter, add 2 beaten eggs as well as 2 spoonfuls of milk, pour the mixture into a well-buttered pudding mold or bowl, sprinkle grated white bread or cracker crumbs on top, and bake this mixture in a hot oven until the surface browns.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0032", "image": "0087_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0095.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "general_instruction", "title_de": "Kartoffelspeisen", "title_en": "", "yield": "", "text": "Die Kartoffelstaude, deren Vaterland Südamerika ist, liefert in ihren mehlreichen Knollen eines der billigsten Volksnahrungsmittel. Zu den Kartoffeln gehört jedoch Fett, um das in den Kartoffeln enthaltene Stärkemehl leichter verdaulich zu machen. Somit sind gekochte Kartoffeln und frische Butter nicht nur eine wohlschmeckende, sondern auch chemisch richtige Verbindung. Die Kartoffeln sind ferner eine ganz geeignete Beigabe zum Kaffee, zum Fleische und namentlich zur Milch. Kartoffeln allein können den Menschen nicht genügend ernähren, richten vielmehr allerhand Störungen im Verdauungsprocesse an. Alle Kartoffeln müssen nach dem Schälen gewässert werden, und mit solchen, welche schon gekeimt haben, sollte dasselbe 2 oder 3 mal geschehen. Bei dem Einkaufen von Frühkartoffeln soll man nur völlig reife auswählen, die man leicht daran erkennt, daß die Schale völlig ganz ist, während sie bei noch unreifen Knollen in faserigen Läppchen daran herumhängt.", "text_en": "The potato plant, whose native land is South America, provides in its starchy tubers one of the cheapest staple foods. However, fat is needed with potatoes to make the starch contained in them easier to digest. Thus, boiled potatoes and fresh butter are not only a tasty, but also a chemically correct combination. Potatoes are furthermore a very suitable accompaniment to coffee, meat, and especially milk. Potatoes alone cannot sufficiently nourish humans; rather, they cause all sorts of disturbances in the digestive process. All potatoes must be soaked in water after peeling, and with those that have already sprouted, this should be done 2 or 3 times. When buying early potatoes, one should only select fully ripe ones, which are easily recognized by the fact that the skin is completely intact, whereas in unripe tubers it hangs around in fibrous shreds.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0033", "image": "0088_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0096.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Kartoffeln in der Schale zu kochen", "title_en": "Boiling Potatoes in their Skin", "yield": "", "text": "Das Kochen der Kartoffeln erscheint sehr einfach; deshalb wird ihm leider meist zu wenig Aufmerksamkeit geschenkt und doch hängt bei einer guten Kartoffel der bessere Geschmack von der sorgfältigen Behandlung ab. Die Kartoffeln werden einigemal tüchtig gewaschen, mit gut gesalzenem kalten Wasser (auch wohl mit Kümmelkörnern dazu gemischt) aufs Feuer gesetzt, um sie dann recht schnell kochen zu lassen. Das Wasser muß knapp die Kartoffeln bedecken und der Topf gut zugedeckt werden. Sobald man die Kartoffeln leicht mit einer Gabel durchstechen kann (bei neuen Kartoffeln nach 1/4 Stunde, zu Weihnachten nach 1/2, gegen Ostern nach fast 3/4 Stunden Kochzeit), wird das Wasser abgegossen; man deckt die Kartoffeln zu und läßt sie noch 5 Minuten ausdünsten. Sollen die Kartoffeln besonders schmackhaft werden, so kocht man sie nicht im Wasser, sondern in folgender Weise: Ueber ein mehr breites", "text_en": "Boiling potatoes seems very simple; therefore, unfortunately, too little attention is usually paid to it, and yet with a good potato, the better taste depends on careful treatment. The potatoes are washed thoroughly several times, placed on the fire with well-salted cold water (perhaps also mixed with caraway seeds), and then brought to a boil quite quickly. The water must just cover the potatoes and the pot must be well covered. As soon as one can easily pierce the potatoes with a fork (after 1/4 hour for new potatoes, after 1/2 hour by Christmas, and after almost 3/4 hours of cooking time by Easter), the water is poured off; cover the potatoes and let them steam for another 5 minutes. If the potatoes are to be particularly tasty, they should not be boiled in water, but in the following manner: Over a wider", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0033", "image": "0088_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0096.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "general_instruction", "title_de": "Das Kochen der Kartoffeln", "title_en": "", "yield": "", "text": "als tiefes Gefäß mit kochendem Wasser wird ein gut passender Durchschlag gelegt und in diesem die rein geschälten Kartoffeln, welche auf diese Weise von den Dämpfen gekocht werden. Diese Kochart ist jeder anderen vorzuziehen und deshalb finden die Kartoffelkocher in der Küche immer weitere Verbreitung. Im Frühjahr, wenn die Kartoffeln zu keimen beginnen, sollte man von jeder Kartoffel vor dem Kochen an zwei entgegengesetzten Stellen ein Stückchen abschneiden. Der unangenehme Saft und Geschmack der Kartoffeln dringt dann an diesen Stellen während des Kochens heraus, bildet eine hornartige Haut und die Kartoffel selbst bleibt dadurch schmackhaft und mehlig. Man achte darauf, daß die Kartoffeln genau zu der Zeit gar sind, wo sie zu Tisch gebracht werden sollen, und dürfen dieselben nicht stehen, da sie alsdann den guten Geschmack verlieren. Um gleichmäßiges Garkochen zu erzielen, sollte man immer Kartoffeln derselben Größe zusammen kochen.", "text_en": "A well-fitting colander is placed over a deep vessel of boiling water, and the cleanly peeled potatoes are placed inside, where they are cooked by the steam. This method of cooking is preferable to any other, which is why potato steamers are becoming increasingly common in the kitchen. In the spring, when potatoes begin to sprout, one should cut a small piece off each potato at two opposite points before cooking. The unpleasant juice and taste of the potatoes then escape through these points during cooking, forming a horn-like skin, and the potato itself remains tasty and mealy. Ensure that the potatoes are done exactly at the time they are to be brought to the table; they must not be left standing, as they will then lose their good flavor. To achieve even cooking, one should always cook potatoes of the same size together.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0034", "image": "0089_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0097.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Salzkartoffeln", "title_en": "Boiled Potatoes", "yield": "2 portions", "text": "6 schöne Kartoffeln werden geschält, gewaschen und in Salzwasser abgekocht; sind sie weich, so wird alles Wasser davon abgeschüttet und heiße Butter oder Schmalz mit gedünsteter Petersilie oder hellgelb geröstete Zwiebel darüber gegossen.", "text_en": "6 nice potatoes are peeled, washed, and boiled in salted water; when they are soft, all the water is drained off, and hot butter or lard with sautéed parsley or light-yellow roasted onions is poured over them.", "serving_suggestions": "Man kann sie auch, nachdem das Wasser abgeschüttet ist, bis zum Gebrauch warm stellen, mit etwas ganzer Petersilie garniren und als Beilage zu Fisch geben.", "serving_suggestions_en": "After the water has been drained, they can also be kept warm until use, garnished with some whole parsley, and served as a side dish with fish.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0034", "image": "0089_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0097.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Geröstete Kartoffeln", "title_en": "Fried Potatoes", "yield": "", "text": "Die gekochten Kartoffeln werden in Scheiben geschnitten und gesalzen; dann wird fein gewiegte Zwiebel in Butter gedünstet; die Kartoffeln werden hineingelegt und schön gelb gebraten.", "text_en": "The boiled potatoes are cut into slices and salted; then finely minced onion is sautéed in butter; the potatoes are added and fried until nicely yellow.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0034", "image": "0089_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0097.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Schmalzkartoffeln", "title_en": "Fried Potatoes—French", "yield": "", "text": "Rohe Kartoffeln werden geschält, in Scheiben geschnitten, abgewaschen, auf einem Handtuche schnell abgetrocknet, in nicht heißem Schmalz ungefähr 5 Minuten gebacken, dann herausgenommen, das Schmalz heiß gemacht, die Kartoffeln wieder hineingethan, schön knusperig gebacken, mit Salz bestreut und zu Beefsteaks gegeben.", "text_en": "Raw potatoes are peeled, cut into slices, washed, dried quickly on a towel, fried in not-too-hot lard for about 5 minutes, then removed; the lard is then heated up, the potatoes are put back in, fried until nice and crispy, sprinkled with salt, and served with beefsteaks.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0034", "image": "0089_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0097.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Petersilienkartoffeln", "title_en": "Lyonnaise Potatoes", "yield": "", "text": "Die roh geschälten, mit etwas Salz weichgekochten Kartoffeln werden rein abgegossen, alsdann mit reichlich frischer Butter und gehackter Petersilie", "text_en": "The raw-peeled potatoes, boiled until soft with a little salt, are drained completely, then [tossed/mixed] with plenty of fresh butter and chopped parsley", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0034", "image": "0089_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0097.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Saratoga-Kartoffeln", "title_en": "Saratoga Chips", "yield": "", "text": "Man schält 1 oder 2 große Kartoffeln, schneidet sie mit einem Krautschneider in sehr dünne Scheiben über einer Schüssel mit kaltem Wasser, so daß jede Scheibe sogleich in das Wasser fällt. Nach 10 Minuten nimmt man eine Portion heraus und trocknet dieselbe mit einem Handtuch schön ab. Man bratet immer einige auf einmal in heißem Schmalz hellbraun und salzt sie bei dem Herausnehmen. Man muß sie in einer gewärmten Schüssel im Ofen bis zum Gebrauch warm halten.", "text_en": "Peel 1 or 2 large potatoes, cut them with a cabbage slicer into very thin slices over a bowl of cold water, so that each slice falls immediately into the water. After 10 minutes, take out a portion and dry it well with a towel. Fry a few at a time in hot lard until light brown and salt them upon removing. They must be kept warm in a warmed bowl in the oven until used.", "serving_suggestions": "Sie schmecken dann fein und knusperig und werden zum Garniren von Wildpret und Steaks benutzt.", "serving_suggestions_en": "They then taste fine and crispy and are used for garnishing game and steaks.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0035", "image": "0090_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0098.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Kartoffelbrei", "title_en": "Mashed Potatoes", "yield": "2 portions", "text": "Am leichtesten verdaulich sind die Kartoffeln in Form von Kartoffelbrei. 6 schöne Kartoffeln werden geschält, gewaschen, in Hälften getheilt, in Salzwasser weich gekocht und durch einen Durchschlag getrieben. Dann mischt man Butter von der Größe einer Wallnuß, 3 Eßlöffel warme Milch, 1 Theelöffel Salz und eine kleine Prise Pfeffer mit den Kartoffeln und servirt in einer gewärmten Schüssel. Man kann auch mit in Butter gerösteten kleingeschnittenen Zwiebeln, oder auch fein geschnittene Speckwürfel mit Zwiebeln gebraten, darüber geben.", "text_en": "Potatoes are most easily digestible in the form of mashed potatoes. 6 nice potatoes are peeled, washed, cut in halves, boiled soft in salted water, and pressed through a colander. Then mix in butter the size of a walnut, 3 tablespoons of warm milk, 1 teaspoon of salt, and a small pinch of pepper with the potatoes and serve in a warmed bowl. One can also add finely chopped onions roasted in butter, or finely diced bacon fried with onions, on top.", "serving_suggestions": "Bratwurst, Kalbs- und Schweinscotelets oder Sauerkraut schmecken gut dazu.", "serving_suggestions_en": "Bratwurst, veal and pork cutlets, or sauerkraut taste good with this.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0035", "image": "0090_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0098.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Gebackener Kartoffelbrei", "title_en": "Baked Potato Purée", "yield": "", "text": "Hat man mittags Kartoffelbrei übrig behalten, so thut man gut, denselben zum Abendtisch in etwas anderer Form zu verwenden. In der Pfannkuchenpfanne läßt man 1 Löffel Butter heiß werden, drückt den Kartoffelbrei fest hinein, so daß er die Form eines dicken Eierkuchens bekommt und bäckt ihn wie Eierkuchen auf beiden Seiten schön braun.", "text_en": "If you have leftover mashed potatoes from lunch, it is a good idea to use them for the evening meal in a slightly different form. Let 1 spoonful of butter get hot in a pancake pan, press the mashed potatoes firmly into it so that it takes the shape of a thick pancake, and bake it like a pancake until nicely browned on both sides.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0035", "image": "0090_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0098.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Kartoffelbällchen", "title_en": "Potato Balls", "yield": "2 portions", "text": "1 Pfund fein geriebene heiße Salzkartoffeln rührt man mit 4 Eigelb und Salz nach Geschmack gut durch, formt sie in nicht zu große Bällchen, panirt dieselben mit Zwieback oder Mehl und bratet die Bällchen in Butter hellbraun.", "text_en": "Stir 1 pound of finely grated hot boiled potatoes well with 4 egg yolks and salt to taste, form them into not-too-large balls, bread them with rusk crumbs or flour, and fry the balls in butter until light brown.", "serving_suggestions": "Dieselben werden warm zu Spargel", "serving_suggestions_en": "These are served warm with asparagus", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0035", "image": "0090_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0098.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Kartoffeln mit Aepfeln", "title_en": "Potatoes with Apples", "yield": "2 portions", "text": "Man schält 6 Kartoffeln, schneidet sie in Viertel und wäscht sie, kocht sie dann in Salzwasser weich und gießt das Wasser fort. Inzwischen schält man 3 saure Aepfel, befreit sie von den Kernen und schmort sie in Wasser mit Zucker. Die Kartoffeln und Aepfel werden vermischt, etwas Speck und 1/2 Zwiebel zusammen gehackt und ausgebraten, an den Brei gegeben und nach Geschmack gesalzen.", "text_en": "Peel 6 potatoes, cut them into quarters and wash them, then boil them until soft in salted water and drain the water. Meanwhile, peel 3 tart apples, remove the cores, and stew them in water with sugar. Mix the potatoes and apples together; chop some bacon and 1/2 an onion together and fry them, add to the mash, and salt to taste.", "serving_suggestions": "Man gibt dazu Schweinebraten, Schweine-Cotelets oder Bratwurst. Ebenso kocht man Kartoffeln mit frischen Birnen oder gedörrten Pflaumen.", "serving_suggestions_en": "Serve with roast pork, pork chops, or bratwurst. Potatoes can be cooked in the same way with fresh pears or dried plums.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0036", "image": "0091_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0099.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Saure Kartoffeln", "title_en": "Sour Potatoes", "yield": "2 portions", "text": "6 große Kartoffeln werden geschält, in Scheiben geschnitten und in Salzwasser beinahe weich gekocht. Würflich geschnittener Speck wird mit fein gewiegter Zwiebel und 1 Löffel Mehl gelb geröstet, Fleischbrühe oder Wasser daran gegossen, nebst Salz, Essig, 1 Lorbeerblatt und ein wenig Pfeffer, die Kartoffeln dazu gegeben und dieselben noch einmal darin aufgekocht.", "text_en": "6 large potatoes are peeled, cut into slices, and boiled in salted water until almost soft. Diced bacon is roasted until yellow with finely minced onion and 1 spoonful of flour; meat broth or water is poured over it, along with salt, vinegar, 1 bay leaf, and a little pepper; add the potatoes and boil them once more in the mixture.", "serving_suggestions": "Man gibt Hammel- oder Schweinefleisch, Frankfurter Würstchen, frische, geräucherte oder gebratene Wurst dazu.", "serving_suggestions_en": "Serve with mutton or pork, Frankfurter sausages, or fresh, smoked, or fried sausage.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0036", "image": "0091_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0099.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Kartoffelstückchen", "title_en": "Potatoes with Parsley", "yield": "2 portions", "text": "4 oder 5 Kartoffeln werden roh geschält, in Viertel geschnitten und kochendes Wasser darüber gegossen, worin sie, zugedeckt, einigemal aufwallen müssen. Dann läßt man das Wasser ablaufen, gibt 1 Theelöffel Kümmelkörner dazu, füllt mit kochender Fleischbrühe auf und läßt sie dann weich kochen. Vor dem Anrichten wird gewiegte junge Petersilie darüber gegeben. Hat man nur kleine Kartoffeln, so kann man dieselben mit der Schale kochen, schälen, in Stücke schneiden, einige Pfefferkörner, Kümmel und die kochende Fleischbrühe dazu schütten. Will man den Kümmel weglassen, dann gibt man geriebenes, in Butter geröstetes Weißbrot, einige gehackte Sardellen und etwas gestoßene Muskatblüthe dazu.", "text_en": "Peel 4 or 5 potatoes raw, cut into quarters, and pour boiling water over them, in which they must boil up a few times while covered. Then drain the water, add 1 teaspoon of caraway seeds, fill with boiling meat broth, and let them cook until soft. Before serving, sprinkle with minced young parsley. If you only have small potatoes, you can boil them in their skins, peel them, cut them into pieces, and add a few peppercorns, caraway, and the boiling meat broth. If you wish to omit the caraway, add grated white bread toasted in butter, some chopped anchovies, and a little ground mace.", "serving_suggestions": "Gekochtes Hammel- oder Rindfleisch ist eine passende Beilage.", "serving_suggestions_en": "Boiled mutton or beef is a suitable side dish.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0036", "image": "0091_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0099.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Heringskartoffeln", "title_en": "Potatoes with Herring", "yield": "2 portions", "text": "6 große Kartoffeln werden mit der Schale gekocht, abgezo=", "text_en": "6 large potatoes are boiled in their skins, peeled=", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0036", "image": "0091_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0099.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Prinzeszkartoffeln", "title_en": "Potatoes à la Princesse", "yield": "", "text": "Man bereitet sie von Heringskartoffeln, mischt darunter hartgekochte, geriebene Eier, bestreicht eine Form mit Butter, schichtet darin die in Scheiben geschnittene, mit Pfeffer und Salz und kleingehackten Zwiebeln in Butter gedämpften Kartoffeln, darauf fein gehackten Hering mit den zerriebenen Kartoffeln und der in Oel gerührten Heringsmilch, hierauf wieder Kartoffeln; zwischen jede Schicht legt man Klümpchen frische Butter und übergießt das Ganze mit 1 Pint Rahm, in welche 2 Eidotter gerührt wurden. Man läßt das Gericht 1/2 Stunde im Ofen backen.", "text_en": "Prepare them from herring potatoes, mix in hard-boiled, grated eggs, grease a mold with butter, and layer in the potatoes which have been sliced and steamed in butter with pepper, salt, and finely chopped onions. On top, add finely chopped herring with the grated potatoes and the herring milt stirred into oil, then potatoes again; place small knobs of fresh butter between each layer and pour over the whole 1 pint of cream, into which 2 egg yolks have been stirred. Let the dish bake in the oven for 1/2 hour.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0037", "image": "0092_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0100.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Kartoffelpuffer", "title_en": "Potato Puffs", "yield": "", "text": "Dazu gehören recht gute große Kartoffeln; geschält und recht rein gewaschen, reibt man sie roh auf einem Reibeisen und drückt sie recht trocken aus. Dann reibt man 1 Zwiebel und mischt sie zu den Kartoffeln. Zu einem angehäuften Teller dieser Kartoffeln rührt man 1 Eßlöffel Mehl, 4 Eidotter, etwas Salz und 1 Löffel süßen Rahm, mischt die zu Schnee geschlagenen 4 Eiweiß dazu, bäckt von dieser Masse mit Schmalz dünne kleine Eierkuchen in der Eierkuchenpfanne auf beiden Seiten schön hellbraun und gibt sie sofort zu Tisch.", "text_en": "For this, you need very good large potatoes; peeled and washed very clean, grate them raw on a grater and squeeze them out very dry. Then grate 1 onion and mix it into the potatoes. To a heaping plate of these potatoes, stir in 1 tablespoon of flour, 4 egg yolks, some salt, and 1 spoonful of sweet cream, mix in the 4 egg whites beaten to snow, fry thin little pancakes from this mixture with lard in a pancake pan on both sides until nicely light brown, and serve them immediately.", "serving_suggestions": "Man servirt dazu Compot oder Salat.", "serving_suggestions_en": "Serve with compote or salad.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0037", "image": "0092_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0100.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Rahmkartoffeln", "title_en": "Cream Potatoes", "yield": "2 portions", "text": "Man schwitzt Butter mit einer feingehackten Zwiebel und 1 Löffel Mehl, gibt Salz, 1 Löffel gehackte Petersilie oder Schnittlauch dazu, rührt 1 Tasse sauren Rahm durch, und läßt 1 Teller Kartoffeln, welche vorher in Salzwasser gekocht, in Scheiben geschnitten und noch", "text_en": "Sweat butter with a finely chopped onion and 1 spoonful of flour, add salt, 1 spoonful of chopped parsley or chives, stir in 1 cup of sour cream, and let 1 plate of potatoes, which have been previously boiled in salted water, sliced, and still", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0037", "image": "0092_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0100.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Gekochte Süsz-Kartoffeln", "title_en": "Boiled Sweet Potatoes", "yield": "", "text": "Diese Nahrungspflanze, welche unter dem Namen Batate in allen tropischen Ländern wächst, stammt aus Südamerika; ihre Knollen sind nahrhafter, als die Kartoffel, leicht verdaulich und gesund. — Man wäscht und reinigt die süßen Kartoffeln, ohne die Schale derselben zu verletzen, legt sie in einen Topf mit kochendem Wasser und kocht sie, bis dieselben, wenn man mit der Gabel hineinsticht, noch ein wenig hart in der Mitte sind. Dann gießt man das Wasser ab und stellt den Topf etwas vom Feuer zurück, deckt eine Serviette darüber und läßt noch 10 Minuten dämpfen. Auf diese Weise gekocht, werden die Kartoffeln mehlig und trocken.", "text_en": "This food plant, which grows under the name batata in all tropical countries, originates from South America; its tubers are more nutritious than the potato, easily digestible, and healthy. Wash and clean the sweet potatoes without damaging their skin, place them in a pot with boiling water, and cook them until they are still a little hard in the middle when pierced with a fork. Then drain the water and set the pot back slightly from the fire, cover with a napkin, and let steam for another 10 minutes. Cooked in this way, the potatoes become mealy and dry.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0040", "image": "0093_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0101.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Gebackene Hüsz-Kartoffeln", "title_en": "Baked Sweet Potatoes", "yield": "", "text": "Man wäscht und reinigt Kartoffeln gleicher Größe, ohne die Schale zu beschädigen, legt sie in eine Backpfanne und läßt sie dann im heißen Ofen so lange backen, bis sie, wenn man dieselben mit der Hand drückt, in der Mitte weich erscheinen.", "text_en": "Wash and clean potatoes of equal size without damaging the skin, place them in a baking pan, and let them bake in a hot oven until they appear soft in the middle when pressed with the hand.", "serving_suggestions": "Man servirt dann schnell, ohne die Schale abzuziehen.", "serving_suggestions_en": "Serve quickly without peeling the skin.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0040", "image": "0093_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0101.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Gebratene Süsz Kartoffeln", "title_en": "Fried Sweet Potatoes", "yield": "", "text": "Gekochte Kartoffeln werden geschält und der Länge nach in Scheiben geschnitten. 3 Löffel Bratenfett werden in eine Bratpfanne gethan, die Kartoffeln mit etwas Salz und Pfeffer bestreut, in das heiße Fett gelegt und auf beiden Seiten gebräunt.", "text_en": "Boiled potatoes are peeled and sliced lengthwise. Put 3 spoonfuls of roasting fat into a frying pan, sprinkle the potatoes with a little salt and pepper, place them into the hot fat, and brown on both sides.", "serving_suggestions": "Sie müssen dann schnell servirt werden.", "serving_suggestions_en": "They must then be served quickly.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0040", "image": "0093_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0101.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Süsz-Kartoffeln aufzuwärmen", "title_en": "Sweet Potatoes to be warmed over", "yield": "", "text": "Gekochte oder gebackene Süß-Kartoffeln werden in Scheiben geschnitten. Zu einem Pint dieser Scheiben nimmt man 2 Löffel Butter, 1 Theelöffel klein geschnittene Zwiebel, 1/4 Pint Fleischbrühe, Salz und Pfeffer nach Geschmack. Zuerst thut man die Butter in eine Bratpfanne; wenn heiß, fügt man die Kartoffeln und Zwiebeln hinzu und bratet unter leichtem Umrühren bis sie hellbraun sind; dann nimmt man sie mit dem Schaumlöffel her-", "text_en": "Boiled or baked sweet potatoes are cut into slices. For one pint of these slices, take 2 spoonfuls of butter, 1 teaspoon of finely chopped onion, 1/4 pint of meat broth, salt and pepper to taste. First, put the butter into a frying pan; when hot, add the potatoes and onions and fry while stirring lightly until they are light brown; then remove them with a slotted spoon-", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0040", "image": "0093_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0101.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Kastaniengemüse", "title_en": "Purée of Chestnuts", "yield": "2 portions", "text": "Von 1 Quart Kastanien werden die braunen Schalen mit einem scharfen Messer entfernt, dann in kochendem Wasser einige Minuten gebrüht und die Haut abgezogen. Dann gibt man 1 Quart Wasser oder Fleischbrühe mit einigen Stückchen Sellerie in einen Topf und kocht die Kastanien 1/2 Stunde darin. Hierauf werden sie durch einen Durchschlag gedrückt, 1 Löffel Butter, 1/2 Theelöffel Zucker, Pfeffer und Salz darunter gerührt und mit etwas Brühe zum Kochen gebracht.", "text_en": "Remove the brown shells from 1 quart of chestnuts with a sharp knife, then scald them in boiling water for a few minutes and peel off the skin. Then put 1 quart of water or meat broth with a few pieces of celery into a pot and boil the chestnuts in it for 1/2 hour. Afterwards, press them through a colander, stir in 1 spoonful of butter, 1/2 teaspoon of sugar, pepper, and salt, and bring to a boil with a little broth.", "serving_suggestions": "Cotelets und jedes Geflügel paßt dazu. Frische Kastanien halten sich nur bis Februar oder März. In kaltes Wasser gegeben, sinken die guten unter, die schlechten schwimmen oben.", "serving_suggestions_en": "Cutlets and any poultry go well with this. Fresh chestnuts only keep until February or March. When placed in cold water, the good ones sink, the bad ones float on top.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0041", "image": "0094_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0102.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Kastanien mit Aepfeln", "title_en": "Stewed Chestnuts with Apples", "yield": "", "text": "Große, schöne Kastanien, die von der äußeren Schale befreit sind, werden in Wasser weichgekocht, geschält, in Butter und etwas Zucker gedünstet und mit geschälten, in Scheiben geschnittenen, in etwas Wasser mit Zucker und Citronenschale weichgedünsteten Aepfeln vermischt, um sie dann zu Gans- oder Truthahnbraten zu geben.", "text_en": "Large, beautiful chestnuts, freed from the outer shell, are boiled until soft in water, peeled, stewed in butter and a little sugar, and mixed with peeled, sliced apples that have been stewed until soft in a little water with sugar and lemon peel, to then be served with roast goose or turkey.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0041", "image": "0094_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0102.jpg"}, {"category": "Kartoffelspeisen", "category_en": "Potato Dishes", "entry_type": "recipe", "title_de": "Gekochte Kastanien als Beilage zu Gemüsen oder Ragouts", "title_en": "Boiled Chestnuts", "yield": "", "text": "Man entfernt zuerst mit einem scharfen Messer die braune Schale, wirft die Kastanien dann in siedendes Wasser, läßt sie eine kurze Zeit kochen, kühlt sie in kaltem Wasser ab, reibt mit einem Tuche die braune Haut ab und dünstet sie in einem glasirten Topfe mit Wasser, Butter und ein wenig Zucker weich, läßt sie trocken ablaufen und legt sie in das Ragout, oder garnirt Kohl- oder Spinatgemüse damit.", "text_en": "First remove the brown shell with a sharp knife, then throw the chestnuts into boiling water, let them boil for a short time, cool them in cold water, rub off the brown skin with a cloth, and stew them until soft in a glazed pot with water, butter, and a little sugar; let them drain dry and add them to the ragout, or garnish cabbage or spinach dishes with them.", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0041", "image": "0094_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0102.jpg"}, {"category": "Champignons", "category_en": "Mushrooms", "entry_type": "general_instruction", "title_de": "Champignons", "title_en": "Stewed Mushrooms", "yield": "", "text": "Unter allen Pilzen ist der Champignon der feinste und in gewisser Beziehung der billigste, da Jedermann, der über einen Garten, Keller oder leerstehendes Zimmer zu verfügen hat, im Stande ist, fast kostenlos", "text_en": "Among all mushrooms, the champignon (button mushroom) is the finest and, in a certain respect, the cheapest, since anyone who has a garden, cellar, or vacant room at their disposal is able to [grow them] almost for free", "serving_suggestions": "", "serving_suggestions_en": "", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0041", "image": "0094_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0102.jpg"}, {"category": "Champignons", "category_en": "Mushrooms", "entry_type": "general_instruction", "title_de": "Champignons", "title_en": "Mushrooms", "yield": "", "text": "immer frische Champignons selbst zu ziehen. In dem Capitel über Einmachen der Gemüse findet die Champignonzucht Erwähnung. Besonders zu Gemüsen, Suppen, Ragouts, Saucen u. s. w. ist ein Zusatz von Champignons ausgezeichnet und gibt denselben einen besonderen Wohlgeschmack.\nMan schneidet die Wurzel derselben ab, zieht die Haut von Hut und Stielen, wenn sie hart geworden, was bei den sehr großen der Fall ist, und beseitigt die unter dem Hute sitzenden Blättchen, wenn dieselben durch Alter gelitten haben — sonst nicht, denn gerade sie, ebenso wie die Haut vom Hute, enthalten viel des eigenthümlichen Gewürzes, wenn sie jung sind. Am besten sind deshalb die kleinen runden festen Champignons. Sobald von diesen die Wurzel obgeschnitten und die Stiele durch leichtes Abschaben gereinigt sind, werden sie, ohne daß man erst den Hut vom Stiele trennt, in kaltem Wasser abgespült, dann in ein irdenes Casserol mit heißer Butter oder Nierenfett geschüttet und unter Hinzufügen von Salz, Pfeffer, gehackter Petersilie und 1 Messerspitze Mehl in ihrem eigenen Safte 1/4 Stunde lang gedünstet. Wenn man die Champignons zu lange kochen läßt, werden sie hart.", "text_en": "to always grow fresh mushrooms yourself. In the chapter on preserving vegetables, mushroom cultivation is mentioned. Especially for vegetables, soups, ragouts, sauces, etc., an addition of mushrooms is excellent and gives them a special flavor.\nCut off the roots, peel the skin from the cap and stems if they have become hard, which is the case with very large ones, and remove the gills located under the cap if they have suffered from age — otherwise do not, for they, just like the skin of the cap, contain much of the characteristic spice when they are young. Therefore, the small, round, firm mushrooms are best. As soon as the roots of these have been cut off and the stems cleaned by light scraping, they are rinsed in cold water without first separating the cap from the stem, then poured into an earthenware casserole with hot butter or kidney fat and, with the addition of salt, pepper, chopped parsley, and 1 pinch of flour, stewed in their own juice for 1/4 hour. If you let the mushrooms cook too long, they become hard.", "serving_suggestions": "Man gibt Schinken, geräucherten Lachs, Fleischklöschen oder Kalbscotelets dazu.", "serving_suggestions_en": "Serve with ham, smoked salmon, meat dumplings, or veal cutlets.", "canvas_fragment": "https://tile.loc.gov/image-services/iiif/public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0042", "image": "0095_public:gdcmassbookdig:steigersgermanam00schr:steigersgermanam00schr_0103.jpg"}];

const DOC_META    = {"title": "Steiger's German American cookbook. Steiger's deutsch-amerikanisches kochbuch für kleinere familien. Praktische anweisung, auf deutsche weise gut, schmackhaft, abwechselnd und sparsam zu kochen. Mit berücksichtigung amerikanischer nahrungsmittel und angabe der englischen ausdrücke.", "date": "", "institution": "Library of Congress", "homepage_url": "https://www.loc.gov/item/07033856/", "collection": "", "genre": "", "manifest_url": "https://www.loc.gov/item/07033856/manifest.json"};

document.getElementById("doc-title").textContent = DOC_META.title || DOC_TITLE;

// Metadata strip in top-right toolbar
function renderMetaStrip(meta) {
  const parts = [];
  if (meta.date)         parts.push(`<span class="meta-chip">${meta.date}</span>`);
  if (meta.institution)  parts.push(`<span class="meta-chip">${meta.institution}</span>`);
  if (meta.genre)        parts.push(`<span class="meta-chip">${meta.genre}</span>`);
  if (meta.homepage_url)
    parts.push(`<a class="meta-chip meta-link" href="${meta.homepage_url}" target="_blank">Item page ↗</a>`);
  const strip = document.getElementById("meta-strip");
  if (strip) strip.innerHTML = parts.join("");
}
renderMetaStrip(DOC_META);

let facetFields = FIELD_META.filter(f => f.type === "facet");
let displayFields = FIELD_META.filter(f => f.type !== "id");

// Init facet state
facetFields.forEach(f => { facetState[f.name] = new Set(); });

// ── Load a volume by label (data + UI reset, no render) ──────────────────
function loadVolume(label) {
  const vol = VOLUMES[label];
  if (!vol) return;
  ALL_ENTRIES = vol.rows;
  facetFields = vol.field_meta.filter(f => f.type === "facet");
  displayFields = vol.field_meta.filter(f => f.type !== "id");
  Object.keys(facetState).forEach(k => delete facetState[k]);
  facetFields.forEach(f => { facetState[f.name] = new Set(); });
  searchQuery = "";
  sortCol = null;
  sortDir = 1;
  selectedIdx = null;
  colFilters = {};
  showAllFacets.clear();
  try { sessionStorage.removeItem('showAllFacets'); } catch(e) {}
  document.getElementById("search").value = "";
  document.getElementById("detail").classList.remove("open");
  document.getElementById("doc-title").textContent = label;
  document.getElementById("doc-sub").textContent =
    ALL_ENTRIES.length.toLocaleString() + " entries";
  document.getElementById("mobile-title").textContent = label;
  document.getElementById("mobile-sub").textContent =
    ALL_ENTRIES.length.toLocaleString() + " entries";
  currentDocMeta = vol.doc_meta || {};
  activeManifestUrl = currentDocMeta.manifest_url || MANIFEST_URL;
  renderMetaStrip(currentDocMeta);
  renderFillRate();
}

// ── Volume selector ─────────────────────────────────────────────────────────
(function () {
  const volLabels = Object.keys(VOLUMES);
  if (volLabels.length === 0) return;
  const wrap = document.getElementById("volume-wrap");
  const sel  = document.getElementById("volume-select");
  wrap.style.display = "block";
  volLabels.forEach(label => {
