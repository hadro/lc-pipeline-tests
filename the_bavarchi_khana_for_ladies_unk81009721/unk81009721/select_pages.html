<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select pages — the_bavarchi_khana_for_ladies_unk81009721/unk81009721</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f0f0;
      color: #222;
    }

    /* ── sticky header ─────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #1e293b;
      color: #f8fafc;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,.35);
      flex-wrap: wrap;
    }

    /* ── tabs ──────────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 2px;
      background: #0f172a;
      border-radius: 6px;
      padding: 3px;
      flex-shrink: 0;
    }
    .tab-btn {
      padding: 5px 14px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      background: transparent;
      color: #94a3b8;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .tab-btn.active {
      background: #1e40af;
      color: #fff;
    }
    .tab-btn.active.scope-active {
      background: #15803d;
    }

    header .volume { font-size: 12px; color: #94a3b8; flex: 1; min-width: 0;
                      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #status {
      font-size: 13px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      background: #374151;
      white-space: nowrap;
    }
    #status.ok       { background: #15803d; color: #f0fdf4; }
    #status.too-few  { background: #92400e; color: #fef3c7; }
    #status.too-many { background: #9f1239; color: #fff1f2; }

    /* ── scope quick-action strip ──────────────────────────────────── */
    #scope-controls {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #94a3b8;
    }
    #scope-controls.visible { display: flex; }
    #scope-controls input[type=number] {
      width: 52px;
      padding: 3px 6px;
      border-radius: 4px;
      border: 1px solid #475569;
      background: #1e293b;
      color: #f8fafc;
      font-size: 12px;
      text-align: center;
    }
    #scope-controls .btn-scope-quick {
      padding: 4px 10px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      background: #374151;
      color: #f8fafc;
    }
    #scope-controls .btn-scope-quick:hover { background: #475569; }

    .btn {
      padding: 5px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .35; cursor: default; }
    .btn-primary  { background: #2563eb; color: #fff; }
    .btn-scope    { background: #15803d; color: #fff; }
    .btn-secondary { background: #475569; color: #fff; }
    .btn-clear    { background: #64748b; color: #fff; font-size: 12px; }

    /* ── size slider ────────────────────────────────────────────────── */
    .size-control {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #94a3b8;
      margin-left: auto;
    }
    .size-control input[type=range] {
      width: 90px;
      accent-color: #2563eb;
      cursor: pointer;
    }

    /* ── grid ──────────────────────────────────────────────────────── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--thumb-size, 140px), 1fr));
      gap: 8px;
      padding: 14px;
    }

    /* ── cards — sample mode ────────────────────────────────────────── */
    .card {
      background: #fff;
      border: 3px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
      transition: border-color .1s, transform .1s, opacity .1s;
      user-select: none;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 3px 8px rgba(0,0,0,.18); }

    /* sample selected */
    .card.sample-selected {
      border-color: #2563eb;
      box-shadow: 0 0 0 1px #2563eb, 0 3px 8px rgba(37,99,235,.25);
    }

    /* scope excluded */
    .card.scope-excluded {
      border-color: #dc2626;
      opacity: 0.45;
    }
    /* scope included (default in scope mode — soft green ring) */
    body.scope-mode .card:not(.scope-excluded) {
      border-color: #16a34a;
      box-shadow: 0 0 0 1px #16a34a, 0 1px 3px rgba(22,163,74,.15);
    }

    .card img {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      display: block;
    }
    .card .label {
      text-align: center;
      padding: 4px 2px 5px;
      font-size: 11px;
      color: #64748b;
      line-height: 1.3;
    }
    .card.sample-selected .label { color: #1d4ed8; font-weight: 600; }
    body.scope-mode .card.scope-excluded .label { color: #dc2626; }

    .badge {
      display: none;
      position: absolute;
      top: 4px;
      right: 4px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #2563eb;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      align-items: center;
      justify-content: center;
    }
    .card-wrap { position: relative; }
    .card.sample-selected .badge { display: flex; }

    /* ── selection panel / footer ───────────────────────────────────── */
    footer {
      position: sticky;
      bottom: 0;
      background: #1e293b;
      color: #f8fafc;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 1px solid #334155;
      flex-wrap: wrap;
    }
    #selection-list {
      flex: 1;
      font-size: 12px;
      color: #94a3b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 120px;
    }
  </style>
</head>
<body>

<header>
  <div class="tabs">
    <button class="tab-btn active" id="tab-sample" onclick="switchTab('sample')">Sample pages</button>
    <button class="tab-btn"        id="tab-scope"  onclick="switchTab('scope')">Scope pages</button>
  </div>
  <span class="volume">the_bavarchi_khana_for_ladies_unk81009721/unk81009721</span>
  <span id="status" class="too-few">0 selected (need 4–10)</span>

  <!-- Scope quick-actions (visible only in scope tab) -->
  <div id="scope-controls">
    <span>Exclude first</span>
    <input type="number" id="exclude-n" value="5" min="1">
    <button class="btn-scope-quick" onclick="excludeFirstN()">pages</button>
    <button class="btn btn-clear" onclick="scopeSelectAll()" style="font-size:11px;padding:3px 9px;">Include all</button>
  </div>

  <button class="btn btn-clear" id="clear-btn" onclick="clearAll()">Clear</button>
  <label class="size-control" title="Thumbnail size">
    🔍
    <input type="range" id="size-slider" min="100" max="400" value="140"
           oninput="document.documentElement.style.setProperty('--thumb-size', this.value + 'px')">
  </label>
</header>

<div id="grid"></div>

<footer>
  <span id="selection-list">No pages selected.</span>
  <button class="btn btn-secondary" onclick="copyToClipboard()" id="copy-btn" disabled>Copy filenames</button>
  <button class="btn btn-primary"   onclick="saveSelection()" id="dl-btn"   disabled id="dl-sample-btn">Save to output folder</button>
  <button class="btn btn-scope"     onclick="saveScope()"     id="scope-btn" style="display:none;">Save scope</button>
</footer>

<script>
  const IMAGES        = ["0001_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0001.jpg", "0002_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0002.jpg", "0003_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0003.jpg", "0004_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0004.jpg", "0005_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0005.jpg", "0006_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0006.jpg", "0007_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0007.jpg", "0008_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0008.jpg", "0009_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0009.jpg", "0010_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0010.jpg", "0011_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0011.jpg", "0012_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0012.jpg", "0013_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0013.jpg", "0014_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0014.jpg", "0015_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0015.jpg", "0016_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0016.jpg", "0017_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0017.jpg", "0018_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0018.jpg", "0019_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0019.jpg", "0020_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0020.jpg", "0021_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0021.jpg", "0022_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0022.jpg", "0023_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0023.jpg", "0024_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0024.jpg", "0025_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0025.jpg", "0026_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0026.jpg", "0027_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0027.jpg", "0028_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0028.jpg", "0029_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0029.jpg", "0030_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0030.jpg", "0031_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0031.jpg", "0032_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0032.jpg", "0033_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0033.jpg", "0034_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0034.jpg"];
  const SAVE_URL      = "http://127.0.0.1:61308/save";
  const SAVE_SCOPE_URL = "http://127.0.0.1:61308/save-scope";
  const PRESELECTED   = new Set([]);
  const PRESCOPED_EXCL = new Set([]); // filenames to EXCLUDE initially
  const MIN_SEL = 4;
  const MAX_SEL = 10;

  // ── State ──────────────────────────────────────────────────────────
  let currentTab = 'sample';
  let sampleSelected = new Set(PRESELECTED);
  let scopeExcluded  = new Set(PRESCOPED_EXCL);
  let lastClickedIdx = null;  // for shift-click range in scope mode

  // ── render grid ────────────────────────────────────────────────────
  const grid = document.getElementById("grid");
  IMAGES.forEach((fname, i) => {
    const wrap = document.createElement("div");
    wrap.className = "card-wrap";

    const card = document.createElement("div");
    card.className = "card";
    card.dataset.fname = fname;
    card.dataset.idx = i;

    const badge = document.createElement("div");
    badge.className = "badge";
    card.appendChild(badge);

    const img = document.createElement("img");
    img.src = fname.replace(/%/g, "%25");
    img.alt = fname;
    img.loading = "lazy";
    card.appendChild(img);

    const label = document.createElement("div");
    label.className = "label";
    const m = fname.match(/^(\d+)/);
    label.textContent = m ? "p. " + parseInt(m[1], 10) : fname;
    card.appendChild(label);

    card.addEventListener("click", (e) => handleCardClick(card, badge, i, e));
    wrap.appendChild(card);
    grid.appendChild(wrap);
  });

  // Apply pre-existing selections on load
  applyCardStates();

  // ── Tab switching ───────────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;
    const isSample = tab === 'sample';

    document.getElementById("tab-sample").classList.toggle("active", isSample);
    document.getElementById("tab-scope").classList.toggle("active", !isSample);
    document.getElementById("tab-scope").classList.toggle("scope-active", !isSample);
    document.getElementById("scope-controls").classList.toggle("visible", !isSample);
    document.getElementById("clear-btn").style.display = isSample ? "" : "none";
    document.getElementById("dl-btn").style.display    = isSample ? "" : "none";
    document.getElementById("scope-btn").style.display = isSample ? "none" : "";
    document.body.classList.toggle("scope-mode", !isSample);

    updateStatus();
  }

  // ── Card click ─────────────────────────────────────────────────────
  function handleCardClick(card, badge, idx, e) {
    if (currentTab === 'sample') {
      const fname = card.dataset.fname;
      if (sampleSelected.has(fname)) {
        sampleSelected.delete(fname);
      } else {
        if (sampleSelected.size >= MAX_SEL) {
          const st = document.getElementById("status");
          st.style.transition = "none";
          st.style.background = "#7f1d1d";
          setTimeout(() => { st.style.transition = ""; updateStatus(); }, 400);
          return;
        }
        sampleSelected.add(fname);
      }
    } else {
      // Scope mode: shift-click selects a range to EXCLUDE
      const fname = card.dataset.fname;
      if (e.shiftKey && lastClickedIdx !== null) {
        const lo = Math.min(lastClickedIdx, idx);
        const hi = Math.max(lastClickedIdx, idx);
        const shouldExclude = !scopeExcluded.has(IMAGES[idx]);
        for (let j = lo; j <= hi; j++) {
          if (shouldExclude) scopeExcluded.add(IMAGES[j]);
          else               scopeExcluded.delete(IMAGES[j]);
        }
      } else {
        if (scopeExcluded.has(fname)) scopeExcluded.delete(fname);
        else                          scopeExcluded.add(fname);
      }
      lastClickedIdx = idx;
    }
    applyCardStates();
    updateStatus();
  }

  function applyCardStates() {
    document.querySelectorAll(".card").forEach(card => {
      const fname = card.dataset.fname;
      const badge = card.querySelector(".badge");
      card.classList.toggle("sample-selected", sampleSelected.has(fname));
      card.classList.toggle("scope-excluded",  scopeExcluded.has(fname));
      if (badge) badge.textContent = "";
    });
    // Re-number sample badges in order
    let n = 0;
    document.querySelectorAll(".card.sample-selected .badge").forEach(b => {
      b.textContent = ++n;
    });
  }

  // ── Status bar ─────────────────────────────────────────────────────
  function updateStatus() {
    const st    = document.getElementById("status");
    const dlBtn = document.getElementById("dl-btn");
    const cpBtn = document.getElementById("copy-btn");
    const scBtn = document.getElementById("scope-btn");
    const list  = document.getElementById("selection-list");

    if (currentTab === 'sample') {
      const n = sampleSelected.size;
      if (n === 0) {
        st.textContent = "0 selected (need 4–10)";
        st.className = "too-few";
      } else if (n < MIN_SEL) {
        st.textContent = n + " selected (need " + (MIN_SEL - n) + " more)";
        st.className = "too-few";
      } else if (n > MAX_SEL) {
        st.textContent = n + " selected (max " + MAX_SEL + ")";
        st.className = "too-many";
      } else {
        st.textContent = n + " selected ✓";
        st.className = "ok";
      }
      const ready = n >= MIN_SEL && n <= MAX_SEL;
      dlBtn.disabled = !ready;
      cpBtn.disabled = n === 0;
      list.textContent = n === 0 ? "No pages selected."
                                 : [...sampleSelected].join(",  ");
    } else {
      const total    = IMAGES.length;
      const excluded = scopeExcluded.size;
      const included = total - excluded;
      st.textContent = included + " of " + total + " pages included";
      st.className = included === total ? "ok" : (included === 0 ? "too-few" : "ok");
      scBtn.disabled = false;
      cpBtn.disabled = true;
      list.textContent = excluded === 0
        ? "All " + total + " pages included."
        : excluded + " page" + (excluded === 1 ? "" : "s") + " excluded: " +
          [...scopeExcluded].join(",  ");
    }
  }

  function clearAll() {
    sampleSelected.clear();
    applyCardStates();
    updateStatus();
  }

  // ── Scope quick-actions ────────────────────────────────────────────
  function excludeFirstN() {
    const n = parseInt(document.getElementById("exclude-n").value, 10) || 0;
    for (let i = 0; i < Math.min(n, IMAGES.length); i++) {
      scopeExcluded.add(IMAGES[i]);
    }
    applyCardStates();
    updateStatus();
  }

  function scopeSelectAll() {
    scopeExcluded.clear();
    applyCardStates();
    updateStatus();
  }

  // ── Text serialisation ─────────────────────────────────────────────
  function getSampleText() {
    return [...sampleSelected].join("\n") + "\n";
  }

  function getScopeText() {
    // Write the INCLUDED pages (= all pages minus excluded)
    const included = IMAGES.filter(f => !scopeExcluded.has(f));
    return included.join("\n") + "\n";
  }

  // ── Save handlers ──────────────────────────────────────────────────
  async function saveSelection() {
    if (SAVE_URL) {
      try {
        const r = await fetch(SAVE_URL, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({selection: getSampleText()})
        });
        await r.json();
        const btn = document.getElementById("dl-btn");
        btn.textContent = "Saved ✓";
        btn.style.background = "#15803d";
        return;
      } catch(e) {
        console.warn("Save to folder failed, falling back to download", e);
      }
    }
    const blob = new Blob([getSampleText()], {type: "text/plain"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "selection.txt";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  async function saveScope() {
    if (SAVE_SCOPE_URL) {
      try {
        const r = await fetch(SAVE_SCOPE_URL, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({selection: getScopeText()})
        });
        await r.json();
        const btn = document.getElementById("scope-btn");
        btn.textContent = "Saved ✓";
        btn.style.background = "#166534";
        return;
      } catch(e) {
        console.warn("Save to folder failed, falling back to download", e);
      }
    }
    const blob = new Blob([getScopeText()], {type: "text/plain"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "included_pages.txt";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function copyToClipboard() {
    const text = currentTab === 'sample'
      ? [...sampleSelected].join("\n")
      : IMAGES.filter(f => !scopeExcluded.has(f)).join("\n");
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById("copy-btn");
      const orig = btn.textContent;
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = orig, 1500);
    });
  }

  // Initial status render
  updateStatus();
</script>

</body>
</html>
