*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; font-size: 14px; background: #f8f8f6; color: #222; }
a { color: #1a6ebd; }
#app { display: flex; height: 100dvh; overflow: hidden; }

/* ── Sidebar ── */

#sidebar-header .sub { font-size: 12px; color: #595959; }
#volume-wrap { margin-top: 10px; display: none; background: #eef3fb; border: 1px solid #5a86b8; border-radius: 5px; padding: 8px 10px; }
#volume-select { width: 100%; font-size: 12px; padding: 4px 6px; border: 1px solid #767676; border-radius: 4px; background: #fff; color: #333; cursor: pointer; }
#sidebar-scroll { overflow-y: auto; flex: 1; padding: 10px 14px 20px; }

.facet-group { margin-bottom: 14px; }
.facet-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #555; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
.facet-clear { font-size: 11px; font-weight: 400; text-transform: none; color: #1a6ebd; cursor: pointer; letter-spacing: 0; background: none; border: none; padding: 0; }
.facet-item { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; cursor: pointer; user-select: none; }
.facet-item input[type=checkbox] { accent-color: #1a6ebd; cursor: pointer; flex-shrink: 0; }
.facet-item .val { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; }
.facet-item .cnt { font-size: 11px; color: #595959; flex-shrink: 0; }
.facet-more { font-size: 11px; color: #595959; margin-top: 3px; cursor: pointer; background: none; border: none; padding: 0; text-align: left; }
.facet-more:hover { color: #1a6ebd; }

/* ── Main panel ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#toolbar { padding: 10px 16px; border-bottom: 1px solid #ddd; background: #fff; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
#search { flex: 1; min-width: 180px; padding: 6px 10px; border: 1px solid #767676; border-radius: 4px; font-size: 13px; }
#count-label { font-size: 12px; color: #666; white-space: nowrap; }
#export-btn { padding: 5px 12px; background: #1a6ebd; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap; }
#export-btn:hover { background: #155a9e; }
#meta-strip { margin-left: auto; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
.meta-chip { font-size: 11px; background: #f0f0ee; border: 1px solid #ddd; border-radius: 10px; padding: 2px 8px; color: #555; white-space: nowrap; }
.meta-link { color: #1a6ebd; text-decoration: none; }
.meta-link:hover { background: #e0e8ff; border-color: #1a6ebd; }

#charts-row { padding: 10px 16px 0; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; border-bottom: 1px solid #eee; background: #fff; }
#charts-row.collapsed { display: none; }
#charts-toggle { padding: 4px 10px; background: none; border: 1px solid #767676; border-radius: 4px; cursor: pointer; font-size: 12px; color: #595959; white-space: nowrap; }
#charts-toggle:hover { border-color: #222; color: #222; }
.chart-block { display: flex; flex-direction: column; }
.chart-block h3 { margin: 0 0 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #555; }

thead tr.filter-row th { position: sticky; top: 33px; background: #f8f8f6; padding: 3px 6px; border-bottom: 1px solid #ddd; }
.col-filter-input { width: 100%; font-size: 11px; padding: 2px 5px; border: 1px solid #767676; border-radius: 3px; box-sizing: border-box; }
.col-filter-input:focus { outline: 2px solid #1a6ebd; outline-offset: 0; border-color: #1a6ebd; }

#content { flex: 1; display: flex; overflow: hidden; }

/* ── Table ── */
#table-wrap { flex: 1; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { position: sticky; top: 0; background: #f0f0ee; border-bottom: 2px solid #ddd; padding: 7px 10px; text-align: left; font-weight: 600; white-space: nowrap; cursor: pointer; user-select: none; }
thead th:hover { background: #e4e4e2; }
thead th.sorted-asc::after { content: " ↑"; color: #1a6ebd; }
thead th.sorted-desc::after { content: " ↓"; color: #1a6ebd; }
tbody tr { border-bottom: 1px solid #eee; cursor: pointer; }
tbody tr:hover { background: #f5f8ff; }
tbody tr.selected { background: #ddeeff; }
td { padding: 6px 10px; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
td.source-cell { text-align: center; }
.src-btn { background: #f0f0f0; border: 1px solid #767676; border-radius: 3px; padding: 2px 7px; cursor: pointer; font-size: 11px; color: #333; white-space: nowrap; }
.src-btn:hover { background: #fff; color: #1a6ebd; border-color: #1a6ebd; }
#no-results { padding: 40px; text-align: center; color: #595959; font-size: 14px; display: none; }

/* ── Detail panel ── */
#detail { width: 300px; min-width: 260px; max-width: 360px; background: #fff; border-left: 1px solid #ddd; overflow-y: auto; display: none; }
#detail.open { display: block; }
#detail-inner { padding: 14px; }
#detail-inner h2 { margin: 0 0 10px; font-size: 14px; font-weight: 700; line-height: 1.3; }
#detail-thumb { width: 100%; border-radius: 4px; margin-bottom: 10px; display: block; border: 1px solid #ddd; }
.detail-fields { display: grid; grid-template-columns: auto 1fr; gap: 4px 10px; font-size: 12px; }
.df-key { color: #666; font-weight: 600; white-space: nowrap; }
.df-val { word-break: break-word; }
.detail-source { margin-top: 12px; }
.detail-source a { font-size: 12px; }
#detail-close { float: right; background: none; border: none; font-size: 18px; cursor: pointer; color: #595959; line-height: 1; margin: -4px -4px 0 0; }
#detail-close:hover { color: #333; }
#mobile-header { display: none; }

ugar. Half a cup of butter. Three cups of flour. One cup of milk. Half a tea-spoon of soda. One tea-spoon of cream tartar. One tea-spoon of extract of almond. Use the yolks in the same way.", "ingredients": "['Whites of three eggs', 'One and a half cups of sugar', 'Half a cup of butter', 'Three cups of flour', 'One cup of milk', 'Half a tea-spoon of soda', 'One tea-spoon of cream tartar', 'One tea-spoon of extract of almond', 'Yolks of three eggs']", "steps": "['Mix ingredients together.', 'Use the yolks in the same way.']", "canvas_fragment": "https://www.loc.gov/item/unk81009721/canvas/19", "image": "0019_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0019.jpg"}, {"category": "Desserts", "recipe_name": "SPONGE CAKE", "recipe_text": "One lb. of eggs. One lb. of sugar. Half a lb. of flour. Beat the eggs separately.", "ingredients": "['One lb. of eggs', 'One lb. of sugar', 'Half a lb. of flour']", "steps": "['Beat the eggs separately.', 'Combine ingredients.']", "canvas_fragment": "https://www.loc.gov/item/unk81009721/canvas/19", "image": "0019_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0019.jpg"}, {"category": "Desserts", "recipe_name": "NUT BISCUIT", "recipe_text": "Take eight ounces of sweet almonds and four ounces of bitter ones; throw them into boiling water for five minutes; take out and skin them, pound them in a mortar; when fine enough, mix in four ounces of flour. The flour must be dry and well sifted. Then beat the yolks of two eggs; add to it eight ounces of fine white sugar, then add the whites of four eggs, beaten to a stiff froth. Add the", "ingredients": "['Eight ounces of sweet almonds', 'Four ounces of bitter almonds', 'Four ounces of flour', 'Yolks of two eggs', 'Eight ounces of fine white sugar', 'Whites of four eggs']", "steps": "['Throw almonds into boiling water for five minutes.', 'Take out and skin the almonds.', 'Pound almonds in a mortar.', 'Mix in four ounces of dry, well-sifted flour.', 'Beat the yolks of two eggs.', 'Add eight ounces of fine white sugar to the yolks.', 'Add the whites of four eggs, beaten to a stiff froth.']", "canvas_fragment": "https://www.loc.gov/item/unk81009721/canvas/19", "image": "0019_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0019.jpg"}, {"category": "Desserts", "recipe_name": "LEMON BISCUIT", "recipe_text": "One and a half lbs. of flour. One lb. of sugar. Twelve ounces of butter. Five eggs. Half a gill of milk. One table-spoon of lemon extract. Two tea-spoons of cream tartar. One tea-spoon of soda. One tea-spoon of almond extract can be used, if preferred.", "ingredients": "['1 1/2 lbs. flour', '1 lb. sugar', '12 ounces butter', '5 eggs', '1/2 gill milk', '1 table-spoon lemon extract', '2 tea-spoons cream tartar', '1 tea-spoon soda', '1 tea-spoon almond extract (optional)']", "steps": "['Combine ingredients and bake.']", "canvas_fragment": "https://www.loc.gov/item/unk81009721/canvas/20", "image": "0020_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0020.jpg"}, {"category": "Desserts", "recipe_name": "GINGER SPONGE CAKE", "recipe_text": "One cup of molasses. One cup of butter. Two cups of sugar. Four eggs. Three cups of flour. One cup of milk. One tea-spoon of soda. One table-spoon of ginger.", "ingredients": "['1 cup molasses', '1 cup butter', '2 cups sugar', '4 eggs', '3 cups flour', '1 cup milk', '1 tea-spoon soda', '1 table-spoon ginger']", "steps": "['Combine ingredients and bake.']", "canvas_fragment": "https://www.loc.gov/item/unk81009721/canvas/20", "image": "0020_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0020.jpg"}, {"category": "Desserts", "recipe_name": "BREAKFAST CAKES", "recipe_text": "One quart flour. One pint milk. Two eggs. Butter the size of an egg. One tea-spoon of soda. Two tea-spoons of cream tartar. Bake in a quick oven and heated pans.", "ingredients": "['1 quart flour', '1 pint milk', '2 eggs', 'Butter the size of an egg', '1 tea-spoon soda', '2 tea-spoons cream tartar']", "steps": "['Combine ingredients.', 'Bake in a quick oven and heated pans.']", "canvas_fragment": "https://www.loc.gov/item/unk81009721/canvas/20", "image": "0020_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0020.jpg"}, {"category": "Desserts", "recipe_name": "GRAHAM MUFFINS.", "recipe_text": "One pint of sour milk, A little salt. One table-spoon of sugar. One tea-spoon of soda or saleratus. Graham flour enough to make as stiff a batter as can well be stirred.", "ingredients": "['One pint of sour milk', 'A little salt', 'One table-spoon of sugar', 'One tea-spoon of soda or saleratus', 'Graham flour']", "steps": "['Mix ingredients to make as stiff a batter as can well be stirred.']", "canvas_fragment": "https://www.loc.gov/item/unk81009721/canvas/21", "image": "0021_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0021.jpg"}, {"category": "Desserts", "recipe_name": "CORN MUFFINS.", "recipe_text": "One pint of corn meal. One pint of sour milk. Two eggs. A little salt. Two table-spoons of sugar. Three tea-spoons of melted butter. Two small teaspoons of soda or saleratus. A handful of bread crumbs dried. Bake in a quick oven.", "ingredients": "['One pint of corn meal', 'One pint of sour milk', 'Two eggs', 'A little salt', 'Two table-spoons of sugar', 'Three tea-spoons of melted butter', 'Two small teaspoons of soda or saleratus', 'A handful of bread crumbs dried']", "steps": "['Combine ingredients.', 'Bake in a quick oven.']", "canvas_fragment": "https://www.loc.gov/item/unk81009721/canvas/21", "image": "0021_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0021.jpg"}, {"category": "Pickles", "recipe_name": "PICKLED GRAPES", "recipe_text": "Seven lbs. of fruit. Three and a half lbs. of sugar. One ounce of whole cinnamon. One ounce of whole cloves. Weigh the fruit and sugar. Push the pulp from the skins. Boil the pulp; when done, put it through a sieve. Put one quart of vinegar on the fire, with the sugar, and boil once. Then put the skins and pulp in with the spice and boil it a half hour or longer. Tie the spices in a piece of thin muslin.", "ingredients": "['Seven lbs. of fruit', 'Three and a half lbs. of sugar', 'One ounce of whole cinnamon', 'One ounce of whole cloves', 'One quart of vinegar']", "steps": "['Weigh the fruit and sugar.', 'Push the pulp from the skins.', 'Boil the pulp; when done, put it through a sieve.', 'Put one quart of vinegar on the fire, with the sugar, and boil once.', 'Put the skins and pulp in with the spice and boil it a half hour or longer.', 'Tie the spices in a piece of thin muslin.']", "canvas_fragment": "https://www.loc.gov/item/unk81009721/canvas/22", "image": "0022_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0022.jpg"}, {"category": "Pickles", "recipe_name": "SWEET TOMATO PICKLES.", "recipe_text": "Eight lbs. of tomatoes peeled. Four lbs. of sugar. Allspice, cloves and cinnamon (ground), half an ounce each. Boil one hour. When pretty cool, add one pint of vinegar.", "ingredients": "['8 lbs. tomatoes, peeled', '4 lbs. sugar', '1/2 oz. allspice (ground)', '1/2 oz. cloves (ground)', '1/2 oz. cinnamon (ground)', '1 pint vinegar']", "steps": "['Boil the tomatoes, sugar, and spices for one hour.', 'When the mixture is pretty cool, add the vinegar.']", "canvas_fragment": "https://www.loc.gov/item/unk81009721/canvas/23", "image": "0023_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0023.jpg"}, {"category": "Pickles", "recipe_name": "SEED CUCUMBER PICKLES.", "recipe_text": "Ten lbs. of cucumbers, pared and sliced, and with seeds taken out. Five lbs. of sugar. One ounce of cloves. One ounce of cinnamon. Half ounce of allspice. Three pints of vinegar. Put the cucumbers into clear water and boil until you can easily put a silver fork through it, and then drain it through a cullender. Put the spices in a bag. Boil the sugar, spices and vinegar, and pour over the cucumber. Let it stand three days. Then pour off and scald the syrup and pour back. Do this three times.", "ingredients": "['10 lbs. cucumbers, pared, sliced, and seeded', '5 lbs. sugar', '1 oz. cloves', '1 oz. cinnamon', '1/2 oz. allspice', '3 pints vinegar']", "steps": "['Put the cucumbers into clear water and boil until a silver fork can easily pass through them.', 'Drain the cucumbers through a cullender.', 'Put the spices in a bag.', 'Boil the sugar, spices, and vinegar together.', 'Pour the hot mixture over the cucumbers.', 'Let stand for three days.', 'Pour off the syrup, scald it, and pour it back over the cucumbers.', 'Repeat the scalding process three times.']", "canvas_fragment": "https://www.loc.gov/item/unk81009721/canvas/23", "image": "0023_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0023.jpg"}, {"category": "Pickles", "recipe_name": "GREEN TOMATO PICKLES.", "recipe_text": "Slice a peck of green tomatoes; sprinkle salt on them and let them lie over night. Drain them and then boil twenty", "ingredients": "['1 peck green tomatoes', 'Salt']", "steps": "['Slice the green tomatoes.', 'Sprinkle with salt and let lie overnight.', 'Drain the tomatoes.', 'Boil (text cut off).']", "canvas_fragment": "https://www.loc.gov/item/unk81009721/canvas/23", "image": "0023_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0023.jpg"}, {"category": "Pickles", "recipe_name": "CHOW CHOW", "recipe_text": "One peck of green tomatoes. Six peppers, taking out the seeds. Three onions. Chop together and cover them over night, adding two-thirds of a cup of salt. In the morning, draw off the liquor and just cover with vinegar. add one and a half cups of sugar. Less than a cup of made mustard. A table-spoon of cloves, allspice and cinnamon. Boil all about twenty minutes or more. Much improved by the addition of cauliflower and celery, with the other things.", "ingredients": "['One peck of green tomatoes', 'Six peppers', 'Three onions', 'Two-thirds of a cup of salt', 'Vinegar', 'One and a half cups of sugar', 'Less than a cup of made mustard', 'A table-spoon of cloves', 'Allspice', 'Cinnamon', 'Cauliflower (optional)', 'Celery (optional)']", "steps": "['Chop the tomatoes, peppers, and onions together.', 'Cover the mixture over night, adding two-thirds of a cup of salt.', 'In the morning, draw off the liquor.', 'Cover the mixture with vinegar.', 'Add sugar, made mustard, cloves, allspice, and cinnamon.', 'Boil all about twenty minutes or more.', 'Add cauliflower and celery if desired.']", "canvas_fragment": "https://www.loc.gov/item/unk81009721/canvas/24", "image": "0024_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0024.jpg"}, {"category": "Miscellaneous", "recipe_name": "DRESSING FOR COLE SLAW.", "recipe_text": "Rub together one cup of sugar and a piece of butter the size of a large egg. Add a well-beaten egg. Scald a pint of equal quantities of vinegar and water, and pour on these ingredients. When well mixed, pour it over the cabbage and stir it well. The cabbage should lie in cold water first, and then be finely chopped. Serve when cold.", "ingredients": "['one cup of sugar', 'piece of butter the size of a large egg', 'one well-beaten egg', 'a pint of equal quantities of vinegar and water', 'cabbage']", "steps": "['Rub together one cup of sugar and a piece of butter the size of a large egg.', 'Add a well-beaten egg.', 'Scald a pint of equal quantities of vinegar and water, and pour on these ingredients.', 'When well mixed, pour it over the cabbage and stir it well.', 'The cabbage should lie in cold water first, and then be finely chopped.', 'Serve when cold.']", "canvas_fragment": "https://www.loc.gov/item/unk81009721/canvas/25", "image": "0025_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0025.jpg"}, {"category": "Miscellaneous", "recipe_name": "STEWED LOBSTER.", "recipe_text": "To one lobster, boiled and cut in small pieces, add a pint of milk or water. A small piece of butter the size of half an egg, a little pepper and a little salt. Stew this together about ten minutes. Serve hot.", "ingredients": "['one lobster, boiled and cut in small pieces', 'a pint of milk or water', 'a small piece of butter the size of half an egg', 'a little pepper', 'a little salt']", "steps": "['To one lobster, boiled and cut in small pieces, add a pint of milk or water.', 'Add a small piece of butter the size of half an egg, a little pepper and a little salt.', 'Stew this together about ten minutes.', 'Serve hot.']", "canvas_fragment": "https://www.loc.gov/item/unk81009721/canvas/25", "image": "0025_public:gdcmassbookdig:bavarchikhanafor00unse:bavarchikhanafor00unse_0025.jpg"}];

. One cup of flour. Bake in jelly-cake tins, two layers. CUSTARD FOR THE ABOVE. Half a pint of milk. Two table-spoons of sugar. Two table-spoons of flour. One egg. Boil the custard and flavor with vanilla.", 1], ["One lb. of flour. One lb. of sugar. Three quarter lb. of butter. One quarter less with cream. One cup of cream or milk. Four eggs separated. One tea-spoon of soda. One tea-spoon of cloves and cinnamon, citron, currants and raisins. One glass of wine and one nutmeg.", 1], ["One cup of butter. Two cups of sugar. Three cups of flour. Four eggs. Half a cup of milk. One tea-spoon of soda. One cup of raisins. One cup of currants, citron, One tea-spoon of cloves, cinnamon and allspice.", 1], ["Whites of three eggs. One and a half cups of sugar. Half a cup of butter. Three cups of flour. One cup of milk. Half a tea-spoon of soda. One tea-spoon of cream tartar. One tea-spoon of extract of almond. Use the yolks in the same way.", 1], ["One lb. of eggs. One lb. of sugar. Half a lb. of flour. Beat the eggs separately.", 1], ["Take eight ounces of sweet almonds and four ounces of bitter ones; throw them into boiling water for five minutes; take out and skin them, pound them in a mortar; when fine enough, mix in four ounces of flour. The flour must be dry and well sifted. Then beat the yolks of two eggs; add to it eight ounces of fine white sugar, then add the whites of four eggs, beaten to a stiff froth. Add the", 1], ["One and a half lbs. of flour. One lb. of sugar. Twelve ounces of butter. Five eggs. Half a gill of milk. One table-spoon of lemon extract. Two tea-spoons of cream tartar. One tea-spoon of soda. One tea-spoon of almond extract can be used, if preferred.", 1], ["One cup of molasses. One cup of butter. Two cups of sugar. Four eggs. Three cups of flour. One cup of milk. One tea-spoon of soda. One table-spoon of ginger.", 1], ["One quart flour. One pint milk. Two eggs. Butter the size of an egg. One tea-spoon of soda. Two tea-spoons of cream tartar. Bake in // Metadata strip in top-right toolbar
function renderMetaStrip(meta) {
  const parts = [];
  if (meta.date)         parts.push(`<span class="meta-chip">${meta.date}</span>`);
  if (meta.institution)  parts.push(`<span class="meta-chip">${meta.institution}</span>`);
  if (meta.genre)        parts.push(`<span class="meta-chip">${meta.genre}</span>`);
  if (meta.homepage_url)
    parts.push(`<a class="meta-chip meta-link" href="${meta.homepage_url}" target="_blank">Item page ↗</a>`);
  const strip = document.getElementById("meta-strip");
  if (strip) strip.innerHTML = parts.join("");
}
renderMetaStrip(DOC_META);

let facetFields = FIELD_META.filter(f => f.type === "facet");
let displayFields = FIELD_META.filter(f => f.type !== "id");

// ── Volume selector ─────────────────────────────────────────────────────────
(function () {

// ── Filtering ──────────────────────────────────────────────────────────────
function getFiltered() {
  const q = searchQuery.trim().toLowerCase();
  return ALL_ENTRIES.filter(row => {
    // Search filter
    if (q) {
      const haystack = displayFields.map(f => (row[f.name] || "")).join(" ").toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    // Facet filters
    for (const f of facetFields) {
      const sel = facetState[f.name];
      if (sel.size === 0) continue;
      if (!sel.has(row[f.name] || "")) return false;
    }
    // Column header filters
    for (const [col, val] of Object.entries(colFilters)) {
      if (!val) continue;
      if (!(row[col] || "").toLowerCase().includes(val.toLowerCase())) return false;
    }
    return true;
  });
}

// ── Sort ───────────────────────────────────────────────────────────────────
function getSorted(rows) {
  if (!sortCol) return rows;
  return [...rows].sort((a, b) => {
    const av = (a[sortCol] || "").toLowerCase();
    const bv = (b[sortCol] || "").toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
}

// ── Canvas page extraction ─────────────────────────────────────────────────
function canvasId(row) {
  const cf = row.canvas_fragment || "";
  return cf.includes("#") ? cf.split("#")[0] : cf;
}

// ── Render: table body only (preserves thead / focus) ──────────────────────

    tr.setAttribute("tabindex", "0");
    tr.setAttribute("aria-selected", isSelected ? "true" : "false");
    displayFields.forEach(f => {
      const td = document.createElement("td");
      td.textContent = row[f.name] || "";
      td.title = row[f.name] || "";

    const tdSrc = document.createElement("td");

      });
      tdSrc.appendChild(btn);
    }
    tr.appendChild(tdSrc);
    const rowHandler = () => {
      selectedIdx = ALL_ENTRIES.indexOf(row);
      showDetail(row);
      renderTableBody();
    };
    tr.addEventListener("click", rowHandler);
    tr.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); rowHandler(); }
    });
    tbody.appendChild(tr);
  });

  const noResults = document.getElementById("no-results");
  noResults.style.display = sorted.length === 0 ? "block" : "none";
}

// ── Render: table head (sort row + filter row) ──────────────────────────────
function renderTableHead() {
  const head = document.getElementById("table-head");
  head.innerHTML = "";

  // Sort row
  const tr = document.createElement("tr");
  displayFields.forEach(f => {
    const th = document.createElement("th");
    th.textContent = f.name.replace(/_/g, " ");
    th.dataset.col = f.name;
    th.setAttribute("tabindex", "0");
    if (sortCol === f.name) {
      th.className = sortDir > 0 ? "sorted-asc" : "sorted-desc";
      th.setAttribute("aria-sort", sortDir > 0 ? "ascending" : "descending");
    } else {
      th.setAttribute("aria-sort", "none");
    }
    const sortHandler = () => {
      if (sortCol === f.name) sortDir = -sortDir;
      else { sortCol = f.name; sortDir = 1; }
      renderTableHead();
      renderTableBody();
    };
    th.addEventListener("click", sortHandler);
    th.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); sortHandler(); }
    });
    tr.appendChild(th);
  });
  const thSrc = document.createElement("th");
  thSrc.textContent = "Source";
  tr.appendChild(thSrc);
  head.appendChild(tr);

  // Filter row — inputs call renderTableBody only, preserving focus
  const filterRow = document.createElement("tr");
  filterRow.className = "filter-row";
  displayFields.forEach(f => {
    const fth = document.createElement("th");
    if (f.type === "facet" && f.top_values.length > 0) {
      const sel = document.createElement("select");
      sel.className = "col-filter-input";
      sel.setAttribute("aria-label", `Filter by ${f.name.replace(/_/g, " ")}`);
      const opt0 = document.createElement("option");
      opt0.value = ""; opt0.textContent = "(all)";
      sel.appendChild(opt0);
      f.top_values.forEach(([val]) => {
        const opt = document.createElement("option");
        opt.value = val; opt.textContent = val || "(empty)";
        if (colFilters[f.name] === val) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener("change", () => { colFilters[f.name] = sel.value; renderTableBody(); });
      fth.appendChild(sel);
    } else {
      const inp = document.createElement("input");
      inp.type = "text"; inp.className = "col-filter-input"; inp.placeholder = "filter…";
      inp.setAttribute("aria-label", `Filter by ${f.name.replace(/_/g, " ")}`);
      inp.value = colFilters[f.name] || "";
      inp.addEventListener("input", () => { colFilters[f.name] = inp.value; renderTableBody(); });
      fth.appendChild(inp);
    }
    filterRow.appendChild(fth);
  });
  filterRow.appendChild(document.createElement("th"));  // Source column
  head.appendChild(filterRow);
}

// ── Render: table (head + body) ─────────────────────────────────────────────
function renderTable() {
  renderTableHead();
  renderTableBody();
}

// ── Resolve canvas_fragment → human-browseable viewer URL ──────────────────
function viewerUrl(canvas_fragment) {
  if (!canvas_fragment) return "";
  const cid = canvas_fragment.includes("#") ? canvas_fragment.split("#")[0] : canvas_fragment;

  // CANVAS_MAP entry[3] is a pre-built viewer URL (e.g. NYPL Digital Collections)
  const entry = CANVAS_MAP[cid];
  if (entry && entry[3]) return entry[3];

  // Internet Archive: https://iiif.archive.org/iiif/{identifier}${page}/canvas
  const iaMatch = cid.match(/https:\/\/iiif\.archive\.org\/iiif\/([^$]+)\$(\d+)\/canvas/);
  if (iaMatch) {
    return `https://archive.org/details/${iaMatch[1]}/page/n${iaMatch[2]}/mode/2up`;
  }

  // Library of Congress: https://www.loc.gov/item/{id}/canvas/{num}
  const locMatch = cid.match(/https:\/\/www\.loc\.gov\/item\/([^/]+)\/canvas\/(\d+)/);
  if (locMatch) {
    const sp = parseInt(locMatch[2]);  // LoC canvas IDs are already 1-indexed
    const base = (currentDocMeta && currentDocMeta.resource_url)
      ? currentDocMeta.resource_url.replace(/\/?$/, "/")
      : `https://www.loc.gov/resource/${locMatch[1]}/`;
    return `${base}?sp=${sp}`;
  }

  // Fall back to the raw canvas URI
  return canvas_fragment;
}

function openSource(canvas_fragment) {
  const url = viewerUrl(canvas_fragment);
  if (url) window.open(url, "_blank");
}

// ── IIIF Content State deep-link ────────────────────────────────────────────
function contentStateUrl(canvas_fragment) {
  if (!VIEWER_URL || !MANIFEST_URL || !canvas_fragment) return "";
  const cid = canvas_fragment.includes("#") ? canvas_fragment.split("#")[0] : canvas_fragment;
  if (!cid) return "";
  const state = {
    "@context": "http://iiif.io/api/presentation/3/context.json",
    "type": "Annotation",
    "motivation": "contentState",
    "target": {
      "id": canvas_fragment,
      "type": "Canvas",
      "partOf": [{"id": MANIFEST_URL, "type": "Manifest"}]
    }
  };
  // base64url (RFC 4648 §5): standard base64 with + → -, / → _, padding stripped
  const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(state))));
  const encoded = b64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  return VIEWER_URL.replace(/\/$/, "") + "?iiif-content=" + encoded;
}

// ── Detail panel ───────────────────────────────────────────────────────────
function thumbUrl(row) {
  const cf = row.canvas_fragment || "";
  if (!cf) return "";
  const cid = cf.includes("#") ? cf.split("#")[0] : cf;
  const svc = CANVAS_MAP[cid];
  if (!svc) return "";
  if (cf.includes("#xywh=")) {
    const xywh = cf.split("#xywh=")[1].split(",").map(Number);
    if (xywh.length !== 4 || xywh[2] <= 0 || xywh[3] <= 0) return "";
    const [cw, ch] = [svc[1], svc[2]];
    if (!cw || !ch) return "";
    const padH = 40, padV = Math.max(xywh[3], 60), tw = 400;
    const rx = Math.max(0, xywh[0] - padH);
    const ry = Math.max(0, xywh[1] - padV);
    const rw = (xywh[0] + xywh[2] + padH) - rx;
    const rh = (xywh[1] + xywh[3] + padV) - ry;
    const xp = (rx / cw * 100).toFixed(4);
    const yp = (ry / ch * 100).toFixed(4);
    const wp = (rw / cw * 100).toFixed(4);
    const hp = (rh / ch * 100).toFixed(4);
    return `${svc[0]}/pct:${xp},${yp},${wp},${hp}/${tw},/0/default.jpg`;
  }
  return `${svc[0]}/full/400,/0/default.jpg`;
}

function showDetail(row) {
  const panel = document.getElementById("detail");
  panel.classList.add("open");

  const nameField = displayFields.find(f => f.name.includes("name") || f.name.includes("title"));
  document.getElementById("detail-title").textContent =
    (nameField && row[nameField.name]) || "(entry)";

  const img = document.getElementById("detail-thumb");
  const thumbLink = document.getElementById("detail-thumb-link");
  const url = thumbUrl(row);
  const csUrl = contentStateUrl(row.canvas_fragment);
  if (url) {
    img.src = url;
    img.style.display = "block";
    img.onerror = () => { img.style.display = "none"; };
    thumbLink.href = csUrl || viewerUrl(row.canvas_fragment) || "#";
  } else {
    img.style.display = "none";
    thumbLink.removeAttribute("href");
  }

  const fields = document.getElementById("detail-fields");
  fields.innerHTML = "";
  displayFields.forEach(f => {
    const val = row[f.name] || "";
    if (!val) return;
    const k = document.createElement("div");
    k.className = "df-key";
    k.textContent = f.name.replace(/_/g, " ");
    const v = document.createElement("div");
    v.className = "df-val";
    v.textContent = val;
    fields.appendChild(k);
    fields.appendChild(v);
  });

  const src = document.getElementById("detail-source");
  if (row.canvas_fragment) {
    const links = [];
    const srcUrl = viewerUrl(row.canvas_fragment);
    if (srcUrl) links.push(`<a href="${srcUrl}" target="_blank">Open source page ↗</a>`);
    const csUrl = contentStateUrl(row.canvas_fragment);
    if (csUrl) links.push(`<a href="${csUrl}" target="_blank">View in Mirador ↗</a>`);
    src.innerHTML = links.join(" · ");
  } else {
    src.innerHTML = "";
  }
}

document.getElementById("detail-close").addEventListener("click", () => {
  document.getElementById("detail").classList.remove("open");
  selectedIdx = null;
  renderTable();
});

// ── Render: facet sidebar ──────────────────────────────────────────────────
function renderFacetSidebar() {
  const container = document.getElementById("facet-controls");
  container.innerHTML = "";
  facetFields.forEach(f => {
    const grp = document.createElement("div");
    grp.className = "facet-group";

    const lbl = document.createElement("div");
    lbl.className = "facet-label";
    const labelText = document.createElement("span");
    labelText.textContent = f.name.replace(/_/g, " ");
    lbl.appendChild(labelText);
    if (facetState[f.name].size > 0) {
      const clr = document.createElement("button");
      clr.className = "facet-clear";
      clr.textContent = "clear";
      clr.setAttribute("aria-label", `Clear ${f.name.replace(/_/g, " ")} filter`);
      clr.addEventListener("click", () => {
        facetState[f.name].clear();
        renderAll();
      });
      lbl.appendChild(clr);
    }
    grp.appendChild(lbl);

    const showAll = showAllFacets.has(f.name);
    const topN = showAll ? f.top_values.length : Math.min(10, f.top_values.length);
    f.top_values.slice(0, topN).forEach(([val, cnt]) => {
      const item = document.createElement("label");
      item.className = "facet-item";
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = facetState[f.name].has(val);
      cb.addEventListener("change", () => {
        if (cb.checked) facetState[f.name].add(val);
        else facetState[f.name].delete(val);
        renderAll();
      });
      const valSpan = document.createElement("span");
      valSpan.className = "val";
      valSpan.textContent = val || "(empty)";
      valSpan.title = val;
      const cntSpan = document.createElement("span");
      cntSpan.className = "cnt";
      cntSpan.textContent = cnt.toLocaleString();
      item.appendChild(cb);
      item.appendChild(valSpan);
      item.appendChild(cntSpan);
      grp.appendChild(item);
    });

    if (!showAll && f.top_values.length > 10) {
      const more = document.createElement("button");
      more.className = "facet-more";
      more.textContent = `+ ${f.top_values.length - 10} more…`;
      more.setAttribute("aria-label", `Show ${f.top_values.length - 10} more ${f.name.replace(/_/g, " ")} values`);
      more.addEventListener("click", () => {
        showAllFacets.add(f.name);
        renderFacetSidebar();
      });
      grp.appendChild(more);
    }
    container.appendChild(grp);
  });
}

// ── Render: fill-rate chart ────────────────────────────────────────────────
function renderFillRate() {
  const el = document.getElementById("fill-rate-chart");
  const data = FIELD_META
    .filter(f => f.type !== "id")
    .map(f => ({ name: f.name.replace(/_/g, " "), fill: f.fill_rate }))
    .sort((a, b) => b.fill - a.fill);

  const plot = Plot.plot({
    width: 200, height: data.length * 16 + 20,
    marginLeft: 100, marginRight: 10, marginTop: 4, marginBottom: 16,
    x: { domain: [0, 1], label: null, tickFormat: "%", ticks: 2 },
    y: { label: null },
    marks: [
      Plot.barX(data, {
        x: "fill", y: "name",
        fill: d => d.fill >= 0.8 ? "#59a14f" : d.fill >= 0.4 ? "#f28e2b" : "#e15759",
        sort: { y: "x", reverse: true }
      }),
      Plot.text(data, {
        x: "fill", y: "name",
        text: d => (d.fill * 100).toFixed(0) + "%",
        dx: 4, frameAnchor: "left",
        fontSize: 9, fill: "#444",
      }),
      Plot.ruleX([0]),
    ],
    style: { fontSize: "11px" },
  });
  el.innerHTML = "";
  el.appendChild(plot);
}

// ── Render: facet bar charts ───────────────────────────────────────────────
function renderCharts() {
  const row = document.getElementById("charts-row");
  row.innerHTML = "";

  const filtered = getFiltered();

  facetFields.slice(0, 4).forEach(f => {
    // Count filtered values
    const counts = {};
    filtered.forEach(r => {
      const v = r[f.name] || "(empty)";
      counts[v] = (counts[v] || 0) + 1;
    });
    const data = Object.entries(counts)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 15)
      .map(([v, c]) => ({ v, c }));

    if (data.length === 0) return;

    const block = document.createElement("div");
    block.className = "chart-block";
    const h3 = document.createElement("h3");
    h3.textContent = f.name.replace(/_/g, " ");
    block.appendChild(h3);

    const barHeight = 18;
    const plot = Plot.plot({
      width: 220,
      height: data.length * barHeight + 24,
      marginLeft: 110, marginRight: 30, marginTop: 2, marginBottom: 20,
      x: { label: null, grid: false },
      y: { label: null, tickSize: 0 },
      marks: [
        Plot.barX(data, {
          x: "c", y: "v",
          fill: d => facetState[f.name].has(d.v) ? "#1a6ebd" : "#aac4e6",
          sort: { y: "x", reverse: true },
          title: d => `${d.v}: ${d.c}`,
          rx: 2,
        }),
        Plot.text(data, {
          x: "c", y: "v", text: d => d.c.toString(),
          dx: 4, frameAnchor: "left",
          fontSize: 10, fill: "#555",
        }),
      ],
      style: { fontSize: "11px", cursor: "pointer" },
    });

    // Make bars clickable as filters
    plot.addEventListener("click", e => {
      const rect = e.target.closest("rect");
      if (!rect) return;
      const titleEl = rect.querySelector("title");
      const title = titleEl ? titleEl.textContent : "";
      const val = title.split(":")[0].trim();
      if (!val || val === "(empty)") return;
      if (facetState[f.name].has(val)) facetState[f.name].delete(val);
      else facetState[f.name].add(val);
      renderAll();
    });

    // Make bars keyboard-accessible
    plot.querySelectorAll("rect").forEach(rect => {
      const titleEl = rect.querySelector("title");
      if (!titleEl) return;
      rect.setAttribute("tabindex", "0");
      rect.setAttribute("role", "button");
      rect.setAttribute("aria-label", titleEl.textContent);
      rect.addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          rect.dispatchEvent(new MouseEvent("click", { bubbles: true }));
        }
      });
    });
    block.appendChild(plot);
    row.appendChild(block);
  });
}

// ── Export CSV ─────────────────────────────────────────────────────────────
document.getElementById("export-btn").addEventListener("click", () => {
  const filtered = getSorted(getFiltered());
  const cols = FIELD_META.map(f => f.name);
  const lines = [cols.map(c => JSON.stringify(c || "")).join(",")];
  filtered.forEach(row => {
    lines.push(cols.map(c => JSON.stringify(row[c] || "")).join(","));
  });
  const blob = new Blob([lines.join("\n")], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (DOC_TITLE || "entries").replace(/\s+/g, "_") + "_filtered.csv";
  a.click();
});

// ── Charts toggle ──────────────────────────────────────────────────────────
document.getElementById("charts-toggle").addEventListener("click", () => {
  const row = document.getElementById("charts-row");
  const btn = document.getElementById("charts-toggle");
  const collapsed = row.classList.toggle("collapsed");
  btn.textContent = collapsed ? "Show charts ▼" : "Hide charts ▲";
  btn.setAttribute("aria-expanded", collapsed ? "false" : "true");
});

// ── Mobile sidebar toggle ──────────────────────────────────────────────────
(function () {
  const filterBtn = document.getElementById("filter-btn");
  const backdrop  = document.getElementById("sidebar-backdrop");
  const app       = document.getElementById("app");
  function openSidebar()  { app.classList.add("sidebar-open");    filterBtn.setAttribute("aria-expanded", "true");  }
  function closeSidebar() { app.classList.remove("sidebar-open"); filterBtn.setAttribute("aria-expanded", "false"); }
  filterBtn.addEventListener("click", () => app.classList.contains("sidebar-open") ? closeSidebar() : openSidebar());
  backdrop.addEventListener("click", closeSidebar);
  document.getElementById("facet-controls").addEventListener("change", () => {
    if (window.innerWidth <= 640) closeSidebar();
  });
})();

// ── Search input ───────────────────────────────────────────────────────────
let searchTimer;
document.getElementById("search").addEventListener("input", e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value;
    renderAll();
  }, 180);
});

// ── Render all ─────────────────────────────────────────────────────────────
function renderAll() {
  renderFacetSidebar();
  renderCharts();
  renderTable();
}

renderFillRate();
if (window.innerWidth <= 640) {
  document.getElementById("charts-row").classList.add("collapsed");
  const _ctBtn = document.getElementById("charts-toggle");
  _ctBtn.textContent = "Show charts ▼";
  _ctBtn.setAttribute("aria-expanded", "false");
}
renderAll();
</script>
