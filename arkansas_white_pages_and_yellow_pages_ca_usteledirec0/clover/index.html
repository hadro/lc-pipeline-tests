<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clover IIIF Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    clover-viewer { display: block; height: 100%; }
  </style>
</head>
<body>
  <script>
    // Decode a base64url-encoded IIIF content state string.
    function decodeContentState(encoded) {
      try {
        var b64 = encoded.replace(/-/g, "+").replace(/_/g, "/");
        while (b64.length % 4) b64 += "=";
        return JSON.parse(atob(b64));
      } catch (e) {
        console.warn("iiif-content decode failed:", e);
        return null;
      }
    }

    // Clover's iiif-content web-component attribute is broken for base64url
    // content states (github.com/samvera-labs/clover-iiif/issues/312).
    // Workaround: encode the content state as a blob URL and pass it as id.
    function contentStateToBlobId(stateObj) {
      var json = JSON.stringify(stateObj);
      var blob = new Blob([json], { type: "application/json" });
      return URL.createObjectURL(blob);
    }

    // Build a Clover-compatible SpecificResource content state from a canvas
    // URI (which may include a #xywh= fragment) and manifest URL.
    function buildContentState(canvasUri, manifestUrl) {
      var fragment = "";
      var canvasBase = canvasUri;
      var hashIdx = canvasUri.indexOf("#");
      if (hashIdx !== -1) {
        fragment = canvasUri.slice(hashIdx + 1);   // e.g. "xywh=10,20,100,50"
        canvasBase = canvasUri.slice(0, hashIdx);
      }

      var target = {
        "type": "SpecificResource",
        "source": {
          "id": canvasBase,
          "type": "Canvas",
          "partOf": [{ "id": manifestUrl, "type": "Manifest" }]
        }
      };
      if (fragment) {
        target["selector"] = { "type": "FragmentSelector", "value": fragment };
      }

      return {
        "@context": "http://iiif.io/api/presentation/3/context.json",
        "id": canvasBase + (fragment ? "#" + fragment : "") + "/content-state",
        "type": "Annotation",
        "motivation": ["contentState"],
        "target": target
      };
    }

    var iiifContentParam = new URLSearchParams(window.location.search).get("iiif-content");
    var el = document.createElement("clover-viewer");
    var insertAnchor = document.currentScript;

    if (!iiifContentParam) {
      // No content state — show a blank viewer (no default manifest to guess).
      document.body.appendChild(el);
    } else {
      var state = decodeContentState(iiifContentParam);

      if (!state || !state.target) {
        // Unparseable — nothing to show.
        document.body.appendChild(el);
      } else if (state.target.type === "SpecificResource") {
        // Already in Clover's preferred format — pass straight through.
        el.setAttribute("id", contentStateToBlobId(state));
        insertAnchor.insertAdjacentElement("afterend", el);
      } else {
        // Simple format: target.id is a canvas URI (possibly with #xywh=),
        // target.partOf holds the manifest. Build a SpecificResource state.
        var target = state.target;
        var canvasUri = (typeof target === "string") ? target : (target.id || "");
        var manifestUrl =
          (target.partOf && target.partOf[0] && target.partOf[0].id) || "";

        if (!canvasUri || !manifestUrl) {
          document.body.appendChild(el);
        } else {
          el.setAttribute("id", contentStateToBlobId(buildContentState(canvasUri, manifestUrl)));
          insertAnchor.insertAdjacentElement("afterend", el);
        }
      }
    }
  </script>

  <script src="clover.umd.patched.js"></script>
</body>
</html>
