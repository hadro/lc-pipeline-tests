, "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Sands Thomas", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Scheifflin Effingham", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Schiefflin H'y C.", "estimated_wealth": "100000", "biographical_note": "There is but this one family of the name, being descended from a German officer of the British army in the revolution, who while quartered here became enamoured with and married to a rich and beautiful heiress of an American family.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Schiefflin R. H.", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Schermerhorn Abraham", "estimated_wealth": "500000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Schermerhorn John", "estimated_wealth": "500000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Schermerhorn Peter", "estimated_wealth": "400000", "biographical_note": "The Schermerhorns are Dutch or German, and have risen to note within about a century past, as mechanics, small tradesmen, merchants, &c., keeping aloof from all entanglements of party strife or otherwise, and closely husbanding the abundant fruits of their laborious toil, which they have doubled by frequent alliances with other opulent families, the Jones, &c., of their own grade.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Schuchardt Frederick", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Sharp Peter", "estimated_wealth": "100000", "biographical_note": "Sharpe & Sutphen made their money honestly by vending whips and cowhides of every denomination, when horse and ox flesh were in greater repute than they have been since they have been driven off the course by the fire horses of steam. Peter Sharpe was once a great man in the old Democratic ranks, and became Speaker of the Assembly.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Sheldon Fredk.", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Shotwell Joseph S.", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Simers William L.", "estimated_wealth": "200000", "biographical_note": "About 30 years ago the most famous nostrum vender and quack advertiser that Cherry street could boast of. He was the \"Salus populi\" Dr. Horne & Evans of that day, as many a poor Jack Tar along the ship yards and quay could testify and say.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Smith Edmund (deceased)", "estimated_wealth": "250000", "biographical_note": "An ancient merchant of the \"Bull Smith\" branch of the legions of Smith. Edmund's ancestor was Patentee of Smithtown, Suffolk county, and an illustrious name in our early annals.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Smith John T.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Smith Peter", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Smith Renel", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Smith Cornelius", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Smith Micah J.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Spofford Paul", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Springler's Estate Mr.", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Stacey James G.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Stagg John P.", "estimated_wealth": "100000", "biographical_note": "Of an old Knickerbocker race.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Stagg Benj.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Stephens Benjamin", "estimated_wealth": "400000", "biographical_note": "A wealthy New York merchant in the grocer line, and father of the present renowned traveller, who was brought up in the midst of muscovados and molasses, but his roaming spirit could not long endure such a pr son, and Palestine and Palenque are carved on his shield.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Stevens Horatio G.", "estimated_wealth": "150000", "biographical_note": "Brother of \"Alderman Sam,\" William, John, &c.- Their father Maj. Gen. Ebenezer Stevens, was a meritorious and gallant officer of the old continental line of the army of the revolution, and as Major commanded the artillery with deadly effect in several bloody encounters.- How honorable to Major Stevens to rise to that point from out of the ranks where it is said he enlisted as a private soldier, leaving his tools as a journeyman carpenter to take up the sword and battle axe for liberty. His sons have many of them inherited much of his inborn energy and power of mind. The Stevenses so celebrated in engineering, and sons of Col. Stevens, of Hoboken, are a totally different family.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Stevens Alex. H.", "estimated_wealth": "150000", "biographical_note": "A surgeon of some repute, and son of General Ebene zer S. The Doctor's three successive marriages to rich heiresses has, we imagine, put more money in his purse than amputating tumors or tying up arteries.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Stevens John H.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Stevens Robt. L.", "estimated_wealth": "350000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Stevens Jno. C.", "estimated_wealth": "300000", "biographical_note": "Robert L. and John C. are sons of Col. Stevens, deceased, of Hoboken. The eminent ability of Robert, as one who alone has inherited the mantle of his friend Fulton, is too well known to need remark.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Steward John", "estimated_wealth": "300000", "biographical_note": "But 30 years a resident here, and by the force of his own straight-forward, clear-headed sagacity in the dry goods line, &c., has acquired near half a million.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Stewart A. T.", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Steward John Jr", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Stewart Robert", "estimated_wealth": "200000", "biographical_note": "One of two Scotch brothers, who, by marriage inherit the great old Dutch estate of the Lispenards, near Canal street.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Stuart R. L.", "estimated_wealth": "200000", "biographical_note": "Noble as the \"royal house of Stuart,\" is none we believe but this sweet gentleman whose steam candy trade has blown him and his up into bloated affluence, adopts the true version-being a true born Scot that can now support his title.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Stewart Lispenard", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Storm Stephen", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Storm Garret", "estimated_wealth": "200000", "biographical_note": "Of an old Knickerbocker race.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Stout Aguilla G.", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Strong George W.", "estimated_wealth": "150000", "biographical_note": "Of a Long Island family, of great respectability. The brother Benjamin, a very demure and over pious man in religious professions, but a bitter old Federalist was he in the politics of the olden time.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Strong Mrs. James", "estimated_wealth": "250000", "biographical_note": "She was a Remsen, we think, and from hence her great estate.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Sturges Jonathan", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Stuyvesant Peter G.", "estimated_wealth": "2500000", "biographical_note": "His ancestor, Governor-General and Admiral Von Peter Stuyvesant, that redoubtable little fiery gentleman, whose portraiture is so graphically touched by Diedrich Knickerbocker, and who, as the last of the Dutch dynasty, went out uproariously, a true martinet, subjecting all his vassals to courts martial, military flogging, &c., if they but dared to look at his surliness, is so familiarly known", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "", "estimated_wealth": "", "biographical_note": "in the history of New York, that this line suffices. Gov. Nicoll, from England, who brought the little gentleman to his bearings, omitted one thing, viz: to make him disgorge some of his cruel exactions, but Peter took the oath to the Gorgon banner of St. George, and doffed the beaver-tail and windmill escutcheon of Dutch authority, and thus retaining his rich cabbage gardens at Corlær's Hook and Bowery, hid himself away as snug as a mouse in a cheese. The generations from him are all baptized in the lace shirt in which he was christened. They inherit and keep too, the SILVER Spoon.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Suckley George", "estimated_wealth": "300000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Suffern Thos.", "estimated_wealth": "250000", "biographical_note": "A respectable Irish gent-nephew of the venerable Judge S., of Rockland Co., N. Y., deceased. The present Judge Edward Suffern, 1st Judge of Rockland Co., is son of the deceased Judge. Thomas owes his gold to o-bacco-that precious weed.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Suydam Fer'd S.", "estimated_wealth": "200000", "biographical_note": "A worthy and highly respectable old New York family, of Dutch extract, we believe, and have plodded along, minding their own business and heaping up wealth, and meddling with no one.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Suydam James", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Suydam (Estate of) John", "estimated_wealth": "700000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Suydam Lambert", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Suydam Rich'd", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Swan Benj'n L.", "estimated_wealth": "300000", "biographical_note": "The firm of Otis & Swan were peculiarly lucky in their commercial arrangements during the last war.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Swords James", "estimated_wealth": "100000", "biographical_note": "Eminent booksellers many years past. The best literary speculation one of them made was his intermarriage with a Lorillard.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Talbot C. Ν.", "estimated_wealth": "100000", "biographical_note": "The most distinguished Talbots were of the same family as Com. Talbot, an honored naval hero of our country.", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Tallmadge James", "estimated_wealth": "100000", "biographical_note": "The \"General,\" and once Lieut. Gov., and eminent as a jurist, senator, patron of American industry, &c. &c. \"Good wine needs no bush:", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Targee John", "estimated_wealth": "100000", "biographical_note": "A young French adventurer, silversmith by trade, emigrated, some fifty years ago, to this country, and by good conduct and industry, and great shrewdness as a polici-cian in the democratic ranks, to which he, as it turned out, wisely attached himself, rendered himself eminentuy conspicuous in that party, and for his untiring devotion to their interest, was ichty rewarded with sundry profitable posts of honor. So distinguished had he become from the Jeffersonian triumph of 1800 upward, that Vice President Tompkins made him his confidential friend, and he was every where looked upon for a time as the most influential leader, if not chier of the party in this quarter of the state. Hence during the struggles to supplant Clinton, the poet Croaker wrote thus- \"I'm sick of General Jackson's toast, Canals are nought to me; Nordo I care who rules the roast, Clinton or John Targee.\"", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Taylor Edward N.", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Taylor Jacob B.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Taylor Moses", "estimated_wealth": "300000", "biographical_note": "A very worthy man and grocer. His connection in bu siness with the Astors has brought gold to his coffers.", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Thompson Ab'm G.", "estimated_wealth": "350000", "biographical_note": "", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Thompson Samuel", "estimated_wealth": "300000", "biographical_note": "", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Thompson David", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Thompson Jonathan", "estimated_wealth": "250000", "biographical_note": "An apostle of the \"old guard\" of democracy, and comes from that vigorous nursery of such material, \"010", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Thorne Herman", "estimated_wealth": "1000000", "biographical_note": "This is the \"Colonel,\" the very pink and glass of fash-fon in the Parisian circles. His old quaker ancestors of Flushing and Cow Neck would open their eyes to enter his gorgeous private chapel at his imperial mansion in the French capital. What changes in the wheel of fortune, from an humble purser in the navy? But Herman can fall back to earliest English history for the high rank of his ancestry, whatever the world may think of his fashionable follies. He begins, we hear, to sicken of the heart lessness of the life he is leading.", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "'Tileston Thos.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Tillou F. R.", "estimated_wealth": "150000", "biographical_note": "A self-made man in the law; his father being a long time in the humble capacity of one of the Mayor's police marshals. This son married a sister of that remarkable genius and first of American poets, Dr. Joseph Rodman Drake-\" Croaker senior.\"", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Tisdale Samuel T.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Titus Wm. M.", "estimated_wealth": "100000", "biographical_note": "Of an old quaker family of Long Island.", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Todd Wm. W.", "estimated_wealth": "100000", "biographical_note": "Of a New York family we believe; long distinguished democratic merchants.", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Tonnellee John", "estimated_wealth": "200000", "biographical_note": "French-kept a large glove store in Pearl street.", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Towning", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Townsend Thomas J.", "estimated_wealth": "150000", "biographical_note": "Of the firm of T. J. and E. Townsend, dry good mer-chants, and self-made men. They are from Queen's Co., L. I., originally.", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Townsend John R.", "estimated_wealth": "200000", "biographical_note": "A highly respected member of the bar, and only son of Ald. Thoms S. T., deceased,", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Townsend Elihu", "estimated_wealth": "250000", "biographical_note": "Broker; of a New Haven family. He and his brother-in-law, Nevins, have amassed a large property.", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Treadwell Adam", "estimated_wealth": "200000", "biographical_note": "The Treadwells are an English family of great respec-tability who settled first at Ipswich, Mass., about two centuries ago.", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Trimble Daniel", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Trimble George T.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Tucker F. C.", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Tucker Gideon", "estimated_wealth": "400000", "biographical_note": "Self-made man. A mechanic and architect.", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Tucker Fanning C.", "estimated_wealth": "300000", "biographical_note": "This is truly a \"tall\" good fellow in every sense, being near seven feet in his shoes, as is plain to all men's views, sings an admirable song, and patronizes music and the opera, drives a fine team, and in short, is a first rate gentleman, living as a gentleman should, and showing that one can be such without neglecting even the severer enjagements of business and the counting room. For, where is the better and richer merchant than he among the whole catalogue of shippers? Prot. John B. Beck married a daughter of Mr. Tucker.", "alphabetical_letter": "T", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Van Allen James I.", "estimated_wealth": "400000", "biographical_note": "A shrewd old Knickerbocker, formerly from Kinder-hook; made his large property in the dry goods trade in times when great profits and small risks were the order of the day.", "alphabetical_letter": "V", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Van Buren John", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "V", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "Van Arsdale Peter, Dr.", "estimated_wealth": "100000", "biographical_note": "A highly respected physician, who has by dint of se-vere and continued hard labor in his profession, ac-quired, in the upper part of our city, where the pay is", "alphabetical_letter": "V", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/22", "image": "0022_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0022.jpg"}, {"name": "", "estimated_wealth": "", "biographical_note": "small, but sure, a comfortable fortune. He is of the old Dutch families.", "alphabetical_letter": "V", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Van Ransellaer (Estate of) Stephen", "estimated_wealth": "1000000", "biographical_note": "The late Patroon Van Rensellaer, of Albany, the lord of the manor Rensellaerwyck, the most ancient and distinguished name of the old Dutch gentry who came hither shortly after the discovery of the Hudson river 1609. The first Patroon or Lord Van Ransellaer, owned near thirty miles square, both sides the river, at, and above, and below Albany; the estate then comprehending that city, then a fortress, now a free town and capital of the State while the manor and all its feudal privileges, and the Helderberg mountains and its hardy tenants still do homage to the \"noble house of Van Ransellaer. No family in America has so long kept together an estate to be compared with this in value, extent and princely hereditaments. Next to John Jacob Astor's it is the wealthiest in the country. Besides the \"lordship\" the late Patroon owned hundreds of lots in New York city; among others the block where Niblo has his garden. This family, generation after generation, have almost always leaned to the cause of popular rights, and in the revolution staked all. Fortune has ever smiled on them, and they in turn fully content with their most abundant allotment in the prizes of this world, have had no grasping desires for power and office; and like the present young Patroon, \"young Steve,\" as his tenantry call him, let the world wag on in its own way, so they are let to hold fast to their own, however much the horn-blowers on the Helderberg may beleaguer the young Patroon and begrudge him the ownership of these posssessions, and threaten him with a breakfast of cold slugs, if he insist on the rent-roll.", "alphabetical_letter": "V", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Vandervoort Peter", "estimated_wealth": "150000", "biographical_note": "No more respected merchant or citizen of exemplary purity of life than this head of the ancient and respectable house of Vandervoort & Flandin, whose once gay, fancy store, on the corner of Trinity church yard, is now replaced by the not less fashionable Restaurant which rejoiceth in the not unappropriate name, (for such a locality) \"The Kremlin.\" Mr. Vandervoort owns the Kremlin house, and the family are one of the most ancient of the Dutch of this city.", "alphabetical_letter": "V", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Vanderbilt Cornelius", "estimated_wealth": "250000", "biographical_note": "Of an old Dutch root. Cornelius has evinced more energy and \"go aheadativeness\" in building and driving steamboats, and other projects, than ever one single Dutchman possessed. It takes our American hot suns to clear off the vapors and fogs of the \"Zuyder Zee,\" and wake up the phlegm of a descendant of old Holland.", "alphabetical_letter": "V", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Van Nest Abraham", "estimated_wealth": "300000", "biographical_note": "An old Dutchman and self-made man; formerly a saddler, then engaged in the saddlery hardware business, in which, and by the rise of real estate, he has made his money.", "alphabetical_letter": "V", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Van Nostrand John", "estimated_wealth": "100000", "biographical_note": "Respectable old Dutch family, from Jamaica, Long Island.", "alphabetical_letter": "V", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Van Schaick M.", "estimated_wealth": "200000", "biographical_note": "Of a respectable Dutch family of Albany, and married the daughter of the rich Jno. Hone, and moved here. Has been a Senator.", "alphabetical_letter": "V", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Varian Isaac L.", "estimated_wealth": "200000", "biographical_note": "Of the very oldest of the Dutch \"Mynheers\" who, some two centuries since, under, probably, Gov. Peter Minuit or Gov. Wm. Kieft, located with the Dyckmans, &c., as honest mechanics or farmers at Harlem, upon the outskirts of the island of Manhattan, Manahattas or Manhatoes, as this great city was variously called. There this colony, charmed with the muddy marshes of Spitendevil creek, so much like old Holland, remained and burroughed, and there they are to-day, till party strife has dragged some of them out into places of high prominence, like our late Mayor, Isaac; their harmless, industrious life being better political capital to any party than collegiate learning, as Isaac's success has proved, and his good judgment and plain democratic simplicity of manners weighing down all the disparagements of defective orthography and bad grammar.", "alphabetical_letter": "V", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Varnum Jos. B.", "estimated_wealth": "150000", "biographical_note": "One of the ancient \"noblesse\" of Vermont.", "alphabetical_letter": "V", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Verplank Gulian C.", "estimated_wealth": "200000", "biographical_note": "Son of the rich Judge V., of Fishhill, deceased. \"Gu lem Verplanck,\" the ancestor, is one of the names found on the earliest Dutch records of New Amsterdam and though himself of plain origin, rose to consideration in municipal trusts after the Engish Conquest, 1646. Gulian C. V., late Senator, holds the most polished and classical pen in American literature, but wants the pathos and feeling of Irving, and the strength and energy of many other of our native writers. Elegant diction and philological and antiquarian studies were, however, the true field of his genius, and it was a fatal error when he aspired to political honors and senatorial dignities. The bitter feuds of party strife, and the low intrigues and associations of scurvy politicians, was not the life for him. To be compelled to compromise his pride and finer feelings, to favor those whom he imagined might promote his political advancement, led to treacherous combinations that forfeited his claims to the respect and confidence of both the great parties with whom he alternately acted as his caprice dictated. To the reigning and now prostra'e idols of mere party, he often thus sacrificed the considerations of private friendship and personal obligations, and thus tarnished, in the declining years of life, a name that should never have had its lustre dimned.", "alphabetical_letter": "V", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Wagstaff (Estate of David)", "estimated_wealth": "200000", "biographical_note": "Had a fortunate father in the dry goods line.", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Walker Joseph", "estimated_wealth": "100000", "biographical_note": "English merchant.", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Walker R. G.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Wallace William", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Ward John", "estimated_wealth": "150000", "biographical_note": "Brother of Samuel, deceased, and of Richard. Of an ancient and honored name in the annals of Rhode Island.", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Ward Sam'l Jr.", "estimated_wealth": "100000", "biographical_note": "Son of Samuel, deceased, (vide.) Married a daughter of the rich Wm. B. Astor, (vide;) and is of the banking house his father Samuel belonged to.", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Whittemore Mrs. Sanauel", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Waring Henry", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Watt James", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Weed Nathaniel", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Weed Harvey", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Wells James N.", "estimated_wealth": "100000", "biographical_note": "James N. Wells rose from the humble vocation of a carpenter to be a rich man and alderman.", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Wendell John D.", "estimated_wealth": "500000", "biographical_note": "", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Wetmore William E.", "estimated_wealth": "800000", "biographical_note": "A young man of Rhode Island of good birth, launched his bark with the true spirit of a New England boy on the wide waters of the ocean, and after buffeting the wave of every sea, from the Pacific and her summer gales to Asia's perfumed isles and the angry Atlantic, returns long before he has reached his prime, bringing home with him the huge fortune made by his own hands and by bold adventures, and reaching to near a million. Many is the lasso which wiley dowagers and old bel dames have thrown out to noose this Chinese Mandarin of the first water, but it won't do; he is not a Giraffe to be caught by such bait, for he sees the drift and measures the breadth of simpering twaddle driven to its last shuffle. He prefers to enjoy the luxury of his own palankin and punka solus \"pour le present.\"", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "Weyman Abner", "estimated_wealth": "200000", "biographical_note": "One of the richest \"tailors\" of our city. A worthy family.", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "White (Estate of) Charlotte and Amelia", "estimated_wealth": "300000", "biographical_note": "Their father was of that high-toned circle of old English", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/23", "image": "0023_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0023.jpg"}, {"name": "", "estimated_wealth": "", "biographical_note": "gentlemen and merchants, who quondam dwelt in former times in that now much lampooned and inconsiderateey abused, Wall street, which, to believe certain infamous and obscene presses, is to day nothing better than a den of thieves and blacklegs, or robbers and murderers. The celebrated belles of this city in the revolution, when for seven years the martial trump and the plumed helmet of the red-coats flourished here, were decidedly these two charming sisters, the Miss Whites, but in the gay dance and the bewildering scenes of those spirit-stirring times, these fair damsels were too surrounded with England's noblest chivalry to know how to make up their minds, and thus lived on in the glorious independence of celibacy to these latter days-Miss Charlotte still surviving, They are some of the oldest of the English gentry of New York.", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/24", "image": "0024_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0024.jpg"}, {"name": "White Eli", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/24", "image": "0024_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0024.jpg"}, {"name": "White Wm. A.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/24", "image": "0024_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0024.jpg"}, {"name": "White Robert", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/24", "image": "0024_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0024.jpg"}, {"name": "Whitehead-Wm.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/24", "image": "0024_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0024.jpg"}, {"name": "Whiting James R. (N. England noblesse)", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/24", "image": "0024_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0024.jpg"}, {"name": "Whitlock W.", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/24", "image": "0024_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0024.jpg"}, {"name": "Whitney Stephen", "estimated_wealth": "3000000", "biographical_note": "Of the Whitneys of New England. As one obtained a pricelesss and goldless immortality, but no bread or provant for his family, by the invention of the cotton gin, which in a few short years drove the culture to hundreds of millions of pounds, so is Stephen in truth indebted to this same cotton and to this illustrious relative for the great fortune which he realized hand in hand \"argent comptant,\" by the sudden rise of the article, in which the aforesaid Stephen, habitually cautious as he is, was luckily at the time a very heavy operator.", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/24", "image": "0024_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0024.jpg"}, {"name": "Whittemore Timothy", "estimated_wealth": "100000", "biographical_note": "Another self-made man was his father, Samuel, by that curious and most ingenious of all ingenious Yankee inventions, the wool card maker, which by its complicated movements almost imitates the human hand, and human intelligence, self-propelling by steam. It is a rare instance of the inventions of genius giving return profits.", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/24", "image": "0024_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0024.jpg"}, {"name": "Willink I. Α.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/24", "image": "0024_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0024.jpg"}, {"name": "Williams Richard S.", "estimated_wealth": "150000", "biographical_note": "By faithful, close application to the grocery business, in which he bears a most respectable name, has acquired a large property. He is of the family of one of the greatest landholders among the early purchasers and settlers who colonized the English villages on Long Island, viz: Robert Williams, nephew it is believed, of Roger, the founder of Providence.", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/24", "image": "0024_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0024.jpg"}, {"name": "Williams R. S.", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/24", "image": "0024_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0024.jpg"}, {"name": "Willis John R.", "estimated_wealth": "150000", "biographical_note": "Hardware merchant, and of an ancient quaker family of Long Island.", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/24", "image": "0024_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0024.jpg"}, {"name": "Wilmerding Wm. E.", "estimated_wealth": "150000", "biographical_note": "Of the auction house of Austin & Wilmerding, and formerly with Haggerty. He is, we believe, German in extraction.", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/24", "image": "0024_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0024.jpg"}, {"name": "Winthrop Henry R.", "estimated_wealth": "100000", "biographical_note": "In expectancy this descendant of the first Governor of Massachusetts, may count on inheriting this amount by his marriage with Miss Hicks, a grand-daughter of the late Thomas Buchanan. The Winthrops have their family portraits for eight generations, as far back as the fifteenth century, when they left their rich possessions in England to found the city of Boston.", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/24", "image": "0024_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0024.jpg"}, {"name": "Winans Anthony V.", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/24", "image": "0024_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0024.jpg"}, {"name": "Woodruff Thos. T.", "estimated_wealth": "250000", "biographical_note": "An architect, and while an alderman had several fat contracts of the corporation.", "alphabetical_letter": "W", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/24", "image": "0024_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0024.jpg"}, {"name": "Wisner Gabriel", "estimated_wealth": "100000", " // Metadata strip in top-right toolbar
function renderMetaStrip(meta) {
  const parts = [];
  if (meta.date)         parts.push(`<span class="meta-chip">${meta.date}</span>`);
  if (meta.institution)  parts.push(`<span class="meta-chip">${meta.institution}</span>`);
  if (meta.genre)        parts.push(`<span class="meta-chip">${meta.genre}</span>`);
  if (meta.homepage_url)
    parts.push(`<a class="meta-chip meta-link" href="${meta.homepage_url}" target="_blank">Item page ↗</a>`);
  const strip = document.getElementById("meta-strip");
  if (strip) strip.innerHTML = parts.join("");
}

// ── Load a volume by label (data + UI reset, no render) ──────────────────
function loadVolume(label) {
  const vol = VOLUMES[label];
  if (!vol) return;
  ALL_ENTRIES = vol.rows;
  facetFields = vol.field_meta.filter(f => f.type === "facet");
  displayFields = vol.field_meta.filter(f => f.type !== "id");
  Object.keys(facetState).forEach(k => delete facetState[k]);
  facetFields.forEach(f => { facetState[f.name] = new Set(); });
  searchQuery = "";
  sortCol = null;
  sortDir = 1;
  selectedIdx = null;
  colFilters = {};
  showAllFacets.clear();
  try { sessionStorage.removeItem('showAllFacets'); } catch(e) {}
  document.getElementById("search").value = "";
  document.getElementById("detail").classList.remove("open");
  document.getElementById("doc-title").textContent = label;
  document.getElementById("doc-sub").textContent =
    ALL_ENTRIES.length.toLocaleString() + " entries";
  document.getElementById("mobile-title").textContent = label;
  document.getElementById("mobile-sub").textContent =
    ALL_ENTRIES.length.toLocaleString() + " entries";
  currentDocMeta = vol.doc_meta || {};
  activeManifestUrl = currentDocMeta.manifest_url || MANIFEST_URL;
  renderMetaStrip(currentDocMeta);
  renderFillRate();
}

// ── Volume selector ─────────────────────────────────────────────────────────
(function () {
  const volLabels = Object.keys(VOLUMES);
  if (volLabels.length === 0) return;
  const wrap = document.getElementById("volume-wrap");
  const sel  = document.getElementById("volume-select");
  wrap.style.display = "block";
  volLabels.forEach(label => {
    const opt = document.createElement("option");
    opt.value = label;
    opt.textContent = label + "  (" + VOLUMES[label].rows.length.toLocaleString() + ")";
    sel.appendChild(opt);
  });
  // Set h1, mobile title, and meta strip to first volume on load
  document.getElementById("doc-title").textContent = volLabels[0];
  document.getElementById("mobile-title").textContent = volLabels[0];
  currentDocMeta = VOLUMES[volLabels[0]].doc_meta || {};
  activeManifestUrl = currentDocMeta.manifest_url || MANIFEST_URL;
  renderMetaStrip(currentDocMeta);

  // Build mobile volume select
  const msel = document.getElementById("mobile-volume-select");
  volLabels.forEach(label => {
    const opt = document.createElement("option");
    opt.value = label; opt.textContent = label;
    msel.appendChild(opt);
  });
  msel.classList.add("visible");
  msel.addEventListener("change", () => {
    sel.value = msel.value;
    sel.dispatchEvent(new Event("change"));
  });

  sel.addEventListener("change", () => {
    loadVolume(sel.value);
    document.getElementById("mobile-volume-select").value = sel.value;
    renderAll();
  });
})();

  return ALL_ENTRIES.filter(row => {
    // Search filter
    if (q) {
      const haystack = displayFields.map(f => (row[f.name] || "")).join(" ").toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    // Facet filters
    for (const f of facetFields) {
      const sel = facetState[f.name];
      if (sel.size === 0) continue;
      if (!sel.has(row[f.name] || "")) return false;
    }
    // Column header filters
    for (const [col, val] of Object.entries(colFilters)) {
      if (!val) continue;
      if (!(row[col] || "").toLowerCase().includes(val.toLowerCase())) return false;
    }
    return true;
  });
}

// ── Sort ───────────────────────────────────────────────────────────────────
function getSorted(rows) {
  if (!sortCol) return rows;
  return [...rows].sort((a, b) => {
    const av = (a[sortCol] || "").toLowerCase();
    const bv = (b[sortCol] || "").toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
}

// ── Search match highlighting ─────────────────────────────────────────────
function escapeHtml(str) {
  const t = document.createElement("span");
  t.textContent = str;
  return t.innerHTML;
}
function highlightMatch(text, query) {
  if (!query || !text) return document.createTextNode(text || "");
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return document.createTextNode(text);
  const span = document.createElement("span");
  span.innerHTML =
    escapeHtml(text.slice(0, idx)) +
    "<mark>" + escapeHtml(text.slice(idx, idx + query.length)) + "</mark>" +
    escapeHtml(text.slice(idx + query.length));
  return span;
}

// ── Canvas page extraction ─────────────────────────────────────────────────
function canvasId(row) {
  const cf = row.canvas_fragment || "";
  return cf.includes("#") ? cf.split("#")[0] : cf;
}

// ── Render: table body only (preserves thead / focus) ──────────────────────
function renderTableBody() {
  const filtered = getFiltered();
  const sorted   = getSorted(filtered);

  document.getElementById("count-label").textContent =
    `${sorted.length.toLocaleString()} of ${ALL_ENTRIES.length.toLocaleString()} entries`;

  const tbody = document.getElementById("table-body");
  tbody.innerHTML = "";
  sorted.slice(0, 2000).forEach(row => {
    const tr = document.createElement("tr");
    const isSelected = ALL_ENTRIES.indexOf(row) === selectedIdx;
    if (isSelected) tr.classList.add("selected");
    tr.setAttribute("tabindex", "0");
    tr.setAttribute("aria-selected", isSelected ? "true" : "false");
    const q = searchQuery.trim().toLowerCase();
    displayFields.forEach(f => {
      const td = document.createElement("td");
      const cellText = row[f.name] || "";
      td.title = cellText;
      td.appendChild(highlightMatch(cellText, q));
      tr.appendChild(td);
    });
    const tdSrc = document.createElement("td");
    tdSrc.className = "source-cell";
    if (row.canvas_fragment) {
      const btn = document.createElement("button");
      btn.className = "src-btn";
      btn.textContent = "View page ↗";
      btn.title = "Open original digitized page image";
      btn.addEventListener("click", e => {
        e.stopPropagation();
        openSource(row.canvas_fragment);
      });
      tdSrc.appendChild(btn);
    }
    tr.appendChild(tdSrc);
    const rowHandler = () => {
      selectedIdx = ALL_ENTRIES.indexOf(row);
      showDetail(row);
      renderTableBody();
    };
    tr.addEventListener("click", rowHandler);
    tr.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); rowHandler(); }
    });
    tbody.appendChild(tr);
  });

  // End-of-results sentinel
  if (sorted.length > 0) {
    const sentinelTr = document.createElement("tr");
    sentinelTr.className = "table-end-sentinel";
    const sentinelTd = document.createElement("td");
    sentinelTd.colSpan = displayFields.length + 1;
    const cap = sorted.length > 2000
      ? `Showing first 2,000 of ${sorted.length.toLocaleString()} entries`
      : `Showing all ${sorted.length.toLocaleString()} entries`;
    sentinelTd.textContent = cap;
    sentinelTr.appendChild(sentinelTd);
    tbody.appendChild(sentinelTr);
  }

  const noResults = document.getElementById("no-results");
  noResults.style.display = sorted.length === 0 ? "block" : "none";
}

// ── Render: table head (sort row + filter row) ──────────────────────────────
function renderTableHead() {
  const head = document.getElementById("table-head");
  head.innerHTML = "";

  // Sort row
  const tr = document.createElement("tr");
  displayFields.forEach(f => {
    const th = document.createElement("th");
    th.textContent = FIELD_LABELS[f.name] || f.name.replace(/_/g, " ");
    // Add explanation tooltip for the "codes" column
    if (f.name === "codes") {
      const info = document.createElement("span");
      info.textContent = " ⓘ";
      info.title = "Classification codes from the directory’s key — e.g. L = Lager brewery, P = Porter/Ale brewery, M = Maltster, B-D = Brewery & Distillery, followed by a size class (1–6)";
      info.style.cssText = "cursor:help;font-size:11px;color:#888;font-weight:400;";
      info.addEventListener("click", e => e.stopPropagation());
      th.appendChild(info);
    }
    th.dataset.col = f.name;
    th.setAttribute("tabindex", "0");
    if (sortCol === f.name) {
      th.className = sortDir > 0 ? "sorted-asc" : "sorted-desc";
      th.setAttribute("aria-sort", sortDir > 0 ? "ascending" : "descending");
    } else {
      th.setAttribute("aria-sort", "none");
    }
    const sortHandler = () => {
      if (sortCol === f.name) sortDir = -sortDir;
      else { sortCol = f.name; sortDir = 1; }
      renderTableHead();
      renderTableBody();
    };
    th.addEventListener("click", sortHandler);
    th.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); sortHandler(); }
    });
    tr.appendChild(th);
  });
  const thSrc = document.createElement("th");
  thSrc.textContent = "Source";
  tr.appendChild(thSrc);
  head.appendChild(tr);

  // Filter row — inputs call renderTableBody only, preserving focus
  const filterRow = document.createElement("tr");
  filterRow.className = "filter-row";
  displayFields.forEach(f => {
    const fth = document.createElement("th");
    if (f.type === "facet" && f.top_values.length > 0) {
      const sel = document.createElement("select");
      sel.className = "col-filter-input";
      sel.setAttribute("aria-label", `Filter by ${f.name.replace(/_/g, " ")}`);
      const opt0 = document.createElement("option");
      opt0.value = ""; opt0.textContent = "(all)";
      sel.appendChild(opt0);
      f.top_values.forEach(([val]) => {
        const opt = document.createElement("option");
        opt.value = val; opt.textContent = val || "(empty)";
        if (colFilters[f.name] === val) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener("change", () => { colFilters[f.name] = sel.value; renderTableBody(); renderFacetSidebar(); renderCharts(); syncFilterUI(); });
      fth.appendChild(sel);
    } else {
      const inp = document.createElement("input");
      inp.type = "text"; inp.className = "col-filter-input"; inp.placeholder = "filter…";
      inp.setAttribute("aria-label", `Filter by ${f.name.replace(/_/g, " ")}`);
      inp.value = colFilters[f.name] || "";
      inp.addEventListener("input", () => { colFilters[f.name] = inp.value; renderTableBody(); renderFacetSidebar(); renderCharts(); syncFilterUI(); });
      fth.appendChild(inp);
    }
    filterRow.appendChild(fth);
  });
  filterRow.appendChild(document.createElement("th"));  // Source column
  head.appendChild(filterRow);
}

// ── Render: table (head + body) ─────────────────────────────────────────────
function renderTable() {
  renderTableHead();
  renderTableBody();
}

// ── Resolve canvas_fragment → human-browseable viewer URL ──────────────────
function viewerUrl(canvas_fragment) {
  if (!canvas_fragment) return "";
  const cid = canvas_fragment.includes("#") ? canvas_fragment.split("#")[0] : canvas_fragment;

  // CANVAS_MAP entry[3] is a pre-built viewer URL (e.g. NYPL Digital Collections)
  const entry = CANVAS_MAP[cid];
  if (entry && entry[3]) return entry[3];

  // Internet Archive: https://iiif.archive.org/iiif/{identifier}${page}/canvas
  const iaMatch = cid.match(/https:\/\/iiif\.archive\.org\/iiif\/([^$]+)\$(\d+)\/canvas/);
  if (iaMatch) {
    return `https://archive.org/details/${iaMatch[1]}/page/n${iaMatch[2]}/mode/2up`;
  }

  // Library of Congress: https://www.loc.gov/item/{id}/canvas/{num}
  const locMatch = cid.match(/https:\/\/www\.loc\.gov\/item\/([^/]+)\/canvas\/(\d+)/);
  if (locMatch) {
    if (currentDocMeta && currentDocMeta.resource_url) {
      return currentDocMeta.resource_url.replace(/\/?$/, "/") + `?sp=${parseInt(locMatch[2])}`;
    }
    // Derive resource URL + correct per-volume page number from CANVAS_MAP service ID.
    // Service ID format: https://tile.loc.gov/image-services/iiif/service:rbc:lcrbmrp:t8073:001
    // → resource lcrbmrp.t8073, sp=1 (not the global canvas number, which spans volumes).
    const mapEntry = CANVAS_MAP[cid];
    if (mapEntry && mapEntry[0]) {
      const svcId = mapEntry[0].split("/").pop();
      const svcMatch = svcId.match(/^service:(?:[^:]+):([^:]+):([^:]+):(\d+)$/);
      if (svcMatch) {
        return `https://www.loc.gov/resource/${svcMatch[1]}.${svcMatch[2]}/?sp=${parseInt(svcMatch[3])}`;
      }
    }
    return `https://www.loc.gov/resource/${locMatch[1]}/?sp=${parseInt(locMatch[2])}`;
  }

  // Fall back to the raw canvas URI
  return canvas_fragment;
}

function openSource(canvas_fragment) {
  const url = viewerUrl(canvas_fragment);
  if (url) window.open(url, "_blank");
}

// ── IIIF Content State deep-link ────────────────────────────────────────────
function contentStateUrl(canvas_fragment) {
  const mUrl = activeManifestUrl || MANIFEST_URL;
  if (!VIEWER_URL || !mUrl || !canvas_fragment) return "";
  const cid = canvas_fragment.includes("#") ? canvas_fragment.split("#")[0] : canvas_fragment;
  if (!cid) return "";
  const state = {
    "@context": "http://iiif.io/api/presentation/3/context.json",
    "type": "Annotation",
    "motivation": "contentState",
    "target": {
      "id": canvas_fragment,
      "type": "Canvas",
      "partOf": [{"id": mUrl, "type": "Manifest"}]
    }
  };
  // base64url (RFC 4648 §5): standard base64 with + → -, / → _, padding stripped
  const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(state))));
  const encoded = b64.replace(/[+]/g, "-").replace(/[/]/g, "_").replace(/=+$/, "");
  return VIEWER_URL.replace(/\/$/, "") + "?iiif-content=" + encoded;
}

// ── Detail panel ───────────────────────────────────────────────────────────
function thumbUrl(row) {
  const cf = row.canvas_fragment || "";
  if (!cf) return "";
  const cid = cf.includes("#") ? cf.split("#")[0] : cf;
  const svc = CANVAS_MAP[cid];
  if (!svc) return "";
  if (cf.includes("#xywh=")) {
    const xywh = cf.split("#xywh=")[1].split(",").map(Number);
    if (xywh.length !== 4 || xywh[2] <= 0 || xywh[3] <= 0) return "";
    const [cw, ch] = [svc[1], svc[2]];
    if (!cw || !ch) return "";
    const padH = 40, padV = Math.max(xywh[3], 60), tw = 400;
    const rx = Math.max(0, xywh[0] - padH);
    const ry = Math.max(0, xywh[1] - padV);
    const rw = (xywh[0] + xywh[2] + padH) - rx;
    const rh = (xywh[1] + xywh[3] + padV) - ry;
    const xp = (rx / cw * 100).toFixed(4);
    const yp = (ry / ch * 100).toFixed(4);
    const wp = (rw / cw * 100).toFixed(4);
    const hp = (rh / ch * 100).toFixed(4);
    return `${svc[0]}/pct:${xp},${yp},${wp},${hp}/${tw},/0/default.jpg`;
  }
  return `${svc[0]}/full/400,/0/default.jpg`;
}

function showDetail(row) {
  const panel = document.getElementById("detail");
  panel.classList.add("open");

  const nameField = displayFields.find(f => f.name.includes("name") || f.name.includes("title"));
  document.getElementById("detail-title").textContent =
    (nameField && row[nameField.name]) || "(entry)";

  const entryName = (nameField && row[nameField.name]) || "entry";
  const img = document.getElementById("detail-thumb");
  const thumbLink = document.getElementById("detail-thumb-link");
  const url = thumbUrl(row);
  const csUrl = contentStateUrl(row.canvas_fragment);
  if (url) {
    img.src = url;
    img.alt = `Scan showing ${entryName}`;
    img.style.display = "block";
    img.onerror = () => { img.style.display = "none"; };
    thumbLink.href = csUrl || viewerUrl(row.canvas_fragment) || "#";
    thumbLink.title = "View this entry highlighted in the original scan";
    thumbLink.setAttribute("aria-label", `View ${entryName} in source document`);
  } else {
    img.style.display = "none";
    img.alt = "";
    thumbLink.removeAttribute("href");
    thumbLink.removeAttribute("aria-label");
  }

  const fields = document.getElementById("detail-fields");
  fields.innerHTML = "";
  displayFields.forEach(f => {
    const val = row[f.name] || "";
    if (!val) return;
    const k = document.createElement("div");
    k.className = "df-key";
    k.textContent = FIELD_LABELS[f.name] || f.name.replace(/_/g, " ");
    const v = document.createElement("div");
    v.className = "df-val";
    v.textContent = VALUE_LABELS[val] || val;
    fields.appendChild(k);
    fields.appendChild(v);
  });

  const src = document.getElementById("detail-source");
  if (row.canvas_fragment) {
    const links = [];
    const srcUrl = viewerUrl(row.canvas_fragment);
    if (srcUrl) links.push(`<a href="${srcUrl}" target="_blank">Open source page ↗</a>`);
    const csUrl = contentStateUrl(row.canvas_fragment);
    if (csUrl) links.push(`<a href="${csUrl}" target="_blank">View in source document ↗</a>`);
    src.innerHTML = links.join(" · ");
  } else {
    src.innerHTML = "";
  }
}

document.getElementById("detail-close").addEventListener("click", () => {
  document.getElementById("detail").classList.remove("open");
  selectedIdx = null;
  renderTable();
});

// ── Render: facet sidebar ──────────────────────────────────────────────────
function renderFacetSidebar() {
  const container = document.getElementById("facet-controls");
  container.innerHTML = "";

  // Build live counts from the currently-filtered dataset so sidebar counts
  // always reflect column filters and global search, not just static top_values.
  const filteredForCounts = getFiltered();
  const liveCount = {};
  facetFields.forEach(f => {
    liveCount[f.name] = {};
    filteredForCounts.forEach(r => {
      const v = r[f.name] || "";
      liveCount[f.name][v] = (liveCount[f.name][v] || 0) + 1;
    });
  });

  facetFields.forEach(f => {
    const grp = document.createElement("div");
    grp.className = "facet-group";

    const lbl = document.createElement("div");
    lbl.className = "facet-label";
    const labelText = document.createElement("span");
    labelText.textContent = FIELD_LABELS[f.name] || f.name.replace(/_/g, " ");
    lbl.appendChild(labelText);
    if (facetState[f.name].size > 0) {
      const clr = document.createElement("button");
      clr.className = "facet-clear";
      clr.textContent = "clear";
      clr.setAttribute("aria-label", `Clear ${f.name.replace(/_/g, " ")} filter`);
      clr.addEventListener("click", () => {
        facetState[f.name].clear();
        renderAll();
      });
      lbl.appendChild(clr);
    }
    grp.appendChild(lbl);

    const showAll = showAllFacets.has(f.name);
    const topN = showAll ? f.top_values.length : Math.min(10, f.top_values.length);
    f.top_values.slice(0, topN).forEach(([val, cnt]) => {
      const item = document.createElement("label");
      item.className = "facet-item";
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = facetState[f.name].has(val);
      cb.addEventListener("change", () => {
        if (cb.checked) facetState[f.name].add(val);
        else facetState[f.name].delete(val);
        renderAll();
      });
      const valSpan = document.createElement("span");
      valSpan.className = "val";
      valSpan.textContent = VALUE_LABELS[val] || val || "(empty)";
      valSpan.title = VALUE_LABELS[val] || val;
      const cntSpan = document.createElement("span");
      cntSpan.className = "cnt";
      cntSpan.textContent = (liveCount[f.name][val] || 0).toLocaleString();
      item.appendChild(cb);
      item.appendChild(valSpan);
      item.appendChild(cntSpan);
      grp.appendChild(item);
    });

    if (!showAll && f.top_values.length > 10) {
      const more = document.createElement("button");
      more.className = "facet-more";
      more.textContent = `+ ${f.top_values.length - 10} more…`;
      more.setAttribute("aria-label", `Show ${f.top_values.length - 10} more ${f.name.replace(/_/g, " ")} values`);
      more.addEventListener("click", () => {
        showAllFacets.add(f.name);
        try { sessionStorage.setItem('showAllFacets', JSON.stringify([...showAllFacets])); } catch(e) {}
        renderFacetSidebar();
      });
      grp.appendChild(more);
    }
    container.appendChild(grp);
  });
}

// ── Render: fill-rate chart ────────────────────────────────────────────────
function renderFillRate() {
  const el = document.getElementById("fill-rate-chart");
  const data = FIELD_META
    .filter(f => f.type !== "id")
    .map(f => ({ name: f.name.replace(/_/g, " "), fill: f.fill_rate }))
    .sort((a, b) => b.fill - a.fill);

  const plot = Plot.plot({
    width: 200, height: data.length * 16 + 20,
    marginLeft: 100, marginRight: 10, marginTop: 4, marginBottom: 16,
    x: { domain: [0, 1], label: null, tickFormat: "%", ticks: 2 },
    y: { label: null },
    marks: [
      Plot.barX(data, {
        x: "fill", y: "name",
        fill: d => d.fill >= 0.8 ? "#59a14f" : d.fill >= 0.4 ? "#f28e2b" : "#e15759",
        sort: { y: "x", reverse: true }
      }),
      Plot.text(data, {
        x: "fill", y: "name",
        text: d => (d.fill * 100).toFixed(0) + "%",
        dx: 4, frameAnchor: "left",
        fontSize: 9, fill: "#444",
      }),
      Plot.ruleX([0]),
    ],
    style: { fontSize: "11px" },
  });
  el.innerHTML = "";
  el.appendChild(plot);
}

// ── Render: facet bar charts ───────────────────────────────────────────────
function renderCharts() {
  const row = document.getElementById("charts-row");
  row.innerHTML = "";

  const filtered = getFiltered();

  facetFields.slice(0, 4).forEach(f => {
    // Count filtered values
    const counts = {};
    filtered.forEach(r => {
      const v = r[f.name] || "(empty)";
      counts[v] = (counts[v] || 0) + 1;
    });
    const data = Object.entries(counts)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 15)
      .map(([v, c]) => ({ v, c }));

    if (data.length === 0) return;

    const block = document.createElement("div");
    block.className = "chart-block";
    const h3 = document.createElement("h3");
    h3.textContent = FIELD_LABELS[f.name] || f.name.replace(/_/g, " ");
    block.appendChild(h3);

    const barHeight = 18;
    const plot = Plot.plot({
      width: 220,
      height: data.length * barHeight + 24,
      marginLeft: 110, marginRight: 30, marginTop: 2, marginBottom: 20,
      x: { label: null, grid: false },
      y: { label: null, tickSize: 0, type: "band" },
      marks: [
        Plot.barX(data, {
          x: "c", y: "v",
          fill: "#aac4e6",
          sort: { y: "x", reverse: true },
          title: d => `${d.v}: ${d.c}`,
          rx: 2,
        }),
        Plot.text(data, {
          x: "c", y: "v", text: d => d.c.toString(),
          dx: 4, frameAnchor: "left",
          fontSize: 10, fill: "#555",
        }),
      ],
      style: { fontSize: "11px" },
    });
    block.appendChild(plot);
    row.appendChild(block);
  });
}

// ── Export CSV ─────────────────────────────────────────────────────────────
document.getElementById("export-btn").addEventListener("click", () => {
  const btn = document.getElementById("export-btn");
  btn.disabled = true;
  btn.textContent = "Exporting…";
  const filtered = getSorted(getFiltered());
  const cols = FIELD_META.map(f => f.name);
  const lines = [cols.map(c => JSON.stringify(c || "")).join(",")];
  filtered.forEach(row => {
    lines.push(cols.map(c => JSON.stringify(row[c] || "")).join(","));
  });
  const blob = new Blob([lines.join("\n")], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (DOC_TITLE || "entries").replace(/\s+/g, "_") + "_filtered.csv";
  a.click();
  setTimeout(() => { btn.disabled = false; btn.textContent = "Export CSV"; }, 600);
});

// ── Sync filter UI: URL hash + clear-filters button visibility ───────────
function syncFilterUI() {
  try { history.replaceState(null, "", stateToHash()); } catch(e) {}
  const anyActive = !!searchQuery ||
    Object.values(colFilters).some(v => v) ||
    Object.values(facetState).some(s => s.size > 0);
  document.getElementById("clear-filters-btn").style.display = anyActive ? "inline-block" : "none";
}

document.getElementById("clear-filters-btn").addEventListener("click", () => {
  Object.values(facetState).forEach(s => s.clear());
  colFilters = {};
  sortCol = null;
  sortDir = 1;
  showAllFacets.clear();
  try { sessionStorage.removeItem('showAllFacets'); } catch(e) {}
  searchQuery = "";
  document.getElementById("search").value = "";
  renderAll();
});

// ── URL hash state (shareable filtered links) ─────────────────────────────
function stateToHash() {
  const params = new URLSearchParams();
  const volLabels = Object.keys(VOLUMES);
  if (volLabels.length > 1) {
    const sel = document.getElementById("volume-select");
    if (sel) {
      const idx = volLabels.indexOf(sel.value);
      if (idx > 0) params.set("vol", idx);
    }
  }
  if (searchQuery) params.set("q", searchQuery);
  if (sortCol) params.set("sort", sortCol + ":" + (sortDir > 0 ? "asc" : "desc"));
  for (const [col, val] of Object.entries(colFilters)) {
    if (val) params.set("cf_" + col, val);
  }
  for (const [field, valSet] of Object.entries(facetState)) {
    if (valSet.size) params.set("f_" + field, [...valSet].join("|"));
  }
  const str = params.toString();
  return str ? "#" + str : location.pathname + location.search;
}

function applyHashState() {
  const raw = location.hash.slice(1);
  if (!raw) return;
  const params = new URLSearchParams(raw);

  // Volume: load data + reset filters, then apply overrides below
  if (params.has("vol")) {
    const volLabels = Object.keys(VOLUMES);
    const idx = parseInt(params.get("vol"), 10);
    if (idx > 0 && idx < volLabels.length) {
      const label = volLabels[idx];
      loadVolume(label);
      const sel = document.getElementById("volume-select");
      if (sel) sel.value = label;
      const msel = document.getElementById("mobile-volume-select");
      if (msel) msel.value = label;
    }
  }

  // Search query
  const q = params.get("q");
  if (q) {
    searchQuery = q;
    const el = document.getElementById("search");
    if (el) el.value = q;
  }

  // Sort
  const sort = params.get("sort");
  if (sort && sort.includes(":")) {
    const [col, dir] = sort.split(":");
    sortCol = col;
    sortDir = dir === "desc" ? -1 : 1;
  }

  // Column filters
  for (const [key, val] of params.entries()) {
    if (key.startsWith("cf_") && val) colFilters[key.slice(3)] = val;
  }

  // Facet filters
  for (const [key, val] of params.entries()) {
    if (key.startsWith("f_")) {
      const field = key.slice(2);
      if (facetState[field]) val.split("|").forEach(v => { if (v) facetState[field].add(v); });
    }
  }
}

// ── Render all ─────────────────────────────────────────────────────────────
function renderAll() {
  // Auto-close the detail panel whenever filters/search change so users
  // never see a stale record juxtaposed against a new result set.
  document.getElementById("detail").classList.remove("open");
  selectedIdx = null;
  renderFacetSidebar();
  renderCharts();
  renderTable();
  syncFilterUI();
}

renderFillRate();
if (window.innerWidth <= 640) {
  document.getElementById("charts-row").classList.add("collapsed");
  const _ctBtn = document.getElementById("charts-toggle");
  _ctBtn.textContent = "Show summary ▾";
  _ctBtn.setAttribute("aria-expanded", "false");
}
applyHashState();
renderAll();
</script>
