<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pipeline Data Explorer — Wealth and pedigree of the wealthy citizens of New York City : comprising an alphabetical arrangement of persons estimated to be worth $100,000 and upwards, with the sums appended to each name : being useful to banks, merchants and others.</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6/dist/plot.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; font-size: 14px; background: #f8f8f6; color: #222; }
a { color: #1a6ebd; }
#app { display: flex; height: 100dvh; overflow: hidden; }

/* ── Sidebar ── */
#sidebar { width: 240px; min-width: 200px; max-width: 300px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; overflow: hidden; }
#sidebar-header { padding: 14px 16px 10px; border-bottom: 1px solid #eee; }
#sidebar-header h1 { margin: 0 0 5px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #1a6ebd; }
#sidebar-header h2 { margin: 0 0 2px; font-size: 14px; font-weight: 700; line-height: 1.3; word-break: break-word; }
#sidebar-header .sub { font-size: 12px; color: #595959; }
#volume-wrap { margin-top: 10px; display: none; background: #eef3fb; border: 1px solid #5a86b8; border-radius: 5px; padding: 8px 10px; }
#volume-select { width: 100%; font-size: 12px; padding: 4px 6px; border: 1px solid #767676; border-radius: 4px; background: #fff; color: #333; cursor: pointer; }
#sidebar-scroll { overflow-y: auto; flex: 1; padding: 10px 14px 20px; }

.facet-group { margin-bottom: 14px; }
.facet-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #555; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
.facet-clear { font-size: 11px; font-weight: 400; text-transform: none; color: #1a6ebd; cursor: pointer; letter-spacing: 0; background: none; border: none; padding: 4px 6px; margin: -4px -6px -4px 0; }
.facet-item { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; cursor: pointer; user-select: none; }
.facet-item input[type=checkbox] { accent-color: #1a6ebd; cursor: pointer; flex-shrink: 0; }
.facet-item .val { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; }
.facet-item .cnt { font-size: 11px; color: #595959; flex-shrink: 0; }
.facet-more { font-size: 11px; color: #595959; margin-top: 3px; cursor: pointer; background: none; border: none; padding: 6px 4px; margin-left: -4px; text-align: left; }
.facet-more:hover { color: #1a6ebd; }

/* ── Main panel ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#toolbar { padding: 10px 16px; border-bottom: 1px solid #ddd; background: #fff; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
#search { flex: 1; min-width: 180px; padding: 6px 10px; border: 1px solid #767676; border-radius: 4px; font-size: 13px; }
#count-label { font-size: 12px; color: #666; white-space: nowrap; }
#clear-filters-btn { display: none; padding: 4px 10px; background: #fff; border: 1px solid #c66; border-radius: 4px; cursor: pointer; font-size: 12px; color: #b33; white-space: nowrap; }
#clear-filters-btn:hover { background: #fff0f0; border-color: #a44; }
#clear-filters-btn:focus-visible { outline: 2px solid #1a6ebd; outline-offset: 2px; }
#export-btn { padding: 5px 12px; background: #1a6ebd; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap; }
#export-btn:hover { background: #155a9e; }
#meta-strip { margin-left: auto; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
.meta-chip { font-size: 11px; background: #f0f0ee; border: 1px solid #ddd; border-radius: 10px; padding: 2px 8px; color: #555; white-space: nowrap; }
.meta-link { color: #1a6ebd; text-decoration: none; }
.meta-link:hover { background: #e0e8ff; border-color: #1a6ebd; }

#charts-row { padding: 10px 16px 0; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; border-bottom: 1px solid #eee; background: #fff; }
#charts-row.collapsed { display: none; }
#charts-toggle { padding: 4px 10px; background: none; border: 1px solid #767676; border-radius: 4px; cursor: pointer; font-size: 12px; color: #595959; white-space: nowrap; }
#charts-toggle:hover { border-color: #222; color: #222; }
.chart-block { display: flex; flex-direction: column; }
.chart-block h3 { margin: 0 0 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #555; }

thead tr.filter-row th { position: sticky; top: 33px; background: #eef2f6; padding: 3px 6px; border-top: 2px solid #c4d4e8; border-bottom: 1px solid #ddd; }
.col-filter-input { width: 100%; font-size: 11px; padding: 2px 5px; border: 1px solid #767676; border-radius: 3px; box-sizing: border-box; }
.col-filter-input:focus { outline: 2px solid #1a6ebd; outline-offset: 0; border-color: #1a6ebd; }

#content { flex: 1; display: flex; overflow: hidden; }

/* ── Table ── */
#table-wrap { flex: 1; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { position: sticky; top: 0; background: #f0f0ee; border-bottom: 2px solid #ddd; padding: 7px 10px; text-align: left; font-weight: 600; white-space: nowrap; cursor: pointer; user-select: none; }
thead th:hover { background: #e4e4e2; }
thead th[aria-sort="none"]::after { content: " ↕"; color: #bbb; font-size: 10px; }
thead th.sorted-asc::after { content: " ↑"; color: #1a6ebd; }
thead th.sorted-desc::after { content: " ↓"; color: #1a6ebd; }
tbody tr { border-bottom: 1px solid #eee; cursor: pointer; }
tbody tr:hover { background: #f5f8ff; }
tbody tr.selected { background: #ddeeff; }
td { padding: 6px 10px; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
td.source-cell { text-align: center; }
.src-btn { background: #f0f0f0; border: 1px solid #767676; border-radius: 3px; padding: 2px 7px; cursor: pointer; font-size: 11px; color: #333; white-space: nowrap; }
.src-btn:hover { background: #fff; color: #1a6ebd; border-color: #1a6ebd; }
#no-results { padding: 40px; text-align: center; color: #595959; font-size: 14px; display: none; }
#no-results p { margin: 6px 0 0; font-size: 12px; }
#no-results button { margin-top: 14px; padding: 5px 14px; background: #1a6ebd; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
#no-results button:hover { background: #155a9e; }
.table-end-sentinel td { text-align: center; color: #aaa; font-size: 12px; padding: 14px; border-top: 1px solid #ddd; }
mark { background: #ffe066; color: inherit; padding: 0 1px; border-radius: 2px; }

/* ── Detail panel ── */
#detail { width: 380px; min-width: 300px; max-width: 440px; background: #fff; border-left: 1px solid #ddd; overflow-y: auto; display: none; }
#detail.open { display: block; }
#detail-inner { padding: 14px; }
#detail-inner h2 { margin: 0 0 10px; font-size: 14px; font-weight: 700; line-height: 1.3; }
#detail-thumb { width: 100%; aspect-ratio: 4/3; object-fit: contain; background: #f5f5f5; border-radius: 4px; margin-bottom: 10px; display: block; border: 1px solid #ddd; }
.detail-fields { display: grid; grid-template-columns: auto 1fr; gap: 4px 10px; font-size: 12px; }
.df-key { color: #666; font-weight: 600; white-space: nowrap; }
.df-val { word-break: break-word; }
.detail-source { margin-top: 12px; }
.detail-source a { font-size: 12px; }
#detail-close { float: right; background: none; border: none; font-size: 18px; cursor: pointer; color: #595959; line-height: 1; padding: 6px 8px; margin: -6px -8px 0 0; }
#detail-close:hover { color: #333; }
#detail-close:focus-visible { outline: 2px solid #1a6ebd; outline-offset: 2px; border-radius: 2px; }
#mobile-header { display: none; }

/* ── Mobile (≤640 px) ───────────────────────────────────────────────────── */
@media (max-width: 640px) {
  #sidebar {
    position: fixed; top: 0; left: 0;
    width: 85vw; max-width: 300px; height: 100dvh;
    z-index: 200; min-width: 0;
    transform: translateX(-100%);
    transition: transform 0.22s ease;
    box-shadow: 2px 0 12px rgba(0,0,0,0.18);
  }
  #app.sidebar-open #sidebar { transform: translateX(0); }
  #sidebar-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 199;
  }
  #app.sidebar-open #sidebar-backdrop { display: block; }
  #filter-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 10px; background: none;
    border: 1px solid #767676; border-radius: 4px;
    cursor: pointer; font-size: 13px; color: #595959;
    white-space: nowrap; flex-shrink: 0;
  }
  #table-wrap { overflow-x: auto; }
  #detail {
    position: fixed; inset: 0;
    width: 100%; max-width: 100%; min-width: 0;
    height: 100dvh; z-index: 300;
    overflow-y: auto; border-left: none;
  }
  #detail-close { font-size: 24px; padding: 4px 8px; }
  #meta-strip { margin-left: 0; order: 3; width: 100%; }
  #mobile-header {
    display: block; padding: 8px 12px 6px;
    background: #fff; border-bottom: 1px solid #eee;
  }
  #mobile-title {
    font-size: 13px; font-weight: 700; line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #mobile-sub { font-size: 11px; color: #595959; margin-bottom: 4px; }
  #mobile-volume-select {
    display: none; width: 100%; font-size: 12px;
    padding: 4px 6px; border: 1px solid #767676; border-radius: 4px;
    background: #fff; color: #333; margin-top: 4px;
  }
  #mobile-volume-select.visible { display: block; }
  .col-filter-input { padding: 8px 6px; min-height: 44px; font-size: 13px; }
  .facet-item { padding: 4px 0; }
  .src-btn { padding: 8px 10px; font-size: 13px; }
  #clear-filters-btn, #export-btn, #charts-toggle { padding: 8px 14px; font-size: 13px; }
}
</style>
</head>
<body>
<div id="app">

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1><a href="https://github.com/hadro/directory-pipeline" target="_blank" style="color:inherit;text-decoration:none;">Pipeline Data Explorer</a></h1>
    <h2 id="doc-title"></h2>
    <div class="sub" id="doc-sub"></div>
    <div id="volume-wrap">
      <label for="volume-select" style="display:block;font-size:11px;color:#595959;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;">Select volume</label>
      <select id="volume-select"></select>
    </div>
  </div>
  <div id="sidebar-scroll">
    <div id="fill-rate-section">
      <div class="facet-label" style="margin-bottom:4px;">Field coverage</div>
      <p style="font-size:11px;color:#777;margin:0 0 6px;line-height:1.4;">Less than 100% means not every entry from the source scans had that field or value.</p>
      <div id="fill-rate-chart"></div>
    </div>
    <hr style="margin:12px 0; border:none; border-top:1px solid #eee;">
    <div id="facet-controls"></div>
  </div>
</div>
<div id="sidebar-backdrop" aria-hidden="true"></div>

<!-- Main -->
<div id="main">
  <div id="mobile-header">
    <div id="mobile-title"></div>
    <div id="mobile-sub"></div>
    <select id="mobile-volume-select" aria-label="Select volume"></select>
  </div>
  <div id="toolbar">
    <button id="filter-btn" style="display:none" aria-label="Open filters" aria-expanded="false" aria-controls="sidebar">&#9776; Filters</button>
    <input id="search" type="search" placeholder="Search all fields (name, address, city…)" autocomplete="off" aria-label="Search all fields">
    <span id="count-label" aria-live="polite" aria-atomic="true"></span>
    <button id="clear-filters-btn" aria-label="Clear all filters">× Clear filters</button>
    <div id="meta-strip"></div>
    <button id="charts-toggle" aria-expanded="true" aria-controls="charts-row">Hide summary ▴</button>
    <button id="export-btn">Export CSV</button>
  </div>
  <div id="charts-row"></div>
  <div id="content">
    <div id="table-wrap">
      <table id="results-table">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
      <div id="no-results">
        No entries match the current filters.
        <p>Try removing filters or adjusting your search.</p>
        <button id="clear-all-btn">Clear all filters</button>
      </div>
    </div>
    <div id="detail">
      <div id="detail-inner">
        <button id="detail-close" aria-label="Close detail panel">×</button>
        <h2 id="detail-title"></h2>
        <a id="detail-thumb-link" target="_blank"><img id="detail-thumb" alt="" style="display:none;cursor:pointer"></a>
        <div class="detail-fields" id="detail-fields"></div>
        <div class="detail-source" id="detail-source"></div>
      </div>
    </div>
  </div>
</div>
</div>

<script>
const ALL_INITIAL_ENTRIES = [{"name": "Abrams Samuel", "estimated_wealth": "150000", "biographical_note": "This oddity is of an ancient and respectable Jew family, and with his brother acquired a large fortune in the tobacco business, being one of the oldest firms in that line in our city.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/5", "image": "0005_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0005.jpg"}, {"name": "Abeel Jno. H.", "estimated_wealth": "100000", "biographical_note": "A very old and rich house in the iron line, and if not now, were once worth double the sum.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/5", "image": "0005_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0005.jpg"}, {"name": "Adams John", "estimated_wealth": "300000", "biographical_note": "As the name imports, one of our numerous New England \"immigrations.\" New York being in fact as much the metropolis of New England and the emporium of her commerce and of her enterprizing, adventurous and money-hunting population, as it is of the \"Empire State\" and of the American Continent. Our city has been none the worse, perhaps, for this influx from \"down east,\" which, like the fresher, deposits always \"en mouvement\" upon their own sterile soil, and driven by ocean currents, (favorite element to your Yankee race) have quite overlaid the original and primitive aggregations of early Dutch settlers of this once city of New Amsterdam. Mr. John Adams flourished in the dry goods line, when great wealth was easily and rapidly acquired thereby.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/5", "image": "0005_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0005.jpg"}, {"name": "Adee William", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/5", "image": "0005_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0005.jpg"}, {"name": "Agnew Cornelius", "estimated_wealth": "100000", "biographical_note": "An ancient New York family of great respectability, and a wealthy house.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/5", "image": "0005_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0005.jpg"}, {"name": "Allen Stephen", "estimated_wealth": "150000", "biographical_note": "Of a Long Island, New England, family, we believe, and for a long time kept one of the best sail lofts in the city; a man of austere temper, but reputed of stern honesty, strict probity, and great good sense, judg ment and energy, which, in despite of slight opportunities of education in early life, when he had \"to rough it\" with tarpaulin, elevated him to the Mayoralty and various other high and responsible trusts in the democratic party.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/5", "image": "0005_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0005.jpg"}, {"name": "Alley Saul", "estimated_wealth": "100000", "biographical_note": "Originally a chair or cabinet maker, and resided, we believe, at Charleston, S. C.; has since become in some sort a cabinet-maker in politics, in which some years back he took rather an ultra and prominent position. His fortune was acquired in the dry goods and importation and shipping business; being one of the numerous instances of an uneducated, unaided youth, among the mechanic class, who have, by their own indomitable energies and strong -intellect, advanced themselves to affluence.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/5", "image": "0005_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0005.jpg"}, {"name": "Allaire James P.", "estimated_wealth": "100000", "biographical_note": "Misfortune and temporary depression in the affairs of this enterprising citizen, whose foundry for steam machi nery and other castings are familiar by the excellent work turned out to all parts of the country, ought not to displace him from his true position, which, doubtless, his good sense and tact will soon enable him to resume, and to be what he is richly entitled to be, and what he once was, a demi-millionaire, to whom the mechanic classes in all the upper wards along the east river could point with conscious pride. His sister married the rich Mr. Haggerty. The Allaires, it would seem, are French, by the name.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/5", "image": "0005_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0005.jpg"}, {"name": "Alstyne John", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/5", "image": "0005_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0005.jpg"}, {"name": "Ames Barret", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/5", "image": "0005_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0005.jpg"}, {"name": "Amos Estate of Mr.", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/5", "image": "0005_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0005.jpg"}, {"name": "Amory Jonathan", "estimated_wealth": "100000", "biographical_note": "After a fiery ordeal, worse than that which his pipe-laying political associates are yet to pass through, this inerchant comes out unscathed from the savage assault, as it appeared to be, made upon his integrity by those who, when he was up in the world, flourishing as \" aide de camp\" of his Serene Highness, our small potatoe Governor Seward, were in ecstacies to have a smiling nod from him, to ruralize with him at their country villa, to press him to a seat in their carriage, or a spare queue in the \"salon de billiards.\" Verbum sap. Mr. Amory's Appleton, cousins at Boston, will no doubt rejoice to have it in their power to aid in reinstating, to the extent of their power, this persecuted man to his former wealth.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/5", "image": "0005_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0005.jpg"}, {"name": "Anderson Henry J.", "estimated_wealth": "100000", "biographical_note": "The respected Professor of Mathematics in Columbia College, a self-made man, who, while yet a boy, gave such promise of scientific precocity, that the chair of mathematics in the venerable institution named, and which was his own alma mater, fell to him as by inheritance, before he had scarce attained manhood. His father, Elbert, was a fashionable and most capital cabinet-maker, and afterwards, as an army contractor in the war, exhibited proof of great energy and scope of mind, and these he bequeathed to his children as a richer legacy than the gold he had accumulated. Elbert Anderson was truly an honor to the mechanic class. One of his sons married into the ancient family of Ellery of Rhode Island, another, who was in one of the legations abroad, married Miss Phelps, daughter of Thaddeus P.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/5", "image": "0005_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0005.jpg"}, {"name": "Andariese Barnet", "estimated_wealth": "100000", "biographical_note": "A very excellent tailor and a very amiable man was Mr. Andariese. This worthy citizen was a pattern of propriety and industry for many a purse-proud aristocrat of the new-made gentry that turned their nose up at him and his calling.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/5", "image": "0005_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0005.jpg"}, {"name": "Anderson Abel", "estimated_wealth": "200000", "biographical_note": "Truly able, both in gold and in law knowledge. His father was an admirable shoemaker, and we believe honest man, who deserved all that wax and leather made for him.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/5", "image": "0005_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0005.jpg"}, {"name": "Anthon John", "estimated_wealth": "150000", "biographical_note": "His father was a highly respectable and learned physician, native of Germany. or son of a German. The sons of Dr. Anthon have nearly all distinguished themselves by their great ability. John, as a lawyer; Henry, as a divine, and Charles, the truly illustrious professor of ancient languages in Columbia Collage in this city. John added a large amount to his fortune by his marriage with", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/5", "image": "0005_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0005.jpg"}, {"name": "", "estimated_wealth": "", "biographical_note": "mean the management of the late New York and Erie Rail Road, under which he was crushed in his political aspirations, if he had any, but saved his bacon, we hope. It was a losing day when he got into the company of scurvy politicians and to be the bosom friend of William H. Seward.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Boyd James", "estimated_wealth": "100000", "biographical_note": "A better sample of a rigidly honest and scrupulously exact mercantile man, and unobtrusive gentleman, no where exists, and we sincerely trust no commercial blast may ever seriously harm him in his honorable career.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Bradhurst J. M.", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Bradhurst Samuel", "estimated_wealth": "100000", "biographical_note": "The Bradhursts are an old New York family, who have acquired their fortune in the drug line, to which \"Alderman Sam\" has appended a very comfortable bo- nus through his marriage with a daughter of the rich Thomas Pearsall, deceased.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Brandreth Benj'n", "estimated_wealth": "150000", "biographical_note": "The celebreted vender of \"Brandreth's Pills,\" whose virtues are said to consist in aloes, &c., compounded with the greatest care and selected of the finest qualities. Em- piric then though he be, he is not of the murderous tribe.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Brevoort H. Jr.", "estimated_wealth": "300000", "biographical_note": "A worthy man and good citizen, but that he would ap- pear to be what he is not and strive to cast behind him the foreshadowing of by-gone events. To his kind hearted and venerable mother, whose weather-beaten features bore the brunt and pitiless peltings of many a piercing wintry northeaster of sleet and rain, as she sat vend- ing her vegetables, and carrots and York salad, under the unsheltered eaves of the market-house in the Bowery, is Henry indebted for the brilliant fortune and more brilliant education he received, all literally the fruits of her hard earnings. Further at present we know no- thing of Henry's lineage. He himself is distinctly and po- sitively of the order of \"literateurs,\" though not \"distingue\" He is of the \"novus homo,\" having, with his wife, a rich Southern widow, a very keen relish for all sorts of fashionable display, and like others of our would be no- billity a most abhorrent repugnance to any communica- tion with what such are pleased to call the \"profanun vul- gus,\" and \"basse classe,\" or \"canaille.\"", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Bronson Arthur", "estimated_wealth": "100000", "biographical_note": "The Bronsons date from the father, Doctor B., of Con- necticut, the great financier, a marvellous quality in one of the faculty.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Bronson Silas", "estimated_wealth": "250000", "biographical_note": "", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Brooks James", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Brooks Thomas", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Brooks Sydney", "estimated_wealth": "100000", "biographical_note": "Son of that John Jacob Astor of Boston Peter C. Brooks, brother of the late Governor B.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Brown Geo. W. (See Oscar Coles.)", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Brown James", "estimated_wealth": "300000", "biographical_note": "English firm of great repute.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Brown Sılas", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Brown Stewart", "estimated_wealth": "300000", "biographical_note": "", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Bruce George", "estimated_wealth": "100000", "biographical_note": "A worthy mechanic, who, in company with his bro- ther, from a printer, some years ago, became a type founder. By great industry and care, the possession of much natural shrewdness, and judicious operations in real estate, he has rendered himself wealthy, and is now mas- ter of a handsome fortune.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Bruce J. M.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Bruen Matthias", "estimated_wealth": "700000", "biographical_note": "When the great China merchant, Thos. H. Smith, of this city, failed, Bruen, through his son, Geo. W. B., who had married to Smith's daughter, became possessed of all Smith's ships, teas, &c., as Smith's bondsman. Govern- ment unwisely relinquished the greater part of what was due to the revenues, say $600,000, and this has made through rise of Smith's assets, houses, &c. a vast proper- ty for the Bruens, a New Jersey family, and originally dry goods merchants. Geo. W. lived in Italy and was in the Leghorn line.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Bryson David", "estimated_wealth": "100000", "biographical_note": "An honest upright Irishman, one of the nabobs of the tanners and curriers of the \"Swamp,\" with the Blood- goods, &c. Hasbeen an Alderman.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Buchanan Miss", "estimated_wealth": "150000", "biographical_note": "Daughter of Thomas Buchanan, (deceased.)", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Buckley Thomas", "estimated_wealth": "100000", "biographical_note": "English Quaker, merchant, who made a good adven- ture, the first impulse to his fortune, when he married a daughter of the rich John Lawrence, deceased.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Buckley Henry", "estimated_wealth": "100000", "biographical_note": "Son of Thos. (vide); and inherited a large estate by mar- riage with the daughter of Townsend Macoun, deceased, late Mayor of Troy.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Buloid Robert", "estimated_wealth": "150000", "biographical_note": "A most worthy, upright merchant, and made his fortune by a retail grocery establishment in Broadway, celebrated for its choice assortments of rarest delicacies that can pamper the appetite of epicures, in delicious wines, li- queurs and confitures.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Bunker Wm. J.", "estimated_wealth": "100000", "biographical_note": "Of the Nantucket Bunkers, of whom is the famous Commodore or \"Admiral\" Elihu S. Bunker, the first that drove a steamer on the wave of the ocean, having been the man who first navigated Long Island Sound in a steamboat-many, many years since.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Burnham (Estate of) Michael", "estimated_wealth": "200000", "biographical_note": "A good man, and one that every printer should point to the memory of with a just pride for it was as much through his exactitude as the financier and practicai head and proprietor in the Evening Post as to William Cole- man's master talent with the plume, that such wealth ac- crued to both out of that ancient and able political jour- nal. Burnham was a man, too, of good instruction and pleasing manners and has left a proud name for his family.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Burke Mrs. (widow of M. R.)", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Butler Benjamin F.", "estimated_wealth": "300000", "biographical_note": "With native powers of mind, and most unpretending de- portment in the profession which he adorns, and respected every where for his sincere piety and pure life, Mr. Van Buren saw in him one whose sterling name would bring much capital to the democratic ranks. An early alliance of friendship, and the yielding temper of Mr. Butler, met with their full rewards in the very lücrative post to which his friend Mr. Van Buren finally assigned him as U. S. District Attorney for New York City. No one envies such a man's wealth, \"Old Poins\" and his \"Report\" to the contrary notwithstanding.", "alphabetical_letter": "A", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Campbell Jno.", "estimated_wealth": "200000", "biographical_note": "Mr. Campbell, like his father, the late deceased and much respected proprietor of a large paper establishment, made the greater part of his fortun in that line, and has besides acquired much by inheritance. They are Scotch.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Campbell Geo. W.", "estimated_wealth": "100000", "biographical_note": "Brother of John.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Carman Rich'd F,", "estimated_wealth": "200000", "biographical_note": "A respectable New England name-carpenter by pro- fession, and by this gained his wealth; he himself wisely building his own houses for fools to buy or live in, the old adage being in this case reversed.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Carroll Isaac", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Carow Isaac", "estimated_wealth": "200000", "biographical_note": "One of our most reputable New York merchants.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Cary Henry", "estimated_wealth": "300000", "biographical_note": "Respectable, worthy merchants, he and his brother and trouble no one by any haughty display of their wealth-being gentlemen throughout, in mode and in manner.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/6", "image": "0006_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0006.jpg"}, {"name": "Carnes Francis (Estate of his daughters)", "estimated_wealth": "200000", "biographical_note": "A gentleman, every inch of him-and but few such specimens of a highly educated merchant. Resided a long while in Paris, where he was held in great consideration both among his countrymen and the elite of French society, for his fine taste, classical acquirements, polished manners, and ready wit. He is yankee born, of great respectability, and after many ups and downs of life and locating himself with his accomplished second wife at New York, his two beautiful daughters, just grown and by a former wife, have come into the above inheritance through death of a maternal great uncle.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/7", "image": "0007_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0007.jpg"}, {"name": "Catlin Geo. (Estate of his father Lynde C.)", "estimated_wealth": "100000", "biographical_note": "Time was, when in the healthy condition of banking institutions, to be a cashier of a bank like that venerable institution of which Lynde was the master spirit, was quite equivalent in consideration to a baronial title. Then, too exaggerated an importance was given in this money-making land to all who had the fingering of rag currency, while mere intellectual qualifications were in that \"bank-note age\" of Halleck, depreciated to below zero. Now the poverty and general depression of the times has drawn forth genius from its hiding-places and garrets, and given it a passable distinction, while every name almost that flourishes on the illuminated devices of a bank bill is looked at with scrutinizing suspicion. So wags the world as the equilibrium of those influences that govern society changes upon its axis. Of all these New England Catlins, George, the Indian Traveller and Painter, is indubitably the most distingue.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/7", "image": "0007_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0007.jpg"}, {"name": "Cavanna Augustus", "estimated_wealth": "100000", "biographical_note": "The only example, probably, of a hair dresser, and he an Italian, who, after steady application for many long years, has shaved his customers to the tune of some thirty thousand dollars, and invested it successfully in real estate so as to treble that sum. He has not lived in the atmosphere of Wall Street for nothing.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/7", "image": "0007_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0007.jpg"}, {"name": "Cebra John Y.", "estimated_wealth": "100000", "biographical_note": "The ex-alderman of the first ward, and an old and estimable citizen of New York, and though in years not advanced, may be deemed, from his useful public services, apart from his standing as a merchant, one of the fathers of the city.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/7", "image": "0007_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0007.jpg"}, {"name": "Center Robert", "estimated_wealth": "200000", "biographical_note": "Long a distinguished shipping merchant, of a numerous New York family of great respcctability.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/7", "image": "0007_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0007.jpg"}, {"name": "Chabert I. X.", "estimated_wealth": "100000", "biographical_note": "The French \"Fire Eater,\" apothecary, &c., who by some \"mandragora or other potent drug,\" burnt a hole in the heart of the rich old dowager, Mrs. Rapalye, of the ancient Dutch noblesse of Gotham-but the consuming passion removed the widow too soon for him from this earthly scene. The rent roll falling due, however, simultaneously with the arrival of the undertaker, yielded to the \"devourer of moulten metal\" only a modicum of the tons of silver and gold which he had hoped to have subjected to the fiery process of his crucibles. The black art of alchemy did not this time furnish him with the philosopher's stone or \"elixir vitæ,\" and with the revulsion of the widow's large estate to its legitimate heirs, the salamander returned to his vocation of swallowing the coals of fire that her premature death had heaped upon his head.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/7", "image": "0007_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0007.jpg"}, {"name": "Chauncey Henry", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/7", "image": "0007_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0007.jpg"}, {"name": "Cheeseman Dr.", "estimated_wealth": "100000", "biographical_note": "His father, an eminent quaker ship builder, gave the Dr. a good education, and by dint of Quaker influence in the government of the New York Hospital, got him there, and then through the same and a dashing horse and gig, into a rich quaker practice, for which the Doctor's personal elegance and bold ability as a cutter (surgeon) did much. If his celebrated uncle, Capt. Cheesman, who died so nobly under Montgomery at Quebec, was, as his comrades said; one of the finest looking men of his time, and took as much pains, as is is recorded, to make his toilette and beautify his person on the morning of that fatal day, as the Doctor does when visiting the saloons of the quaker noblesse, (who are ready to pay him $25 per visit) he must have been a second Beau Brummel. If the patronage of the quaker order of christians first brought note and wealth to the Doctor, his golden wings soon became fully fledged and strengthened, for he now doffed the shad bellied olive coat so velvety and neat, and the yellow breeches and white tops so polished, that had all in the matter of costume done him such faithful and essential service, and launched forth in to the gay world of frolick, fun and dance, of balls and banquets, and tableaux vivants. From being an exquisite of the first water in the quaker circle, he is now aspiring apparently to figure as the Henry Pelham of our new made nobility of the ultra fashionable society in the purlieus of upper Broadway. Ejection from communion with the quaker church, to which his wife, the daughter herself of a quaker preacher, was also subjected, widened the breach, and the Doctor is now virtually \"hors de combat\" for the little of the pure broad brim that will hurt him.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/7", "image": "0007_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0007.jpg"}, {"name": "Chesebrough R.", "estimated_wealth": "200000", "biographical_note": "A bighly respectable and worthy merchant, who acquired his property in the dry goods line.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/7", "image": "0007_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0007.jpg"}, {"name": "Chesebrough Mrs. (widow of Andronicus)", "estimated_wealth": "500000", "biographical_note": "", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/7", "image": "0007_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0007.jpg"}, {"name": "Chesterman James", "estimated_wealth": "200000", "biographical_note": "A worthy man and most capital tailor he was till an overgrown fortune honestly acquired in that unpretending vocation, obliged him to seek repose in a \"hacienda\" or \"chateau,\" \"a l'Anglois\" in the environs of this imperial city.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/7", "image": "0007_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0007.jpg"}, {"name": "Childs Samuel R. (Estate of his wife)", "estimated_wealth": "100000", "biographical_note": "A clever, shrewd New England physician, and dipped too deep in politics and real estate, but has been saved from shipwreck by marriage with the fashionable milliner Mrs. Thompson, with whom he is now on a tour through Europe.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/7", "image": "0007_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0007.jpg"}, {"name": "Clapp John", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/7", "image": "0007_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0007.jpg"}, {"name": "Clark Aaron", "estimated_wealth": "100000", "biographical_note": "Of this state-long the valuable clerk of the legislative Assembly through all changes and revolutions of politics, which, however, one day at last landed him by one sudden and violent gyration of the wheel of fortune into a lottery office, where after multifarious dealing with the Sybelline leaves of fate, and the blanks and prizes of life's cheqner board, another equally sudden wrench of the wheel placed him in the marble house or capitol of the city, firmly seated in diplomatic black silk breeches and formidable wig, in the \"fauteuil\" of the mayoral-ty-dispensing justice and law, and cartmen's licenses and passengers permits, instead of lottery tickets and uncurrent money. \"Viva la Bagatella! Leather and Prunella!\" But whatever \"gyrations\" Aaron may have made, and to whatever changing points of the compass the vane of his friendship or hostility has turned, we rank him a notable example of the facility with which persevering active, sleepless industry and ambition, with native born shrewdness of mind, and pleasant social manners may, like the upheaving volcano, work their way to the surface of notoriety, through every superincumbent stratum of obstruction and adversity.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/7", "image": "0007_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0007.jpg"}, {"name": "Clark Edwin", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/7", "image": "0007_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0007.jpg"}, {"name": "Clark Richard S.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/7", "image": "0007_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0007.jpg"}, {"name": "Clark Mrs. (widow of Benj'n)", "estimated_wealth": "100000", "biographical_note": "Mr. Clark, from \"down east,\" was famed as the Quaker lawyer, and friend of Daniel Webster; and a most worthy man and excellent jurist it is said he was.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/7", "image": "0007_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0007.jpg"}, {"name": "Clason Augustus W.", "estimated_wealth": "100000", "biographical_note": "Isaac Clason, first in the honorable vocation of a school master of a finished New England collegiate education, became one of the most prominent and enterprising shipping merchants of New York, and acquired and left a large estate. The lady of the present Postmaster, Colonel Jno. L. Graham is one of the daughters of Isaac Clason.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/7", "image": "0007_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0007.jpg"}, {"name": "Clinton Mrs. H. (widow of Geo.)", "estimated_wealth": "100000", "biographical_note": "Mrs. Hannah Clinton, daughter of Walter Franklin,", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/7", "image": "0007_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0007.jpg"}, {"name": "Clinton Charles A. (Estate of his wife)", "estimated_wealth": "100000", "biographical_note": "This oldest son of the ever to be lamented and never to be forgotten Governor Dewitt Clinton, every way wor thy of that illustrious man, is happily placed beyond the reach of the pecuniary distress which that father he- roically succumbed to for the sake of enriching ungrateful millions with the benefits of those magnificent works of internal improvement which immortalize his name The estate of Mr. Charles A. Clinton comes through his mar- riage with a grand-daughter of Jno. Hone.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Cobb Oliver", "estimated_wealth": "100000", "biographical_note": "A most excellent citizen and practical hard working man, beloved by all his brother merchants for his amiable disposition and plain republican manners and sterling virtues. Mr. Cobb has been long deemed one of the most respectable inhabitants of the first ward, where, though of whig politics, he has fulfilled the important trusts con- fided to him with equal satisfaction to all parties.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Coddington Jonathan I.", "estimated_wealth": "100000", "biographical_note": "A merchant, and late the worthy Postmaster, a gen- tleman every inch of him-through life, and from the first jump of his parentage on this continent, two centu ries since, in the person of the famous Wm. Coddington, Esq., of England, first of Boston, then the founder and first Governor of Rhode Island, (1638.) He was the first merchant of New England, built the first brick house in Boston, and at his house at Newport was held the first Quaker meeting. Jonathan is a lineal descendant of Gov. C., and was long a distinguished merchant of our city, and like his great progenitor, an unswerving demo- crat.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Coe William S.", "estimated_wealth": "100000", "biographical_note": "Of an old and respectable English stock, that were among the early patentees of Newtown and Jamaica, L. I., about two centuries past. For many years William S. Coe has been one of the hard working and most promi- nent and efficient gentlemen of the democratic party, and at last has reaped a comfortable indemnity for his services out of the various high trusts he has held, Surveyor, &c.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Coit Henry", "estimated_wealth": "100000", "biographical_note": "Of New England, and by a steady, faithful attention to a safe mercantile business, has happily escaped the tornados that have overwhelmed the large operators, and comes out unscathed with a fortune of which every dol- lar counts two on the rag-standard estimate of former years of bloated paper bubbles.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Coit Henry A.", "estimated_wealth": "100000", "biographical_note": "After roaming far and wide in commercial adventures, and passing through all the vicissitudes of clime and for- tune, this much esteemed and popular merchant finds him- self at last yet in the bloom of manhood, and with irrepres- sable energy of mind fixed in his native soil, and blessed here on his return with the luckiest, though the latest speculation he has made to wit, a charming yankee wife and rich heiress-the harrassing cares of the comp toir being thus converted into a \"far dolce niente.\" He is the son of Levi Coit, long known as one of our most re- spectable merchants of an old New England family in the land of steady habits.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Coles Oscar", "estimated_wealth": "200000", "biographical_note": "Of the Long Island branch of Coles, and inherits a large estate from his father, and another in expectancy through his beautiful wife, the daughter of a worthy citizen, Mr. George Brown, which latter, when mercantile reverses ruined him, had the noble energy of character to apply himself to the vocation of a hotel keeper, which, though perhaps less exalted, in common parlance, than the rank to which he was educated, proved infinitely more luera tive, and not only extricated him from the embarrassments that oppressed him, but yielded him splendid opulence. In this country, \"Dieu merci!\" such independence of spirit receives the approving reward of every virtuous mind whose good opinion is worth possessing, however swindling bankrupts, that have carried havoc in their pathway, may for a time brave public sentiment with their brazen effrontery, and dash jehu-like through the streets with their ill-gotten wealth, trampling under their horses' hoofs those even their betters, whom their villa- nous frauds have reduced to squalid beggary.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Coles Benj. U. (Estate of)", "estimated_wealth": "150000", "biographical_note": "The Coles of Long Island and of New York, and pro- bably those of Virginia are descendants of Mr. Robert Coles and others of that name, (doubtless all brothers,) who settled at Boston, Lynn, &c. about two centuries since, and are among the most ancient and respectable of American names. The ancient earldom of Enniskillen in Ireland belongs to the family of Coles, but their Irish descendants who came over, brought, we opine, precious little of the moveables thereof with them.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Coles Wm. J.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Coleman (widow of William)", "estimated_wealth": "100000", "biographical_note": "This estate was bravely acquired by her deceased hus- band, the celebrated Wm Coleman, former editor of the Evening Post. Through the most perilous storms of party strife, it must be conceded that this admirable man, even at the hazard of life and to the ultimate destruction of that life, gallantly maintained the old and impracticable doctrines of high-toned federalism in which he had been nurtured-but which, when war's alarms\" brought us into collision with a foreign foe, he never pushed to that point of black-cockade ultraism which made him forget as some others of his party unfortunately did, the obligations of patriotism and devotion to his country.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Colgate William", "estimated_wealth": "200000", "biographical_note": "A rich tallow chandler.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Collins E. K:", "estimated_wealth": "200000", "biographical_note": "One of our most distinguished shipping merchants and owners of packet lines. A son of New England, and de- scended from a family that occupy an illustrious page in the annals of those heroic men who resolutely resisted puritan persecution.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Conch William", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Conger Abrm. B.", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Conklin Jonas", "estimated_wealth": "100000", "biographical_note": "From Suffolk county, and a merchant.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Conover Stephen", "estimated_wealth": "100000", "biographical_note": "In the war he was at his post, ready to defend our city from foreign invasion, and on the return of peace resumed his mercantile pursuits as a hardware merchant, and by a close and prudential attention thereto has met with the reward he so eminently deserved. He is a most worthy and unpretending citizen, and of an old New York Knick erbocker family.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Contoit John H.", "estimated_wealth": "250000", "biographical_note": "Ice cream of the purest quality for near half a century may have melted away by the ton in the mouths of hun- dreds of generations who have frequented his well known fashionable garden. But Contoit's father, a busy old Frenchman, knew, it seems, how to solidify that perisha- ble luxury into heaps of massive and enduring gold, that will enrich all his posterity.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Corlies Joseph W.", "estimated_wealth": "250000", "biographical_note": "A worthy, intelligent, honest, industrious, enterprising quaker merchant, who acquired his fortune in the auc- foneer business. The name is probably Huguenot.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Corlies Benj'n", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Cornell Robt. C.", "estimated_wealth": "150000", "biographical_note": "Of the ancient Cornell family, (originally Cornhill or Cornwall,) of Cornwall Hall, Cornbury, L. Island. Their progenitor escaped from the horrid massacre at Throg's Neck, 1643, in which the immortal Anne Hutchinson, the head of the colony, and most of the others perished.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/8", "image": "0008_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0008.jpg"}, {"name": "Cornell Whitehead J", "estimated_wealth": "100000", "biographical_note": "resides at Brooklyn", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Cornell Peter C", "estimated_wealth": "100000", "biographical_note": "resides at Brooklyn", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Corse Israel", "estimated_wealth": "250000", "biographical_note": "Quaker, leather merchant, deceased, descendant, how ever, of a man of much military note, Colonel Israel Corse, of the American revolution-native, we believe, of Long Island.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Corson", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Coursen Abrm.", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Coster John G.", "estimated_wealth": "250000", "biographical_note": "And his brother, Henry A. deceased, of a respectable family in Amsterdam, and began here as merchants soon after the revolution, and by honest industry amassed a great fortune. While Napoleon held Holland, they, through confidential correspondence were enabled to know how far to push the trade thither, and thus in re turn importations of Gin found so rich a harvest that their wealth rapidly accumulated from that hour. They were gentlemen born, and of irreproachable integrity.- The three millions fortune the two brothers amassed is nearly all melted away before it has hardly got into the hands of their children. Dr. Hosack, deceased, made a deep gouge into that of Henry's widow, but where is it?", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Cottinet Francis", "estimated_wealth": "100000", "biographical_note": "Now one of the oldest and always has been one of the most respectable and prominent of our French importers of silks, &c. He married the accomplished daughter of General Edward Laight, being one of the few instances of the alliance of respectable French and American fami- lies.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Cotheal David", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Cozzens W B.", "estimated_wealth": "100000", "biographical_note": "One of the most ancient and honored names in the early annals of New York, when it became an English province.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Cram Jacob", "estimated_wealth": "250000", "biographical_note": "It is well this worthy citizen had accumulated his large fortune by the worm of the distillery before Tom Marshall, that maw-worm from Kentucky came on the scene to get up by his spirit-stirring and imspiring eloquence a tee totaling crusade against the consumers of every denomina- tion of ardent liquor. For it is ten to one in another 20 years it will be held as a capital crime to taste even a drop of Chateau Margot wine. That promising young comedian, Mason, the nephew of the immortal Kemble, made a good day's work o it when his fine personation of master Clifford obtained for him the hand of the fair daugh- ter of this almost demi-millionaire.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Crane Jacob", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Crosby Wm. B.", "estimated_wealth": "1000000", "biographical_note": "As the great nephew of the rich Col. Henry Rutgers, of the ancient Rutgers family of this ciiy, he inherited an immense estate. His wife, through her mother, is grand daughter of Gen. Wm. Floyd, one of the signers of the Declaration of Independence.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Cruger Mrs. Douglas", "estimated_wealth": "400000", "biographical_note": "Her father was Geo. Douglass, a Sco'ch merchant, who hoarded closely. His wine cellar was more extensive than his library. When George used to see people specu- lating and idle, it distressed him. He would say \"Peo ple get too many idees in their heads. Why don't they work?\" What a blessing he is not alive in this moon- shine age of dreamy schemings. The Crugers were of Bristol, Eng., of which the one that first came out here, \"Old Harry,\" father-in-law of the present judge Thos. Oakley, of the Superior Court, had been Mayor.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Cryder John", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Cushman Don Alonzo", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Cutting F. R.", "estimated_wealth": "100000", "biographical_note": "The Rev. Mr. Cutting, his grandfather, was the princi pal of a famous grammar school at Hempstead befor the American revolution, and from him the illustrious Dr. Sa muel L. Mitchill received his first lessons, as did also ma- ny of the sons of the gentlemen of Long Island of those times. His son William married a Livingston, and by this aud that hourly source of accumulating wealth, the Ful- ton steam ferry boats established by him-they have be- come extremely rich.", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Cutting Mrs. (widow of William)", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "C", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Dart Russell", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Dash John B.", "estimated_wealth": "150000", "biographical_note": "Respectable hardware merchant.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Dater Philip", "estimated_wealth": "200000", "biographical_note": "Dutch, of New Jersey, and probably son or nephew of Abraham D., an iron master, who owned a considerable forge on the Ramapo, in Rockland county, N. Y.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Davis Chas. A.", "estimated_wealth": "100000", "biographical_note": "Originally, on his father's side, it is said, of a Portuguese family, through a Portuguese lady saved miraculously from the earthquake of Lisbon to become the betrothed wife of the grandfather of Charles A., who was then British Consul at that capital. So far for Major Jack Downing No. 2, who did not altogether play fair to Zeba Smith, the real Simon Pure Jack, whose plumes he bor- rowed and made to fit with such counterfeit resemblance to those of the original owner.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Dawson William", "estimated_wealth": "100000", "biographical_note": "Is an English gentleman in the broker line and if not worth this sum himself, will inherit it through his wife, the daughter of Peter A. Jay.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "De Forest Alfred", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "De Forest Benjamin", "estimated_wealth": "350000", "biographical_note": "A most successful shipping merchant in the West In- dia trade.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "De Forest William W.", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Dekay George", "estimated_wealth": "250000", "biographical_note": "Of an ancient New York family, and while yet a youth was in high command as a commodore in the naval ser- vice of Buenos Ayres, where he gained laurels and libe- ral pay and prize money by his courage and nautical skill. On his return home he married the only daughter and child of the lamented Dr. Drake, the poet. The wife of Dr. Drake was the daughter of Mr. Eckford. Ano ther daughter of Mr. E. married Dr. James E. Dekay, brother of the commodore.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Dennison Lyman", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Delafield Dr. Edward", "estimated_wealth": "100000", "biographical_note": "Has re-estab'ished, by patient industry and sleepless perseverance, more than by any brilliant talen's he pos- sesss in his profession, the fallen fortunes of his house, a great name some forty years since, before his father's bankruptcy. An eye infirmary, with the usual quantom sufficit of puffing that heralds these very charitable insti- tutions, and which they now, enri hed by such \"applt- ances,\" would call chalatanerie, paved the way for that patronage which the aris ocracy have since bestowed upon him Now, firm in his saddle, he says, Viva la Humbug! Let those laugh who win for he has doubied his fortune by marrying he grand-daughter of the late Gen. Wm. Floyd. His brotar John has been an im- mense op rator in stocks, and Major Joseph, another bro ther, is a man of much scie tific acquirements.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Dalaplaine John F.", "estimated_wealth": "200000", "biographical_note": "His father was a rich old New Yorker, and John F. married also a daughter of the rich Isaac Clason.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "Delmonico John", "estimated_wealth": "200000", "biographical_note": "Who has not heard of the French-Italian Restaurant of Delmonico and his brother Peter. No parallel case of an Italian reaping such a fortune has ever occurred in the history of this city. But if the best of fare and choice wines and unceasing politeness to their guests merit for- tune, they eminently deserve what they have earned. The Delmonicos are natives of that part of Switzerland which borders on Italy. They may be said to have first in- troduced into our city a taste for those fashionable com- forts which can no where else be found but in the cuisine of a French Restaurateur, and since then others have", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/9", "image": "0009_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0009.jpg"}, {"name": "", "estimated_wealth": "", "biographical_note": "tried the experiment, but no one with the complete suc- cess which has attended their more perfect arrangements. Tact, ditpatch, cleanliness, courteous attention, and the choicest dishes and liquors served at a reasonable charge with pre-eminent skill are the elements of their populari- ty. John, besides the splendid hotel he has built on the French plan in the very business heart of the city, owns also a large country seat at Newtown, L. I. They are now among our most monied men, cash in hand, and withal of great prudence. The endorsement \"Delmoni- co\" would go as far as almost any name.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Deluze L. P.", "estimated_wealth": "100000", "biographical_note": "Foreigner-dry goods-respectable.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Demilt Samuel", "estimated_wealth": "100000", "biographical_note": "Old New Yorkers, and have made clocks and watches to some purpose. Their chronometers don't go upon tick.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Deming F.", "estimated_wealth": "250000", "biographical_note": "", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Dennison Chas.", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Depeyster J. W. (Estate of John Watts)", "estimated_wealth": "400000", "biographical_note": "One of our oldest Dutch families, that like good old wine or cheese need no eulogy. Look at the list of Bur- gomasters.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "De Rham Н. С.", "estimated_wealth": "150000", "biographical_note": "A foreign house, intermarried with our Moores.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Desbrosses (Estate of James)", "estimated_wealth": "600000", "biographical_note": "This is one of the old New York estates and families, which have accumulated like many others from large real possessions, from long before the American revolu- tion, and passed by intermarriage into other names The Desbrosses family, long deemed by the false standard in this country, for being m possession of considerable real estate for half a century or upwards, as among the \"pa- tres conscripti, are any thing but patrician in their ex- traction. Old Elias Desbrosses and his brother, (the latter grandfather of James above,) came out to this country as among the very poorest of the Houguenot emigrations, near two centuries since. They settled here, and carried on their vocation as French confectioners in a very hum- ble way, very probably the fashionable caterers for the few fetes and festivals that took place among the elite of society in those
