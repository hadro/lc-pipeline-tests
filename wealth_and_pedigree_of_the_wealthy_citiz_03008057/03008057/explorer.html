 primitive days. Their two maiden sis ters being at the same time the most esteemed milliners of that day, and furnishing the latest Parisian fashions, to our then belles of Broadway, exciting thus at that ear- ly period a taste for French costumes which is now all the rage, and not extraordinary when we reflect how well the classical taste of the French in matters of fe- male attire is adapted to the beautiful and sylph-like forms of American ladies. Through the aid of contec- tionery and millinery the grandson, James Desbrosses, above, became exceedingly wealthy and left his property to two daughters, one of whom married John Hunter, at present a senator in our legislature, and the other a Mr. Overing, of Rhode Island. The fate of the Chadeayne (sometimes spelt anciently and improperly Shadden, as pronounced.) family, is singularly contrasted with that of the Desbrosses. The Chadeaynes were also Huguenots, and came hither at the same time with the Desbrosses.- In their own country of France the Chadeaynes (asthe Desbrosses them-elves have often admitted,) were of the ancient aristocracy, into whose society the Desbrosses could not have obtained admission. Here the picture, under the operation of the rotatory topsy-turvy machine- ry of our wholesome system of polity, has been sadly reversed, and the Chadeaynes have been for generations down among the \"hewers of wood and drawers of wa- ter,\" and \"none so poor to speak to them.\"", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "De Ruyter John", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Dey Anthony", "estimated_wealth": "200000", "biographical_note": "But few of our eminent lawyers have struck out into such successful speculations in real estate as this gentle- man who, however, possesses far more shrewdness and long-reaching sagacity than most men, either in or out of the legal or any other profession. His operations in latter years seem to have been much confined to the management of his property.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Dickinson C.", "estimated_wealth": "300000", "biographical_note": "Of an ancient, honored house in the early annals, and this one a ship chandler and shipping merchant, who thus acquired, near half a century since, a splendid fortune. The late Edgar Evertsen, Esq, son of Nicholas, deceased, married a daughter of Mr. Dickinson.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Donaldson James", "estimated_wealth": "250000", "biographical_note": "", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Donaldson Robert", "estimated_wealth": "250000", "biographical_note": "These rich Donaldsons are Scotch gentlemen.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Douglas George", "estimated_wealth": "400000", "biographical_note": "", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Douglas Wm.", "estimated_wealth": "400000", "biographical_note": "Geo. and William, sons of Geo. above. See Cruger.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Downing George", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Drake James I.", "estimated_wealth": "200000", "biographical_note": "The Drakes are an old New York family. This one's father was in the clothing line, and well did he feather his own nest. The other rich Drakes were uncles of James J. D., and all hail from Admiral Sir Francis D.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Drake Mrs. Susannah", "estimated_wealth": "300000", "biographical_note": "Her husband was brother of James Drake, deceased. On of her daughters married John R. Townsend (vide.)", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Drake John", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Drake Jacob", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Draper Simeon, Jr.", "estimated_wealth": "100000", "biographical_note": "He and his 8 or 9 brothers, remarkable the most of them for their fine personal appearance and intelligence and business habits, inherited from their worthy father, of New England, came to New York to seek their fortune upon this wide field of mercantile enterprise, and well have they for the most past succeeded. Simeon Jr. but for his unfortunate connection with party politics would doubtless still possess the fortune, and wealth which his active industry acquired, but at all events may count with certainty on that which we have given above as the probable portion on the lowest estimate of what will ac- crue to his wife from her father, the wealthy John Hag- gerty, Esq.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Drew Daniel", "estimated_wealth": "200000", "biographical_note": "Of the firm of Drew, Robinson & Co., brokers, and owner of the steamboat Rochester, a shrewd, money making man.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Dubois Cornelius", "estimated_wealth": "400000", "biographical_note": "One of our oldest, wealthiest, and most respected of merchants of French extract of great distinction.", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Dykers John H.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "D", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Edgar H. L.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "E", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Edgar Wm.", "estimated_wealth": "100000", "biographical_note": "Son of William, who began as a poor Irish emigrant, and thus gradatim and seriatim worked his way up the ladder to become the holder of a great estate. Even the \"Le Roy\" blood did not think an alliance with self- made Mr. Edgar disparaging-nor was it.", "alphabetical_letter": "E", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Eggleson Thomas", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "E", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Emanuel Mich'l", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "E", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Embury Peter", "estimated_wealth": "100000", "biographical_note": "A worthy grocer and old \"cit,\" father-in-law of the lovely poetess and writer, Mrs. E.", "alphabetical_letter": "E", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Evertsen (Estate of) Nicholas", "estimated_wealth": "150000", "biographical_note": "Of the very oldest, purest Dutch blood, was this truly eminent counsellor and most estimable gentleman. The progenitor of the family was Commodore Evertsen, the \"Admirai Van Tromp\" of those days in the bloodless exp-di ions of cock boats which the Dutch Governor sent cruising down the Long Islard coast to keep those Eng- lisa \"vassals\" in due subjection.", "alphabetical_letter": "E", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Faile Edw. G.", "estimated_wealth": "200000", "biographical_note": "Rich grocers, he and his brother, and muagre thenam would be the last to fail in whatever obligationsbecom them as honorable men.", "alphabetical_letter": "F", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/10", "image": "0010_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0010.jpg"}, {"name": "Fanshaw D.", "estimated_wealth": "150000", "biographical_note": "Another of our worthy types-self-made.", "alphabetical_letter": "F", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Ferris Chas. G.", "estimated_wealth": "200000", "biographical_note": "Our worthy Congressman-inherited a large fortune from his father, who made it while in a public situation, as inspector of flour, we believe. A very ancient family of this province.", "alphabetical_letter": "F", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Field H. W.", "estimated_wealth": "200000", "biographical_note": "Of an ancient New England family of great respectability were the Fields. \"Mr. Robert Field\" being one of the earliest settlers at Boston.", "alphabetical_letter": "F", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Field Benjn H.", "estimated_wealth": "100000", "biographical_note": "Of an ancient New England family of great respectability were the Fields. \"Mr. Robert Field\" being one of the earliest settlers at Boston.", "alphabetical_letter": "F", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "(Field Heirs of Moses)", "estimated_wealth": "300000", "biographical_note": "Of an ancient New England family of great respectability were the Fields. \"Mr. Robert Field\" being one of the earliest settlers at Boston.", "alphabetical_letter": "F", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Fish Preserved", "estimated_wealth": "100000", "biographical_note": "Of an ancient family of England, who located over two centuries since, first at Saugus, near Boston, then at Sandwich, and finally at Newtown, Long Island. So the merry tale of Nantucket that a foundling on the beach rescued by a whale boat from a watery grave was thus named, falls to the ground.", "alphabetical_letter": "F", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Fitch Asa Jr.", "estimated_wealth": "500000", "biographical_note": "Of New England-long a merchant at Marseilles, and through many ups and downs of life, and now in the vale of years, has come back with a constitution enfee. bled, but bringing such wealth that he ranks as one of our richest and most recherche old bachelors. It is not every \"lame duck\"-a common phrase of his-that could come out so tall, and loom so large and lofty in haute societe, after passing through the severe ordeal Asa has submit- ted to. But paciencia! as the Spaniard says.", "alphabetical_letter": "F", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Foster Andrew", "estimated_wealth": "100000", "biographical_note": "Scotch. The other Fosters here are of an emigrant fa- mily from New England that early settled at Jamaica, L. I.", "alphabetical_letter": "F", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Foulk Joseph", "estimated_wealth": "300000", "biographical_note": "The Foulks are wealthy English gentlemen who have been for many years in the very first ranks of our high- minded honorable merchants.", "alphabetical_letter": "F", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Foulke P. Louis", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "F", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Fowler Theo.", "estimated_wealth": "200000", "biographical_note": "The father deceased about the close of the revolution- ary war, became suddenly wealthy. We believe he was an officer under Washington.", "alphabetical_letter": "F", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Fox George", "estimated_wealth": "150000", "biographical_note": "We cannot trace his lineage to Geo. Fox, the shoema- ker, founder of the Quakers.", "alphabetical_letter": "F", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Fox George T. Jr.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "F", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Fox Wm. W.", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "F", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Friedler Ernest", "estimated_wealth": "100000", "biographical_note": "A German merchant.", "alphabetical_letter": "F", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Furman Gabriel", "estimated_wealth": "200000", "biographical_note": "A very respectable and ancient English family, one of the earliest among those who colonized Long Island.- Formerly Superintendent of the Alms House. Judge Jno. T. Irving, deceased, (brother to Washington Irving) be- came enriched by marrage with a daughter of Gabriel Furman.", "alphabetical_letter": "F", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Furniss Wm. P.", "estimated_wealth": "600000", "biographical_note": "", "alphabetical_letter": "F", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Gallatin Albert", "estimated_wealth": "100000", "biographical_note": "Swiss. Formerly Secretary of the Treasury of the U. States.", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Gardiner Thos.", "estimated_wealth": "500000", "biographical_note": "", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Gardner John", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Gardiner David", "estimated_wealth": "150000", "biographical_note": "To the ancestors of this distinguished family belonged Gardiner's Island, Suffolk, Co., L. I. One was called \"Lord Gardner,\" by some of his poor tenantry", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Garner Thomas", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Garner Jas. G. (brother of the preceding)", "estimated_wealth": "200000", "biographical_note": "It is a grateful task to note in conspicuous terms, the fortunes of these two distinguished merchants, who have literally won laurels and golden opinions. Failing in 1832, they rose by great energy and industry to wealth, and in 1835 paid off every shilling of their obligations. with interest to boot. Of how few can this be said? To most people, therefore, who are now revelling on the ruined fortunes of the widow and the orphan, the remin- iscences of the past are harrowing and scorching, if their consciences are not seared.", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Gebhard F. (Estate of)", "estimated_wealth": "500000", "biographical_note": "An old German, now dead; his large estate the result of years of patient industry.", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Gelston (Estate of) David", "estimated_wealth": "200000", "biographical_note": "Old Mr. David Gelston, (deceased) was a child of for- tune in the matter of official emoluments, having held the collectorship of this port under sundry democratic admin- istrations, and thus, though beginning poor in life and of obscure family in Suffolk Co., made any amount of money, whereby his family are placed far out of the reach of want.", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Geraud William (French)", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Gibbs", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Gifford Arthur N.", "estimated_wealth": "100000", "biographical_note": "Mr. Gifford was educated and graduated as a physician, but not choosing as a gentleman to wade through the tortuous and muddy paths by which some of the members of an overpopulated and starved profession are compelled to get their bread, and being too high-minded to resort to low/arts and cunning to obtain distinction, made his debut in the broker line in Wall street, and has there operated to an extent to justify his most sanguine expectations.- He glories still in the beatitude of single blessedness.", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Gihon John (French)", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Gilbert Mrs. (widow of W. W. G.)", "estimated_wealth": "150000", "biographical_note": "W. W. Gilbert, deceased for many years one of the most eminent of cur fashionable retail dry good mer- chants in Broadway, and uncle of the present \"Garry G.\" the famous minstrel politician. \"Garry\" and William W. were the Stewarts of that day among the lady pur- chasers.", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Gilbert Joshua", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Gilley Mrs", "estimated_wealth": "150000", "biographical_note": "Her husband, deceased, by birth Scotch, acquired his fortune in the book ine, a the principal partner in one of the most cei bra ed stores in that business of with our ti y could then boast.", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Giraud Jacob P. (French)", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Giraud Joseph (French)", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Glover (Estate of) John J.", "estimated_wealth": "400000", "biographical_note": "Long a highly respected merchant and one of the earliest of the resident English dry good importers. His numerous daughters all save one or two are married and enjoy the patrimony of their father's honest earnings. One married Mr. Holley of Connecticut, another Alfred P. Edwards, Esq., a third the Rev. Mr. Eastburn, and a fourth the Hon. C. C. Cambreling.", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Goelet George", "estimated_wealth": "100000", "biographical_note": "Son of Peter P. G., deceased.", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Goelet Peter (Another son of do.)", "estimated_wealth": "300000", "biographical_note": "Peter P. and Robert Ratsey G., sons of an old and re- spectable merchant, and both married daughters of Thos. Buchanan, Scotch, merchant of this city, prior to the American revolution. Thos. Buchanan's father was Mayor of Glasgow, in Scotland.", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Gomez A. L. (in right of wife,)", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "Goodhue Jonathan", "estimated_wealth": "400000", "biographical_note": "Universally beloved for his good heartedness, which, however, is often imposed upon by artful dupes, particu- larly under the mask of religion. A first rate merchant most humane and charitable to the poor. His father was an honest blacksmith of Salem or Portland, down east, and the rumor is that there is in Mr. Goodhue a", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/11", "image": "0011_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0011.jpg"}, {"name": "", "estimated_wealth": "", "biographical_note": "touch of the aboriginal or Indian blood. His features, expression and complexion favor this impression.", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Goodwin (firm Goodwin, Fisher & Co.)", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Graham Bernard", "estimated_wealth": "150000", "biographical_note": "A self made man. Was an Irish porter and laborer to Peter Harmony, (see below) and from thence arose to be his partner.", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Greenwood (Estate of) John", "estimated_wealth": "150000", "biographical_note": "This it may be said was the father of New York Dentists. Of a highly respectable family in the Bay State, and cradled in the revolution his youthful ardor while but a boy impelled him into the ranks of Washington's army, and after the close of the war, in successful practice in this city as a dentist he rose to great renown, and was the dentist of his former great captain, (Washington) up to his death. He was a venerable man of great originality and shrewdness of mind on all subjects, a great reader and deep thinker, generous and chivalrous in disposition, of ready wit and full of the anecdote and lore of the past. In his profession his expert and adroit workmanship, bold ingenuity and resources under all difficulties, acquired him a reputation that left him without a competitor, and brought him large gains, which fortunately invested, accumulated to a great estate for his worthy children, two of whom, Isaac and Clark, though thus inheritors of wealth, felt an honorable pride in following their father's profession, and also arrived to great eminence.", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Greeley Augustus", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Griffin Francis", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Griffin George", "estimated_wealth": "250000", "biographical_note": "Literally a very tall and most accomplished lawyer, whose fame at our bar for near half a century is too well established and known to require comment. We believe he is of a New England family.", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Grinnell H.", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Grinnell M. H.", "estimated_wealth": "150000", "biographical_note": "The popular ex Congressman, born in New Bedford, enterprising and liberal; he realizes our beau ideal of a New York merchant.", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Griswold George", "estimated_wealth": "300000", "biographical_note": "One of the household of the \"Patres Conscripti,\" of Connecticut. There is no parvenuism here. He is now ranking in the line of India merchants in more senses than one.", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Griswold N. L. (Brother of Geo.)", "estimated_wealth": "400000", "biographical_note": "", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Grosvenor Jasper", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Grosvenor Seth", "estimated_wealth": "250000", "biographical_note": "Dry Good Merchant, of an old New England family, and brother of the once distinguished federal orator and Congressman, deceased. (Thomas P. G.) Seth is uncle of the widow of that late brilliant meteor in judicial acumen, S. A. Talcott, that set so prematurely in clouds and darkness.", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Green John C. (India merchant)", "estimated_wealth": "400000", "biographical_note": "Married the daughter of Geo. Griswold, (above)", "alphabetical_letter": "G", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Hadden David", "estimated_wealth": "200000", "biographical_note": "Scotch Dry Good Merchant, respectable.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Haggerty John", "estimated_wealth": "500000", "biographical_note": "(See Austin, David.) A foremost man among our merchants, and has acquired great wealth as an auctioneer.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Haight David L.", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Haight Richard K.", "estimated_wealth": "100000", "biographical_note": "Of an old New York family. He and brothers are sons of an eminent saddler. Richard, like the Muscovite Emperor, worked as a day laborer in France to acquire a certam mystery in trade touching prints for hat linings, and now reaps the monopoly obtained by his spirited undertakings, together with a fortune inherited. Madame H. is the fair authoress of the entertaining book of Travels to Egypt, &c, and is a fine sample of a pretty Long Island girl from old Suffolk.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Haines R. S.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Hale David", "estimated_wealth": "100000", "biographical_note": "This is the \"Vicar of Bray,\" editor of the Journal of Commerce, a yankee by birth, but a Jesuit at heart. and as true a disciple of Ignatius Loyola as though he had been educated at the Sorbonne. As an editor unsparing, vindictive, filled with sanctity and duplicity to the crown of his head--being all things to all meu, both in religion and politics, and hiring out his Tabernacle to whoever pays the best.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Hall J. Prescott", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Hall Valentine G.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Halstead Caleb O.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Halstead Wm. M.", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Hamilton J. C.", "estimated_wealth": "200000", "biographical_note": "Son of the renowned statesman Hamilton, and also his biographer. Married a daughter of the rich Dutch merchant Vandenheuvel, deceased, and owns thereby the American Hotel.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Hammersley Lewis C.", "estimated_wealth": "200000", "biographical_note": "Of an old and respectable New York family. His father, Thomas, acquired a large fortune in the dry good line.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "Harper Brothers", "estimated_wealth": "200000", "biographical_note": "These are the four remarkable men, who of a highly respectable English family that anciently settled upon Long Island, have risen by their enterprise and industry from journeymen printers to become the most celebrated publishers in America, and among the names that will go down to posterity with the Galignanis and Murrays, and Constables of Europe. The Harpers have done more practically for the encouragement not only of domestic authors but for the diffusion of the literature and science of other countries than all the universities, colleges, academies and schools of the Union put together. Nor have their profits, though large, been proportionate to their truly patriotic and noble exertions. New York may be proud of the birth-right of these men, and that she has produced these great operators, these high-priests of Minerva, who have erected here a holy temple, as it were, in the midst of money-changers and shopkeepers, to keep alive the undying fires of intellect, to guard and trim the lamp where genius may kindle its illuminating torch and learning diffuse abroad its milder beams. Without them or some such as shall follow in their footsteps, darkness would come over the land. But for these humble printers who have appreciated the spirit of the times, and saw and felt the necessity of acting in keeping with the accelerated movement of thought and of industry which steam-power has given to this age, our people in the dissemination of that most useful and potent of all influences, mental power and the knowledge which it produces, would have been a century behind the rapid and advanced progress they have made. It was to compete with them that the free press of our country was stimulated to endeavors and prodigious results, which have astonished the world. The lightning-like rapidity with which the choicest coinings of the brain in foreign lands, are almost immediately made the common properperty and universally circulating cheap commodity of our own people, threaten in time to make the book-business, if not periodical literature also, a dead letter and destructivé pursuit to those who embark in it. For it would seem that every production that hereafter emanates from the closet of the author must seek this every-day channel of the penny press, to reach the public market. To the universal taste for reading whatever is worthy to be perused, and which the Harper cheap press gave the first great impulse to, are we then to ascribe indirectly the immense diffusion which is now immediately given by the penny pressin our country, to whatever reaches us from abroad, fresh almost and at the moment that it is wrought from the mind of its author. Once thus gratified with what, from the extreme cheapness of penny publications may be deemed the almost gartuitous offerings to our countrymen, of the cream and marrow of foreign literature, it is not to be imagined after the practical workings of this operation as exemplified recently in the national reception of Boz, and the familiarity of every one that", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/12", "image": "0012_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0012.jpg"}, {"name": "", "estimated_wealth": "", "biographical_note": "Can read, with all the writings of such shining luminaries as he and Bulwer, and others, that our people will ever surrender so dear a privilege, however wrong it may be fact, when the subject of international copy-right is fairly Canvassed. The Harpers, be it added to this peroration, are exemplars also in private life and as moral and religious men, being all of them, we believe, members of the Methodist Church and of many Temperance and charitable societies. So much for a brotherhood of New York born printers, to show what mechanic industry can accomplish.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Harmon Philip", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Harmony Peter", "estimated_wealth": "500000", "biographical_note": "A Spanish cabin boy was his beginning, and he after wards became familiar with the West India seas. We are in the dark as to his career afterwards, except that he is now one of our most opulent merchants.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Hart Eli", "estimated_wealth": "100000", "biographical_note": "The Flour Merchant, whose store was sacked by rioters.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Hatch George W.", "estimated_wealth": "100000", "biographical_note": "Rawdon, Wright and Hatch are the celebrated bank engravers, and another sample of intelligent, spirited mechanics, making for themselves a name and a fortune incomparably more to be prized than the wealth which has Leen acquired too often by mere mercantile gambling. There is substance, and truth, and reality-something tangible, and definitive, and susceptible of ocular demonstration and utility in the fruits of mechanic labors, but what visible means of livelihood, and what direct and practicle utility do we see in many other professions, to wit: swindling stock operations, but which are yet deemed more reputable than the walks of mechanic life. The time is gone by, however, when dreaming speculators and fancy operators can any longer sneer superciliously at the \"brawny arms\" and \"russet palms\" of the honest laborer. Thus much has been done by breaking up a false system of credit, and by consequence, breaking up the nests of lounging, idle upstarts, that like mushrooms on a dung-hill, sprouted up out of the corrupt masses of rag-paper and spurious capital. May Rawdon and Hateh never lend their burin and mezzotinto to any paper that does not command yellow mint drops instanter at the counter on the very face of it. Mr. Hatch is half brother of Ex-Governor Throop, and to judge by his early prosperous career cannot be said to have counted his chickens before they were hatched. Mr. Rawdon is a branch of the Irish family of Rawdon, Earl of Moira, who was so distinguished as a British partizan or cavalry officer during the revolutionary war.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Havermeyer Wm. F.", "estimated_wealth": "100000", "biographical_note": "Old German emigrant family.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Haxtun A. B.", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Heard James", "estimated_wealth": "300000", "biographical_note": "Of an ancient family of New Jersey are he and his brother Nicholas T. H.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Heard Nicholas T.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Hearn Geo. A.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Hedges Catharine", "estimated_wealth": "200000", "biographical_note": "A tall, slender yankee, straight as a poplar tree, came hither to this Babel to seek his fortune. It was for a long time a desperate struggle between him and the grim-visaged fiend, poverty; nor did he better his condition by the active part he took in the political turmoils of the Bucktails and Clintonians, till meeting one day with a venerable maiden spinster, who was luxuriaving on the fat estates left her from her Rugers' relatives, he stepped into her good graces and fortune, and now dashes by \"Crosby Castle\" as proudly as any of the beneficiaries of that ancient property in the eastern suburbs of our city.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Hendricks", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Hendricks", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Hendricks", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Hendricks Uriah", "estimated_wealth": "300000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Hendricks Widow", "estimated_wealth": "300000", "biographical_note": "Rich Jews.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Heyer Cornelius", "estimated_wealth": "100000", "biographical_note": "Verv old New Yorkers.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Hicks Henry W.", "estimated_wealth": "250000", "biographical_note": "Robert Hicks, Plymouth 1621, became a rich merchant. This was the progenitor of the family in Rhode Island, Long Island and New York. They have always \"cottoned\" to merchandise and been distinguished in the commercial annals of this country as shipping merchants at Plymouth, Newport and New York for 200 years past.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Hicks Silas", "estimated_wealth": "150000", "biographical_note": "Rose to fortune with the late Mayor, C. W. Lawrence, in the auction business, and retired early to the precincts of Flushing, to enjoy his \"otium cum dignitate.\" Of the family of Hicks, of Plymouth, (Mass.)", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Hicks John G.", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Hicks John H.", "estimated_wealth": "250000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Hicks Samuel", "estimated_wealth": "250000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Hicks Mrs.", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Hoffman L. M. (A German family)", "estimated_wealth": "100000", "biographical_note": "His brother is As. V. Chancellor. The first Hoffman here was Anthony, a venerable and highly esteemed merchant, grandfather of L. M. H. Few families, for so few a number of persons as compose it have cut a 'larger swath' or \"bigger figure\" in the way of posts of preferment. Talent and also public services rendered, martial gallantry, poetry, judicial acumen, oratory, all have had their lustre mingled with this name. Beekman Verplanck Hoffman, a post captain; Judge Josiah O. Hoffman, and his sons Ogden and Charles, &c., all foremost men In our community.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Holbrook Ephraim", "estimated_wealth": "200000", "biographical_note": "Connecticut, and rich by dry goods. &c.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Holmes Eldad", "estimated_wealth": "150000", "biographical_note": "Old New Yorker, or very long here as a respectable merchant, of the old democratic school. Silas Holmes is a horse of a different color, and celebrated as the most unlucky dog in running vessels on reefs and rocks that ever commanded a ship.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Holmes Silas", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Hone Philip", "estimated_wealth": "100000", "biographical_note": "A worthy man, and with his brother John, famous auctioneers in their day and made great gains by it. They were sons of a German, a respectable baker by profession, whose hard earnings the boys turned to good account, so that Philip became for one year Mayor of the city, and a gay, jovial, capital Mayor he was, and a most enterprising, liberal citizen has he always been. Honesdale will tell a tale, to the future, how honorably his name associates with the Delaware & Hudson Canal. [See Anthon.]", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "Hosack (Estate of David)", "estimated_wealth": "100000", "biographical_note": "Bút few names will shine long in the annals of medical history brighter than this. Whatever may be said of his foibles as a man, his superior practical talent, sagacity, boldness and decision as a bedside practitioner, and the invaluable lessons in medicine he has left will live forever while truth and common sense prevail. He was a man reckless and extravagant in money matters, and as he often said, his embarrassments were perpetually bringing him to the verge of bankruptcy. In latter years, happily or unhappily for him, a sudden tide of wealth poured profusely into his lap by his marriage with the rich widow of Henry A. Coster, (see Coster,) by which he realized the immediate possession of over half a million of personal property alone, that nearly turned and intoxicated his excitable brain and impetuous temperament. Converting that and portions of the large real estate income of Mrs. Coster into new purchases in his own name, he hoped to gvie a solid and permanent basis to the opulence with which he naturally and modestly designed to enrich his own chi'dren by a former wife. At Hyde Park he laid out his lawns and grounds with a luxuriousness that surpassed the English gentry, and spared no expense, transplanting often full grown trees from the sides of mountains to form readymade forest scenery upon his own plantation; together with this property be made large investments in insurance stocks, but in his avidity to become", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/13", "image": "0013_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0013.jpg"}, {"name": "", "estimated_wealth": "", "biographical_note": "Cræsus it seemed as if an evil star would indignantly rob him of all. The dreadful conflagration that laid 600 houses in ashes in one night, swallowed up nearly every insurance company in the city. The shock caused an apoplexy, and he perished; and since his death the terri- ble depression in real estate has in fine left his own chil- dren with but a few thousands-barely enough to support them, and even much of that has been melted away. So much for a self made man, whose father was a humble redemptioner that worked his apprenticeship out in the Roosevelt family, and became rich, and richly endowed his favorite son David, and then set him up in practice by purchasing out Dr. Samuel Bard. But for David's mar- riage with a widow of extreme wealth, he would have been now and for years hence at the head of his profes- sion, and of eminent usefulness-all of which and his life were suddenly arrested by the potent influence of gold.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Howard William W.", "estimated_wealth": "600000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Howell Mrs. Wm.", "estimated_wealth": "100000", "biographical_note": "Was a daughter of the rich old Blackwell, an old New York family, and owner of Blackwell's Island at Hell Gate. Her husband a Howell or Hoel, old Long Island Suffolk name, and his niece and heir is Julia Dekay, of a very ancient New York family, and wife of Major Jack Downing No. 2, i. e. C. A. Davis, vide.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Howland G. G.", "estimated_wealth": "350000", "biographical_note": "One of the special partners to the tune of $150,000 in the House of Howland & Aspinwall. He and his brother Sam obtained some notoriety by building vessels for the Greeks in their struggle for independence.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Howland Jno. H.", "estimated_wealth": "300000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Howland S. S.", "estimated_wealth": "250000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Howland Wm. Howard", "estimated_wealth": "500000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Hoyt Gould", "estimated_wealth": "200000", "biographical_note": "Of a respectable Connecticut family, and long known as one of our oldest merchants, under the distinguished firm of Hoyt & Tom. A son of this retired \"Rentier\" married a daughter of President Duer, of Columbia Col- lege.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Hubbard Ν. Τ.", "estimated_wealth": "100000", "biographical_note": "Ancient and honored name of New England.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Hudson Joseph", "estimated_wealth": "150000", "biographical_note": "Respectable English importer for some years here, and has doubled his fortune by marrying a daughter of the rich Henry Laverty. He has no reason to regret having adopted for his home the capital which graces the noble river that bears his name in honor of its discoverer, and peradventure his ancestor, \"Hendrick Hudson.\"", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Hunt Jonathan", "estimated_wealth": "1000000", "biographical_note": "Reputed a millionaire and a protege of our parvenu cliques, who are by no means reluctant to give him the hand of fellowship, because Jonathan, like them, came from nothing. But it is a mystery how a person yet un- der forty, and who a very few years since was in the line of small groceries at Troy became suddenly at Mobile, as if by the magic of open sessame! into such surprising wealth as is imputed to him. The good old dames who hunt up fortunes for matches to their scarecrow daugh- ters, are as mad after our worthy apple merchant since he became reputed so rich as they have been for some time back to get hold of Chinese Whetmore. (See Whet- more.)", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Hunt Thomas", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Hyslop Robert", "estimated_wealth": "100000", "biographical_note": "An old New York family.", "alphabetical_letter": "H", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Ireland Andrew L.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "I", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Ireland Wm. H.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "I", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Ireland George", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "I", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Irving Mrs. Jno. T. (husband's estate,)", "estimated_wealth": "300000", "biographical_note": "Judge John T., deceased, and Washington Irving, so renowned, and William, Ebenezer, Peter, &c., are the sons of a respectable shoemaker (deceased) in William street, in this bleesed city of New York.", "alphabetical_letter": "I", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Jackson Hamilton", "estimated_wealth": "200000", "biographical_note": "Inherits the large estate of Jno. Jackson, one of two brothers (John and Samuel) who early located at Brook- lyn, and became rich by the rise of real property. These two brothers Jackson were lineal descendants of Colonel Jno. Jackson, High Sheriff of Queen's County, Judge, &c. eldest son and heir of Robert and Agnes Jackson, among the first English settlers of Hempstead, L. I.-about 1654.", "alphabetical_letter": "J", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Jaffrey Robert", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "J", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "James Henry", "estimated_wealth": "100000", "biographical_note": "Son of the rich Wm. James, of Albany, (deceased) and a gentleman celebrated, we believe, for his extensive scholarship and literary attainments.", "alphabetical_letter": "J", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Janeway (Estate)", "estimated_wealth": "400000", "biographical_note": "The Janeway property comes chiefly by intermarriage through that most ancient and wealthy and respectable Dutch family Van Zandt, descendants maternally of Lord Peter Prauw.", "alphabetical_letter": "J", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Janeway Jacob I.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "J", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Jay Wm.", "estimated_wealth": "150000", "biographical_note": "Son of Gov. John Jay. See Jay.", "alphabetical_letter": "J", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Jay Peter A.", "estimated_wealth": "150000", "biographical_note": "The first Jay on the Records appears to have been John Jay (probably a Hougenot), a quaker in the suite of Geo. Fox, in his journey through America 1671-2, and who meeting with a dislocation of his neck, was marvellously cured by the aforesaid George, somewhere in New Jer- sey, and thus by this miracle lived with his head on to be- come the head of an illustrious house.", "alphabetical_letter": "J", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Jennings Chester", "estimated_wealth": "100000", "biographical_note": "Came a poor boy, a stage driver, from New England, and entering the door of the City Hotel with whip in hand, asked for work, was hired as a waiter, and by good conduct rose successively to the rank of head waiter, and afterwards, with his equally enterprising and famous fel- low-waiter, Willard, to copartner in that ancient establish- ment, where his fortune was thus honestly and honorably acquired-but badly singed by dipping in Biddle banking.", "alphabetical_letter": "J", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Jewitt John", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "J", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Johnson William Samuel", "estimated_wealth": "200000", "biographical_note": "A highly respectable lawyer, prominent whig politi- cian, and late Alderman, and grand son of the former President Johnson, of Columbia College, a Connecticut family, and Wm. S. gets the mass of his fortune by mar riage with the daughter \"Cardinal Woolsey,\" as this eminent merchant used facetiously to be called \" 011 change.\" The \"Cardinal\" was an extensive operator in Connecticut banks, and became very rich.", "alphabetical_letter": "J", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Johnston John", "estimated_wealth": "500000", "biographical_note": "", "alphabetical_letter": "J", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Jones Edwd. R.", "estimated_wealth": "300000", "biographical_note": "His father was Joshua, an eminent cooper, and thus ac- quired a large fortune, in connexion with Jas. Lennox (brother of Robert,) in the same business, immediately a- fter the revolution.", "alphabetical_letter": "J", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Jones Isaac", "estimated_wealth": "250000", "biographical_note": "", "alphabetical_letter": "J", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Jones James J.", "estimated_wealth": "300000", "biographical_note": "", "alphabetical_letter": "J", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Jones James L.", "estimated_wealth": "300000", "biographical_note": "", "alphabetical_letter": "J", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Jones John Q. (deceased)", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "J", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Jones Walter R.", "estimated_wealth": "250000", "biographical_note": "", "alphabetical_letter": "J", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "Judd Samuel", "estimated_wealth": "200000", "biographical_note": "From \"down east,\" and educated in the oil line, pro- bably among Cape Codders and Nantucketers, and thus having become familiar with blubber, sat up here a very small shop in the upper part of the city, and in which,", "alphabetical_letter": "J", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/14", "image": "0014_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0014.jpg"}, {"name": "", "estimated_wealth": "", "biographical_note": "though not big enough to swing a cat in, he sold lamp wicks till he could build his own palaces and ships, and drive his own splendid carriage. The dazzling light of the purest sperm that makes a fairy land of his saloons and greenhouses on some gala right, must shine beautifully and soothingly on the vision of one who can truly say he is indebted to none but his own genius and hard toil for the gold which whale oil has brought to his house.", "alphabetical_letter": "J", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Kane Oliver", "estimated_wealth": "200000", "biographical_note": "For many years a distinguished family in New York that has seen both much prosperity as well as the dark side of life's picture. One of the dashing young men of this family a few years since speculated largely in stocks and blew out his brains. But few retain the wealth they once had; most, however, are well intermarried with respectable families, being themselves a race decidedly of strong and prominent traits of intellect.", "alphabetical_letter": "K", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Keese John D.", "estimated_wealth": "200000", "biographical_note": "Of the old established firm of Lawrence & Keese, who have during the last 50 yeaas sold drugs enough to supply half the human race. Mr. K. is a son of Major Keese, (deceased) of the continental line of the revolution, afterwards a distinguished lawyer in this city.", "alphabetical_letter": "K", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Kearney J. D. Jr (Estate of J. Watts)", "estimated_wealth": "300000", "biographical_note": "Young grandson of Jno. Watts, deceased, and which is the source of his wealth. The Watts family are cotemporary with the most distinguished names of our early English gentry, John Watts being grandson of Robert and Mary Watts-and this Mary the daughter of the Speaker of the Provincial Assembly, Wm. Nicoll, the patentee of the Islip Manor, L. I. Jno. Watts' sister was mother of the present Mr. Kennedy, Earl of Cassilis.", "alphabetical_letter": "K", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Kelly William", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "K", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Kelly Robert", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "K", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Kennedy David", "estimated_wealth": "200000", "biographical_note": "A highly respectable Scotch merchant, who obtained some addition to his fortune through his wife, the daughter of Robert Lennox.", "alphabetical_letter": "K", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Kent James", "estimated_wealth": "100000", "biographical_note": "One of the most marked mea of the times, the profound jurist, and long the celebrated Chancellor of this State, and whose opinions and commentaries, nay, mere words, on all legal matters are themselves like pure gold and law for all who wish to know what law is. What a gratifying picture of a well-spent life is that of this universally beloved man in a green old age, enjoying the respect of friends, the delights of domestic society, and all the glorious vigor and sparkling brightness of that manhood which once adorned and could still adorn if not purify that bench, which would more deplore his loss but for the elevation to a most important judicial station of that able son for whose shoulders it would seem the father designed his own spotless mantle.", "alphabetical_letter": "K", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Kermit Robert", "estimated_wealth": "100000", "biographical_note": "Of a very old and most respectable New York family.", "alphabetical_letter": "K", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Kernochan Joseph", "estimated_wealth": "400000", "biographical_note": "Of a poor Irish family, who were employed as colliers, teamsters, &c., at some of the large iron works in the Highland Mountains, on the west side of the Hudson. Joseph went to the West Indies, and came back rich.", "alphabetical_letter": "K", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Kerrigan James", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "K", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Ketchum Morris", "estimated_wealth": "100000", "biographical_note": "Brother, we believe, of Hiram the lawyer, a New Yorker.", "alphabetical_letter": "K", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Kettletas Eugene", "estimated_wealth": "200000", "biographical_note": "Of a very ancient New York family. The present worthy buffo tragedian, James H., (now since the death of his cousin) Baron or Lord Hackett, of Hackettstown, is maternally of the Kettletas line.", "alphabetical_letter": "K", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "King James G.", "estimated_wealth": "100000", "biographical_note": "Son of Rufus K. Rufus K. by his powerful mind rose great eminence in the councils of the nation. His parts were of humble origin, but few fathers have left sons whose ambition and towering pride in their \"cherished parent,\" have together conspired to give so fictitious and forced an elevation and consequence to a family as this one has for years enjoyed. Yet, after all, their importance resolves itself in the isolated fact of the fortunate position which their father occupied, and which was not so peculiarly distinguished as to merit the laudation and glorification which by industrious and indefatigable trumpeting have been lavished on this individual, otherwise extremely obnoxious to the population at large by his aristocratic pretensions.", "alphabetical_letter": "K", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Kingsland R.", "estimated_wealth": "200000", "biographical_note": "One of the oldest and richest firms in the hardware line, and a man of great respectability and high standing in this community, a modest gentleman that has calmly pursned \"the even tenor of his way\" without show or parade, and thus silently passed down the stream of time, every where beloved and honored. Such families, how unlike are they to the fluttering, buzzing things of fashion, whose gilded wings collapse with the first shower that dims their sunshine, and \"then are heard no more.\"", "alphabetical_letter": "K", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Kingsland Daniel C.", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "K", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Kissam Richard (Estate of)", "estimated_wealth": "200000", "biographical_note": "An estate honestly, nobly acquired in the surgical profession of which he stood undoubtedly at the head in his day. But few keener men in wit or with the knife could be found any where. His forte was lithotomy, in which his cures were truly wonderful. In after life he married and soon after died, leaving a large family of small children, to whom we believe his property was by will bequeathed.", "alphabetical_letter": "K", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Knapp Shepard", "estimated_wealth": "150000", "biographical_note": "From down East, and self made.", "alphabetical_letter": "K", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Kneeland Charles", "estimated_wealth": "100000", "biographical_note": "From down East, and self made.", "alphabetical_letter": "K", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Knox Alexander", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "K", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Laffan E.", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Langdon Mr.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/ite
