m/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Lasala John B.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Laurie George", "estimated_wealth": "100000", "biographical_note": "George and John L. for 30 years merchants, and bachelors, (originally from Scotland) and of the very first character and prime brand as to respectability. The universal consideration they enjoy in this community must be a comfort to them when they look back upon the bright and honorable career they have passed through, though neither, we hope, is yet too advanced into the yellow leaf to forswear and become a Benedict, which they both know they could easily do, and have only to say the word in these hard times, and Hymen stands ready to light his altar torch, and cupid to let fly from his quiver one of his most barbed arrows, that not even the tough texture of a bachelor's heart could resist.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Laverty Henry", "estimated_wealth": "150000", "biographical_note": "The keenest, smoothest chap for small change in the way of talk and knowing every body, and every thing that can be found for the last 40 years. He holds on well and is as young and gay as when a boy he dealt out tape and bobbinet behind the counter, little dreaming then he should one day figure so large in Broadway, or that his saloons would be hung round with the productions of his own accomplished daughter's pencil. Some have thought her the heroine of Halleck's beautiful poem of \"Fanny.\"", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Lawrence John B.", "estimated_wealth": "250000", "biographical_note": "A model-man of the old school gentlemen merchants is he. Of a very ancient house, of an old New York family, and though inheriting a large estate from his father, he pursued business with the ardor of youth, and doubled and trebled his property in the drug line, as the head of that celebrated firm, Lawrence, Keese & Co. But few such as he and the late Gen. Matthew Glarkson,", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/15", "image": "0015_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0015.jpg"}, {"name": "Lawrence C. W.", "estimated_wealth": "100000", "biographical_note": "Of highly respectable quaker descent on all sides-rose to fortune in the Auctioneer house of Hicks, Lawrence & Co. Cornelius has been Mayor of the city.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Lawrence D. L.", "estimated_wealth": "300000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Lawrence Henry H.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Lawrence Isaac (Estate of)", "estimated_wealth": "100000", "biographical_note": "The millionaire once so esteemed, has left, it is said, not a sous! How much has been eaten up in bad lot speculations?", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Lawrence Joseph", "estimated_wealth": "200000", "biographical_note": "Brother of Cornelius, and married a rich heiress, daughter of Ald. Thos. S. Townsend, of the Long Is- I and Townsends.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Lawrence R. M.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Lawrance Abrabam", "estimated_wealth": "250000", "biographical_note": "Descended, with R. M. L. and most of the name in this city, including Cornelius, from three brothers from England, John, William and Thomas.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Leary James (the fashionable Hatter)", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Leavitt David", "estimated_wealth": "200000", "biographical_note": "From down East, and a merchant-an ultra tea total- ler, in which his zeal has made him conspicuous, though it has not been turned, perhaps, to a mercenary account as ingeniousiy as Arthur Tappan has trafficked with his incendiary abolition plots.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Lee David", "estimated_wealth": "500000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Leggett Samuel", "estimated_wealth": "300000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Leggett Thomas", "estimated_wealth": "800000", "biographical_note": "The Leggetts are an old New York family, but chief- ly known as a very money-getting race. The one who was President of a certain rotten banking institution stands as to reputation, in a very equivocal light before the community.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Leggett William", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Leggett William F.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Lenox James", "estimated_wealth": "2500000", "biographical_note": "Son of Robert, deceased, who was the British commis- sary to that charnel house to Americans, the Jersey pri- son ship, and thus ingloriously amassed a portion, at least, of his wealth. Robert was brother of James. (See Jones above.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "LeRoy Jacob R.", "estimated_wealth": "300000", "biographical_note": "Of an ancient and highly distinguished Hougenot fami- ly, we believe. Daniel Webster, the Sec. of State, mar- ried for his last and present wife a Miss Le Roy. Jacob Le Roy inherits a large estate from his father-in-law, Thos. Otis, who as Otis & Swan, in the war made a great deal of money.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Leupp Charles", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Lewis Morgan", "estimated_wealth": "700000", "biographical_note": "Formerly Gov. of the State, Major General of the Ar- my, &c. Acquired his estate by marrying a Livingston of wealth. Gen. Lewis is of an ancient Welsh family.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Little Edward", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Little Jacob", "estimated_wealth": "400000", "biographical_note": "An old and worthy citizen, and one the shrewdest brokers in Wall st.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Livingston Maturine", "estimated_wealth": "100000", "biographical_note": "Though of the family of Livingston, which for a family so prolific and numerous as theirs is has been one of the most wealthy in the State, but little in the subdivision of multiplying generations fell to the share of Maturine, who marrying his cousin, daughter of Gen. Morgan Lewis, above, has however acquired large opulence in perspec- tive. The Livingstons began in this state about 150 years ince in the person of a Scotch clergyman, who on a fa- mous old white horse made his itinerations through the valley of the Mohawk tell with effect. From him sprang an intelligent, enterprising race, who in the next genera tion secured large landed estates, since manorial by their extent on both sides the Hudson River. Martin Van Bu- ren commenced his career as a village lawyer at Kinder- hook by undertaking to invalidate the Livingston titles, but their numbers and wealth were too much for him. Their names loom largely on our records; and after the Rensselaers and the Dutch and English noblesse, they rank among the most distinguished families in the State.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Lord Daniel", "estimated_wealth": "100000", "biographical_note": "A most profound lawyer, it is said, and none the worse for his filial attention to and affection for, his venerable parent, \"Doctor Lord.\" If one may rise to a practice of $20.000 per annum on the quirks and quibbles of legal technicalities, why may not another upon the mummery and mystifications of patent prescriptions in the healing art.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Lord Rufus L.", "estimated_wealth": "500000", "biographical_note": "A demi millionaire and a bachelor. His large property is composed of a number of valuable stores in the burnt district.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Lorrillard Jacob", "estimated_wealth": "1000000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Lorrillard Jacob Jr.", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Lorrillard Peter", "estimated_wealth": "2500000", "biographical_note": "The Lorillards are a Hougenot family, we believe, and of course of respectable origin, as all who fled hither for the glorious object of religious liberty, undoubtedly were. The brothers Jacob, Peter and George, the first as a lea- ther merchant, the other two as tobacconists, are famous in our city, especially the two last, for the prodigious wealth they have acquired by those callings. They en- tered early into large purchases of real estate; in the city, when there was no such thing as moonshine lots and Munchausen speculators.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Lorrillard Peter Jr.", "estimated_wealth": "500000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Lorrillard Widow", "estimated_wealth": "1000000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Loubat Alphonse", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Lovett James", "estimated_wealth": "200000", "biographical_note": "A retired sea captain and afterwards a shipping mer- chant, originally from Rhode Island, and of the real grit that comes of late as of yore, from that little chivalrous spot that gave birth to a Perry and a Greene.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Lovett George", "estimated_wealth": "300000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Low (Estate of) Nicholas", "estimated_wealth": "1000000", "biographical_note": "Of old respectability. and of the highest standing as a merchant, a halfa century gone, and as the proprietor of Sans Souci hotel at Balston Spa, in her palmy days, madę a princely fortune, which, but for the \"moving of the waters\" to Saratoga would have been doubled. The great American pedestrian, Colonel Nicholas, L., who won the recent wonderful wager, we believe, of 1000 miles in 1000 hours, spite of the sneers of his pretended backers, at the Union Club, is a worthy son of Nicholas Low. Mr. Chas. A. King married a daughter, and thereby inherited a large fortune.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Low Albert", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Low Daniel", "estimated_wealth": "150000", "biographical_note": "Another enterprising, driving, smooth-faced, pleasant son of New England, who resided a long time, as a mer- chant, in Paris, and surmounting every blasting sirocco in trade, came out rich, and spread largely into real estate.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Ludlow Thos. W.", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Ludlow (Estate)", "estimated_wealth": "300000", "biographical_note": "For a century and more one of the most distinguished and wealthy of New York families-now dwindled in numbers and fortune, but by marriage engrafted on va- rious other excellent families.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "Luff (Estate of) John", "estimated_wealth": "200000", "biographical_note": "A most capital man was this respectable German, and in the excellent quality of his bread and muffin. Jonas Humbert himself, aided by his electrical machine, was no circumstance to him. Old Mr. Luff had a pleasant word for every one as he rattled around from door to door in The and men of that high stamp and tone are now left. halls of our public charities tell of their benevolent deeds and the hours they have stolen from busy life to de- vote to their duties to the poor and suffering, to relieve the widow and the orphan and to wipe the tear of sorrow from misery's pallid cheek.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/16", "image": "0016_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0016.jpg"}, {"name": "", "estimated_wealth": "", "biographical_note": "his long light baker's cart, which it seems to us is now become of the things that only once were, and are found no more among our modern landaus and Berlins. With a becoming pride his children revert back with pleasure to the honest means by which their revered parent made, by his own hands, so large an estate.", "alphabetical_letter": "L", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "McBride James", "estimated_wealth": "500000", "biographical_note": "An Irish gentleman, who by a steady, upright, straightforward course of trade in the dry goods line, consolidating by his unblemished and pure life troops of fast friends around him, has amassed a vast property.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "McCall James", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "McCarty Thos. S.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "McCarty Peter", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "McCoskry Robert", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "McBrair James", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "McFarlane (Estate of) Henry", "estimated_wealth": "100000", "biographical_note": "A poor boy, who rose first to a clerk, then to be partner in the old house of Blackwell, iron merchants.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "McKie Thomas", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "McLean Hugh, M.D.", "estimated_wealth": "100000", "biographical_note": "A worthy \"medico,\" and now one of the fathers of the profession; a gay Lothario of an old bachelor is he, and a \"virtuoso\" in music and the fine arts; yet strange to say has not, as many have, thereby lost caste among the faculty, but always has had a great run of practice. Much of this good luck is traceable to the fact that his worthy mother, Mrs. Glass, was the most popular midwife among all the gentry of New York in revolutionary days, as her advertisement in Rivington's old Tory Gazette, while the \"Britishers\" were here, clearly shows.- She could do much among the petticoats to forward her son's prospects.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Macoun Wm. T.", "estimated_wealth": "100000", "biographical_note": "Vice Chancellor, and from the rank of a young attorney who came from the country to practice law, and try his fortune here, has risen, step by step, by his own merits, into the good opinion of the profession and community till honored with one of the highest dignities of the State.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Macy Josiah", "estimated_wealth": "100000", "biographical_note": "From the Cape Cod region.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Magee James", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Maitland R.", "estimated_wealth": "150000", "biographical_note": "Scotch, and some of his wealth comes through his wife, daughter of Robt. Lennox. See Lennox above.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Manice D. F.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "March Charles", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Marks Mrs. (?)", "estimated_wealth": "200000", "biographical_note": "The husband of Mrs. Marks was a rich Jew from the South. She is we believe of the ancient Dutch family of Beekmam (vide) of this city. Her son is a gay youth and drives the neatest turn-outs of any of our beau monde.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Marsh Charles", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Marsh Stewart C.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Marshall Benjamin", "estimated_wealth": "250000", "biographical_note": "One of the earliest who boldly enterprised American manufacturing establishments, and by them has managed, strange to say, to obtain large profits and wealth.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Marshall Joseph", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Martin", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Mason (Estate of) John", "estimated_wealth": "800000", "biographical_note": "Another practical exemplification of the rich rewards of mechanic industry. John was a first rate tailor in his day, and from cutting cloth proceeded to the rank of \"Merchant Tailor and Draper,\" and by vending piece goods, and turning over and over again his profits, and vesting in real estate when cheap, left near a million- and to his credit gave his family an excellent education; one daughter marrying a Jones, son of a cooper by trade, (brother of Edward R. J. above), and therefore keeping properly to her own grade, and now at the very tip top pinnacle of that peculiar class of dashing, fashionable people. A son of Jno. Mason married the charming young actress, Miss Wheatley, of the Park Theatre, talented daughter of her famous, talented mother, Mrs. W., who is still the \"Mademoiselle Mars\" of that old establishment. The Mason family are one of those exсерtions to the common rule of parvenues in our city, that they have the good sense never to decry mechanics and tradespeople from whom they sprang, but rather court them, and give them the entree to their brilliant soirees, where the properties of steam engines, the virtues of hickory hoop-poles, and good oak staves, and the last cuts and patterns of the costumes of Bond street and the Boulevards are discussed with like philosophical acuinen and minuteness.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Mauran Oroondates", "estimated_wealth": "150000", "biographical_note": "Formerly engaged in the - - - - trade, and made money also by the steam ferry between Havana and - - - - It is supposed that he has lost largely by the failure of the extensive house of Geo. Knight & Co., of Havana.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Maxwell Hugh", "estimated_wealth": "100000", "biographical_note": "One of the ablest lawyers and first of orators at the bar: his father was a respectable Scotchman, and a brewer at Baltimore, and Hugh married the beautiful daughter of an eminent blacksmith of this city. Now their son is Secretary of Legation at Petersburg! Such is the reward of merit.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Mesier P. A. Jr.", "estimated_wealth": "100000", "biographical_note": "Of the old Knickerbocker stamp, and a worthy flour merchant or bookseller his father was, we forget which.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Meyer George", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Milderberger Christian", "estimated_wealth": "300000", "biographical_note": "Of the German emigrant colonization that got a good foothold here about a century since, when property could be bought for a mere song.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Mildeberger John", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Miller John G.", "estimated_wealth": "200000", "biographical_note": "Rich and rides iu his equipage, but, it is said, sprang from a very obscure origin, we believe that of a \"candle-snuffer\" in the Park Theatre. So much the more honor to him, to have made such a leap as he has. He need not shun investigation into his pedigree, nor cry with Othello, \"Put out the light!\" for it was truly the light and life of his vocation, and the source of his fortune.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Mills Drake", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Mills James", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Minturn R. B.", "estimated_wealth": "100000", "biographical_note": "There are those who have seen pass before them in the panorama of the last half century, a succession of reigning houses of wide spread fame as India merchants, all now toppled down one after the other, and gone to perdition! This Minturn is one of the sons of that Minturn who, with the Franklins and Robinsons, were among the very earliest to launch out their 700 ton ships for the China seas, these ships then being deemed Mammoths in naval architecture. How have things changed, when 1000 tons is scarcely looked at for an ordinary packet!", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Moffatt Wm. B.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Monroe Mrs. James (Douglass Estate)", "estimated_wealth": "300000", "biographical_note": "Wife of Capt. or Col Jas. Monroe, formerly of the army, and nephew of the late James Monroe, President of the United States, whose ancestor, he boasted in telling, was a tanner.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Moore Clement C.", "estimated_wealth": "250000", "biographical_note": "Of the highly respectable family of the late Bishop. Moore, whose ancestors located first at Newtown, L. I.,as plain farmers or mechanics, as most of the first colonists from England were. Clement is son of the venerable and revered Bishop Moore, deceased, of the Episcopal Couch and nephew of the much beloved and distinguished physician, Dr. Wm. Moore, deceased.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Moorewood Edmund", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Morgan Matthew (late N. Orleans)", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/17", "image": "0017_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0017.jpg"}, {"name": "Morgan John I.", "estimated_wealth": "100000", "biographical_note": "Rich and of no calling, as we know, but has been a po- litical man, and in high trusts, and in the midst of party strife-always courteous and amiable. A worthy man.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Morrell Thomas", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Morris Gouverneur", "estimated_wealth": "500000", "biographical_note": "His father, the venerable and famous Gouverneur M., late in life married a Randolph, of Virginia, and left this the only inheritor; richly, as Martin Wilkins and other expectants said, meriting the name of Kut.us off at that zime a great Russian warrior. The Morris family of New York and New Jersey began on a large figure, and have so continued to prosper for 160 years. Col. Lewis Mor- ris, a celebrated English quaker merchant of Barbadoes, and friend of Wm. Penn, coming here to New York with his own ships and goods, and with his brother, Captain Richard M., making immediately purchases of large tracts on Long Island, at Harlem river, at Shrewsbury, &c., N. J. (hence Morristown and Morrisana estate, the last the es- tate of the youngster above,) &c. And from this truly illustrious stock came all the Morrises hereabout and in New Jersey; and in their hands the patrimonial estates still rest, together with the household jewelry and plate for many generations back, which few families can say.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Morrison John", "estimated_wealth": "300000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Morse Sidney E.", "estimated_wealth": "100000", "biographical_note": "An editor, and son we believe, of the famous geogra- pher, the Rev. Jedediam Morse.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Mortimer Richard", "estimated_wealth": "200000", "biographical_note": "An honest upright tailor, now retired on a large estate. His lovely daughter was deemed, beyond all question, the reigning belle at Saratoga-not even eclipsed by Miss Jones; whose grandpa was alike a self made man from the shopboard. [Vide Mason.]", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Moss John", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Mott Samuel F.", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Mott Valentine Dr.", "estimated_wealth": "200000", "biographical_note": "A famous surgeon-of an old respectable quaker fami- v of English descent-the progenitor locating about two centuries since at Mespath Kills, Newtown, afterwards at Hempstead. Valentine is the architect of his own for- tunes, and has literally cut his way up to a very hand- some estate. Viva la scalpel! The other Motts here are of the same stem.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Mott Wm. F.", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Moulton Charles", "estimated_wealth": "200000", "biographical_note": "Charles was an active shrewd little broker some 15 years since in Wall street, and by some fortunate pur- chase of real estate became wealthy. He married for love a pretty little poor girl, the much accomplished only daughter of a respectable German piano teacher by a French wife. Mademoiselle Metz-now Mad. Moulton -was in early life deemed almost a musical prodigy by her voice and performances on the piano, and brought money to her parents by singing at public concerts. Moulton is of a high New England family, and has resi- ded some years since in Paris, where Madame Moulton has made great exertions to be received into \"haute so- ciete,\" and finally succeeded in being permitted to play the part of a \"Pompadour Sheperdess\" in one of the tableaux recently given at a bail of the Duke of Orleans. We do not think it possible that any American lady with American blood in her veins, would ever demean herself and expose herself to the sneers and sarcasms of the \"Fauxbourg St. Germaine,\" for the sake of being occa- sionally favored with a haughty nod of recognition from any of the ancient noblesse or new made peers of the French kingdom. Nous verrons.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Munn Stephen B.", "estimated_wealth": "200000", "biographical_note": "One of the old-st dry goods merchants of New York- long a famous house in Pearl street. We believe him a worthy man, but close-fisted and grasping.", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Munson M.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Murray John R.", "estimated_wealth": "150000", "biographical_note": "The Murrays were about half a century since among the most wealthy and influential, and hail from noble Scotch extraction, though the most eminent here have been of the Society of Friends. One of these latter, on the high seat, set up his carriage, which, being deemed a little too luxurious, he palliated the censure by calling it a leathern vehicle\" for convenience! Col. Jas. P. M. in later times, was a conspicuous merchant, and married a daughter of Dr. Bronson. [VideBronson.]", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Murray Miss", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Murray Robt. I.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "M", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Neilson (Estate of) Wm.", "estimated_wealth": "200000", "biographical_note": "An ancient merchant of very great repute and wealth, and long deceased, married \"Lady Kitty Duer,\" widow of the former John Duer, and daughter of Lord Sterling, of the Continental army. By \"Lady Kitty\" or Catharine, old Mr. Neilson left a numerous family, one of whom, William, a respectable merchant and much esteemed gentleman, married a daughter of John B. Coles, de- ceased, and thus added to his fortune.", "alphabetical_letter": "N", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Nevins R. H.", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "N", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Nevius P. I.", "estimated_wealth": "200000", "biographical_note": "Of an ancient and highly respectable Dutch family of our olden time, and acquired his fortune in the flour line.", "alphabetical_letter": "N", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Newbold George", "estimated_wealth": "100000", "biographical_note": "A merchant. The Newbolds are of a very ancient and highly distinguished family of New Jersey.", "alphabetical_letter": "N", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Niblo Wm.", "estimated_wealth": "100000", "biographical_note": "The matchless and incomparable Niblo, proprietor of of the Niblo Gardens, director of operas, vaudevilles, &c. &c. ad infinitum. An English boy, and began friendless, as a waiter, then became lord and master of a famous game hotel corner of Cedar street-finally expanded his wings to a higher flight, and branching into every species of elegant refinement that could pamper the public taste and palate to boot, bas become decidedly the most promi- nent man that ever flourished in this good city, in the way of getting up agreeable and entertaining amusements of every variety, and sp'endid festivals, banquetings, &c. &c. In his line he is decidedly one of the \"Heads of the People.\"", "alphabetical_letter": "N", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Norris Thomas P.", "estimated_wealth": "200000", "biographical_note": "Ofa very old and respectable Dutch family.", "alphabetical_letter": "N", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Oakey Daniel", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "O", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Ogden J. D.", "estimated_wealth": "100000", "biographical_note": "Jno. Ogden. farmer, 1644, appears as one of the four patentees of Hempstead, L. I., and came from England. This appears to be the root of the highly respectable Og- dens of New York and New Jersey.", "alphabetical_letter": "O", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Oliphant D. W.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "O", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Olmstead Francis", "estimated_wealth": "200000", "biographical_note": "A worthy fellow and one of the few instances of a prosperous merchant retiring at the right time. He is of the land of \"steady habirs\" and cousin of the very dis- tinguished Prof. O., of Yale.", "alphabetical_letter": "O", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Oothout John", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "O", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Packard Isaac", "estimated_wealth": "250000", "biographical_note": "Sundry \"haciendas\" and negro plantations in Cuba point darkly to the rather dubious track in which this adventurous New Englander to the tropics soon became by the characteristic cupidity of his countrymen, warmed into a West Indian temperament and a ready prosolyte to the ways of getting money in the Spanish colonies.", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Packer Wm. S., Brooklyn", "estimated_wealth": "250000", "biographical_note": "", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "Paine John", "estimated_wealth": "100000", "biographical_note": "A youth well esteemed, and only child of a rich father", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/18", "image": "0018_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0018.jpg"}, {"name": "", "estimated_wealth": "", "biographical_note": "who got his money by hard knocks. But no family of Vermont nobility can hold up their heads higher than this.", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Parmelee Dr.", "estimated_wealth": "200000", "biographical_note": "The accomplished dentist and a demi-millionaire by his success in this art backed by a keen relish for, and \"cute\" Yankee tact in turning a penny. He is the richest of all this numerous profession and lives in princely style. The best patrons of dentists in this country are our mercurial teeth-destroying doctors.", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Payne Thatcher T.", "estimated_wealth": "100000", "biographical_note": "Served a severe apprenticeship to struggling up-hill labor, as a school teacher, and became of great eminence as a linguist and correct scholar-being of a family part Jew, from the east end of Long Island, not far from Montauk. Is brother of the justly celebrated Jno. Howard Payne. Thatcher, however, in fortune has taken the wind out of the sails of the wandering poet, who has as much to do as ever to get his crust for Thatcher now has his liveries and his valets, and drives his carriage, and lives in snuff \"per force\" of a most capital speculation he made in marrying the rich young blooming widow of Mr Baily, a rich merchant, dec'd, that left a plumb nearly to her, and we hope Thatcher, who is a lucky rogue, don't forget his poor relations, if he has any", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Pearsall Thomas", "estimated_wealth": "250000", "biographical_note": "Merchant, distant relative of Thomas, deceased.", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Pell D. C.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Penfield John", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Post Allison", "estimated_wealth": "300000", "biographical_note": "The progenitor of the Posts was an humble mechanic, among the early English settlers of Suffolk co., L 1, and thence the family soon after located at Hempstead, Queens co. Joel and Jotham Post (both deceased), brothers of Allison, were, together with the late distinguished Dr. Wright Post, (another brother) sons of a highly respectable butcher. Wright's early lessons in the shambles gave him, probably, his strong taste for and afterwards eminence in, anatomy. Joel and Jotham, about 30 years since, carried on a great stroke in the drng line; then smashed; but a few years after built a magnificent store and warehouse, &c; launched larger than ever into the vending of apothecary stuffs, and, together with Waldron B., (son of one of the parties) accumulated a very large estate, on which their families are now luxuriating in the fauxbourgs of our new made quality in the vicinity of Upper Broadway.", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Post Waldron B.", "estimated_wealth": "150000", "biographical_note": "To his fortune as above acquired Waldron added a considerable amount by marriage with a Miss De Wolfe, of Rhode Island. The De Wolfs are several of them Cuba planters, and one made a vast estate by trafficking in the slave trade.", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Prall David M.", "estimated_wealth": "100000", "biographical_note": "An ancient and respectable New York family in the the mercantile line.", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Prime Edward", "estimated_wealth": "150000", "biographical_note": "Son of the \"doctor,\" as his rich deceased father, Nathaniel, the Wall st. broker so famous, was called. What the soubriquet of doctor had reference to, except to certain veterinary reminiscences connected with Nathaniel's early reputed occupations, we know not. However, he seems to have become an adept in something more than horse-flesh, and learned how to crack a good bargain in the way of money changes and brokerages, in which line, at New York, he rose by persevering industry to be the head and founder of the celebrated banking house of Prime, Ward & King, &c.", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Palmer John 1.", "estimated_wealth": "100000", "biographical_note": "One of New England's numerous enterprising sons who have found New York the most successful field for their monetary operations.", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Parish Daniel", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Parish Henry (His brother)", "estimated_wealth": "250000", "biographical_note": "This family sprang from ar honorable root, a surgeon of the Britisn Navy, who about two centuries ago located in this province. A romantic incident connects with Dr. Parish:-In one of the earliest commercial adventures from a neighboring village to the south, and in which a venerable lady, the proprietor of the vessel and her cargo of cider and apples, went passenger, accompanied by a beautiful daughter, Dr. Parish also was invited to act as navigator. At Ocracoke Inlet they saw the head of a celebrated pirate nailed to the bowsprit of a vessel of war; and, on their return, were overtaken by a storm which, but for the doctor's seamanship, would have consigned them all to the deep. For this he received the hand of the fair young damsel on board, and thus became a denizen of this province But from that day to this, the generations have never been blessed with worldly prosperity until in the persons of Henry and his brothers.", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Paulding William", "estimated_wealth": "500000", "biographical_note": "Former mayor, &c., of the democratic school, and alleged descendant of Paulding, one of the captors of the British spy Major Andre. That sterling continental soldier little imagined that one of his descendants would become enriched by intermarriage with one of the rankest tory families of the revolution-to wit, a Rhinelander.- [See below.]", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Pearsall Mrs. Thos.", "estimated_wealth": "200000", "biographical_note": "Her husband, of an old Long Island family of Hempstead, inherited a large estate from his father, a quaker merchant, and this was doubled by his alliance with this la ty, daughter of the rich Scoth merchant, Thomas Buchanan.", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Peck Elisha", "estimated_wealth": "200000", "biographical_note": "The Pecks are from a highly respectable and very ancient English family, who first came to Boston, then located at Saybrook, Conn.", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Perit Peletiah", "estimated_wealth": "250000", "biographical_note": "", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Perry J. A. (Broker)", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Peters John R.", "estimated_wealth": "300000", "biographical_note": "Of an ancient and respectable N. Y. family. Alderman Jno. R., deemed one of the \"cutest\" politicians of his time in the democratic ranks.", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Phelps Anson G.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Phelps Thaddeus", "estimated_wealth": "100000", "biographical_note": "The Phelpses come from Connecticut and are highty respectable.", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Philipson Francis", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Phoenix J. P.", "estimated_wealth": "150000", "biographical_note": "Formerly a grocer, the standing whig candidate for Mayor; he is a son in-law of Stephen Whitney.", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Pearsail Thos. W.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Phyfe Duncan", "estimated_wealth": "300000", "biographical_note": "", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Pierson Henry L.", "estimated_wealth": "100000", "biographical_note": "Iron merchant, and son of Jeremiah, who with Isaac P, established in the very infancy of our manufactures, a nail, and afterwards in adddition a cotton factory, on the Ramapo river, and there acquired great wealth. Isaac, until of late years, resided in the city, and held places of public trust, which he filled with great credit as a prominent leader in the \"old guard\" of the democracy of the Jefferson school. The progenitor of the Piersons was a clergyman and pastor of the English Colony that founded Southampton, Suffolk Co. two centuries ago.", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Pirnie John", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Porter D. C.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "P", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Rankin (estate of Henry)", "estimated_wealth": "250000", "biographical_note": "The Rankins are among the old Knickerbockers.", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Rankin John", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Rathbone John", "estimated_wealth": "600000", "biographical_note": "", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Rathbone John Jr.", "estimated_wealth": "200000", "biographical_note": "The Rathbones are Yankees from Conrcticut, we believe.", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "Ray Robert", "estimated_wealth": "300000", "biographical_note": "Son of Cornelius R., an ancient merchant and old", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/19", "image": "0019_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0019.jpg"}, {"name": "", "estimated_wealth": "", "biographical_note": "Dutch New York family. Robert added some to his wealth by marring a daughter of N. Prime, the broker, Jno. A. King per contra, got a very large slice of the Ray property by marrying a daughter of Cors. Ray.", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Reed Luman", "estimated_wealth": "500000", "biographical_note": "Began as a modest grocer and accumulated great wealth. Before his decease was one of the most liberal patrons of our native artists, (Mount and others) and established a superb picture gallery, &c., that might compare with that of an English nobleman's.", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Remsen Henry", "estimated_wealth": "500000", "biographical_note": "The Remsens are one of our very oldest Dutch Knickerbocker famalies.", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Remsen Three children", "estimated_wealth": "300000", "biographical_note": "", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Remsen", "estimated_wealth": "300000", "biographical_note": "of - - - - - 300,000", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Remsen H. Remsen", "estimated_wealth": "300000", "biographical_note": "", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Remsen Henry", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Remsen Henry B.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Remsen William", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Rapilye G. (Estate of)", "estimated_wealth": "500000", "biographical_note": "The first born Dutch child on Long Island, over two hundred years ago, was a Rapilye, at He ancient patrimonial estate somewhere near the Wallabout, (now the United States Navy Yard.) See Chabert.", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Rhinelander Bernard", "estimated_wealth": "200000", "biographical_note": "The Rainalders, for fifty years pas', among the richest of the rich in this city, were but humble tai ors and shoemakers in the revolution. The tories who staid in th city feathered their nests under the protection of the British f[?]g. Many of them ergaged in taking shares in privateering on the rebet merchant ships-and thus were huge fortunes made by the native born enemies of our independence out of the hard earnings of suffering families of patriotic whigs thus reduced to ruin.", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Rhinelander Wm. C.", "estimated_wealth": "200000", "biographical_note": "", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Riggs Elisha", "estimated_wealth": "500000", "biographical_note": "", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Riker Richard", "estimated_wealth": "250000", "biographical_note": "This celebrated criminal Judge, and so long Recorder, is from one of our most ancient Dutch families-the progenitor locating himself near Hell Gate on Riker's Island, so well known as the stopping place to small craft before they enter this modern Styx at unfavorable tides. If the ancestor fixed himself at the entrance of the Infernal Regions, it may be said of the offspring above, that he was legitimately the three-headed Cerberus who has guarded the gates and keys to those dungeons and penitentiaries which open to criminals on earth a temporary purgatory. Richard is a veritable knight of the old school; a preux chevalier-has shot his man in duello in the heats growing out of the great democratic Jefferson triumph of 1800, and in recherche politesse and refined courtesy of manner he is decidedly the most fascinating man that ever figured so high and so long in all the bitterest broils of party excitement for the last 40 years. He possesses that true art of the gentleman which in truth is nature, the \"ars celare artem,\" and in whom the perpetual smile of serenity, and gentle suavity of manner never appear assumed or designed, but sincere and heartfelt. This, with a brilliant, strong intellect, has given him his peculiar power and ascendancy as the first political leader of his day.- Though subtle in diplomacy, no false pity or disparaging sinister thought could ever dilute or reverse his irrevocable and luminous decisions on the bench.", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Robbins John", "estimated_wealth": "500000", "biographical_note": "", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Robbins N.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Roberts Daniel", "estimated_wealth": "100000", "biographical_note": "His father a physician who acquired a fortune in the West Indies. Daniel is a lawyer.", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Robins John", "estimated_wealth": "300000", "biographical_note": "", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Rogers George P.", "estimated_wealth": "250000", "biographical_note": "", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Romaine Benj'n", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Romaine Samuel B.", "estimated_wealth": "100000", "biographical_note": "His father, Benjamin, acquired his fortune by speculation in water-lots, then the old \"Collect,\" in Centre and Canal streets. He was true blue Tammany bucktail, and the man who got up the great funeral to the charnel-house at the Wallabout, of the 11,500 dead of the Jersey prison-ship.", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Rodgers John R. B. (Estate of)", "estimated_wealth": "200000", "biographical_note": "A respectable physician deceased, whose fortune in life was aided by a wealthy father, long a respectable Presbyteri în clergyman. Dr. R. doubled his fortune by holding the Health Office when it yielded $25,000 a year, and again by marrying the rich widow Smith. So the Doctor's children, if they had not all his intellect, were born with the advantage of being the inheritors of his fortune, which does much for a man's reputation in this country", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Rogers Dr. J. Smyth", "estimated_wealth": "100000", "biographical_note": "The wealthiest and most \"distinguee\" of all the Rogers famiiy of this city, was Moses, a smart little tailor of Stamford, Conn., that itinerated all along the villages of the Sound during the revolution, and followed in the train of the Suttlers of the British troops wherever they were quartered. Moses, however, with his brothers Henry and Nehemiah, had, like their brother Snip of the Rhinelander family, too vaulting an ambition and too great a thirst for money in those adventurous and troublous times to be confined to the goose and thimble, and therefore did they embark their awl in the privateering business.- Thence Nehemiah's promotion to a red-coat in the British line, and hence the wealth of many tories is much of it legitimately belonging to ruined whig families. Yet how the tide of fortune capriciously sets-two of the granddaughters of Moses have successively married to Willim, the second son of the rich patroon of Albany, Stephen Van Rensellaer, deceased, and the inheritance of their children is a princely estate.", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Rogers John", "estimated_wealth": "150000", "biographical_note": "", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Rogers Mrs. John", "estimated_wealth": "200000", "biographical_note": "Was a Smith, widow af a rich merchant she is now the widow of Dr. Rodgers, dec'd.", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Roosevelt C. V. S", "estimated_wealth": "250000", "biographical_note": "", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Roosevelt Jas. I.", "estimated_wealth": "150000", "biographical_note": "No family shine more honorably in the ancient Durch annals of this province than the Roosevelts-the venerated Burgomasters of their day.", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Raggles Sam'l B.", "estimated_wealth": "100000", "biographical_note": "A lawyer, of a respectable family of this state Samuel has dipped largely in real estate speculations, to his great regret no doubt, and has figured as an eminent financier among whig politicians-making a very narrow escape from the fraternal embraces of the \"pipe layers.\"", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Russell Chas. H.", "estimated_wealth": "150000", "biographical_note": "A dashing New England merchant, one of the \"Haute classe\" of the would be rulers of fashion and polite cırcles.", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Russell Wm. H.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "R", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Saltus Francis", "estimated_wealth": "300000", "biographical_note": "He and \"Old Nick,\" or the General, as they call his brother, who has been a fixture at the City Hotel coteries of old bachelors for half a century gone, are sons of a respectable sea-captain, dec'd, of old Dutch Knickerbocker extraction. Nicholas and Franeis are iron merchants. \"Gin'ral\" Nicholas has survived several generations of the old boys of the olden time, and is still as bright as a morning lark, and a most inveterate and impassioned admirer of \"vimmen and vine.\" Who has not heard him recount his exploits in Russia, his intimacy with the Emperor Nicholas, his namesake, and above all, listened to his enchanting warbling of \"Sweet Lullaby!\"", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "Salles (Estate of) L.", "estimated_wealth": "1000000", "biographical_note": "A native of France, and upright merchant, who by cautious loans during great pressures, amassed rapidly overgrown opulence, stinting himself in his perepatetic perigrinations on \"change\" to pockets of bread and cheese,", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/20", "image": "0020_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0020.jpg"}, {"name": "", "estimated_wealth": "", "biographical_note": "and hoarding the doubloons for those who, by intermarriage with his children, will soon find ways and means to scatter much of it into useful circulation. The orphan children of Mr. Vail, late American Consul at Nantes or L'Orient, were consigned by the late Secretary of the Treasury, Mr. Crawford, to the protection of Mr.Van Buren, and through the latter's very prodigal patronage, they were thrown into positions to command eligible intermarriages, and thus their fortunate connection with the family of Mr. Salles,", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Saltus Nicholas", "estimated_wealth": "250000", "biographical_note": "(Vide preceding)", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Sambler's Estate Casper", "estimated_wealth": "250000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Sampson Joseph", "estimated_wealth": "500000", "biographical_note": "A young man and a widower; the purchaser of S. Ward's house for the sum of $60,000. Has made his money in the auction business.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Sanderson E. F.", "estimated_wealth": "100000", "biographical_note": "", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21", "image": "0021_public:gdcmassbookdig:wealthpedigreeof00beac:wealthpedigreeof00beac_0021.jpg"}, {"name": "Sands Joseph", "estimated_wealth": "100000", "biographical_note": "Highly respectable proprietor, who early settled on Long Island, and hence Sands' Point on the entrance of the Sound.", "alphabetical_letter": "S", "canvas_fragment": "https://www.loc.gov/item/03008057/canvas/21"
